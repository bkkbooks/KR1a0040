body:
  text: 誠齋易傳卷十四宋楊萬里撰震下震上震亨震來虩虩笑言啞啞震驚百里不喪匕鬯彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也震所以亨者何也動而懼則亨也懼非惶擾失守之謂也懼而敬也惟懼故敬惟敬故無懼無懼者非不懼也懼始乎來終乎散也當天下之大事震動而來也吾虩虩然必為之恐懼而顧慮焉必求其所以應之使大事為無事焉斯可以轉禍為福移懼為喜而笑言啞啞矣故震雷能驚百里而不能失匕鬯於主祭之才羑里能難文王而不能傷文明於柔順之聖蓋執匕鬯以祭者一敬之外無餘念一鬯之外無餘知當是之時白刃前臨猛虎後迫皆莫之覺故震雷驚百里亦莫之聞敬有所甚懼有所忘也能如是天下可懼之大事孰能驚之者其出而主宗廟社稷優為之矣髙祖當項籍光武遇尋邑是已震為長子故言主祭又震為雷為動曰出者猶曰明天子出矣説卦曰帝出乎震劉備聞迅雷失匕箸託也舜之烈風雷雨弗迷震之祭主不喪匕鬯敬也出字上脫不喪匕鬯四字象曰洊雷震君子以恐懼修省震者雷也一雷已威矣況洊而重乎天之雷以驚夫不敬者也不敬者猶驚而況敬君乎君子敬者也一雷已驚矣而況洊雷乎然君子非徒驚也有功用焉聞雷而恐懼驚也驚而已矣過則舍之徒驚也君子則不然恐懼以先之修省以繼之修省者恐懼之功用也修其身省其過則恐無恐懼無懼矣初九震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也彖辭已言之矣爻彖二辭同或者其一重出後有則者喜而不失節也六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也時有險易則勢有詘伸故天下無常險亦無常詘險過則易詘甚則伸以六二之柔乘初九之剛險也以六二之靜應初九之動詘也方震之始初遇九之猛厲勃然而動駭然而來何可當也六二才與位俱柔若不勝其憤起而逐之奚而不喪惟能以柔避剛以靜馴動逺避而勿逐俟之久而剛自衰則吾無喪而有得矣險者易詘者伸非有得乎髙祖避項而入漢中光武避更始而出河北得震六二之義矣厲猛也躋于九陵避之逺也億度也貝其所有之資也度其逐之則喪其所有也七日久也六三震蘇蘇震行無眚象曰震蘇蘇位不當也不患無位有位患也非患位也才儉於位之患也六三以柔懦之才逢震擾之世居下卦之上非位之不當乎君子所以為六三懼也蘇蘇懼之至也然則奈何曰行而去之可也辭難避事臣子之義乎曰是臣子之義也不才云才隕身細也隕國細乎吾才不稱吾位吾去之天下獨無才稱其位者乎鮑叔遜夷吾子皮遜子産去無才得有才豈惟無災眚乎國之福身之福也薳子馮不為令尹蔡謨不拜司徒可以無青矣抑可以為次矣九四震遂泥象曰震遂泥未光也九四以一陽之孤陷四隂之內處至隂之位百鍊化為繞指一齊咻於衆楚矣以此居震擾之世安能致逺而不泥光大而有濟乎劉向恭顯雜處漢朝珣瑜伾文並居唐位是已六五震往來厲億無喪有事象曰震往來厲危行也其事在中大無喪也六五震之君也當震動之世為正位之君宜其憤起奮發撥亂反正以大有為於天下也今戒之曰毋進而往往則為上六之震極是往亦危也毋退而來來則乘九四之至剛是來亦危也必也深思焉長慮焉億之於心度其得中而無喪其所有焉斯足矣然則天下紛紛何時定乎曰治人者必自治料敵者必料已五固震之君也六則隂柔而無陽剛之才者也當動之時無動之才與其動而喪吾之所有不若靜而不喪吾之所有其周平王晉元帝之事乎上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言象曰震索索中未得也雖凶無咎畏鄰戒也立弱子于千仞之上而觀人與虎鬭于其下其氣豈不索然而盡其視豈不矍然而愕乎震之上六似之六以柔怯之資居震懼之極下臨五爻之動其索然矍然宜也然聖人一則以驚一則以安曰征凶言往則凶驚之之辭也曰無咎言不往則無咎安之之辭也奚而往則凶往則犯九四之剛奚而不往則無咎我躬逺於剛而我之鄰六三實當之也然聖人雖安之而終再以三警之曰汝雖無咎而鄰之蘇蘇亦不可不畏不戒也天下之禍莫大乎于其鄰而于其身次焉何也身者必防鄰者必玩也虞受晉寶以滅虢不知乃所以自滅楚聽秦賂以伐齊不知乃所以自伐玩故也江亡而秦穆懼吳亡而晉國弔其知所謂雖無咎而畏鄰戒者與震之六爻一言以蔽之曰君子以恐懼修省婚媾有言亦謂鄰也中未得謂懼而不自得也三與上應曰鄰説者以五為鄰五君也非鄰也艮下艮上艮其背不獲其身行其庭不見其人無咎艮山也不動如山止之至也曰艮其背何也易者象也象者狀物以明理也故頤如人之頤噬嗑如人之噬背如二人相重背而立也二隂虛而衆者耳目手足也一陽實而孤者背也艮之貞面內而背外是艮其背不自復見其身也其悔亦面前人之背而不見後人之面是行其庭而不見其人也君子觀貞之象於是得忘我之學觀悔之象於是得忘物之學忘我則中不出忘物則外不入中不出外不入止之至也毋意毋必毋固毋我勿視勿聽勿言勿動艮其背不獲其身也堂髙數仞食前方丈侍妾數百得志而弗為行其庭不見其人也又何咎貞內故艮其背悔外故行其庭也艮其背之上疑脫一艮字彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也艮止也非止而不行之為止也時止則止止也時行則行亦止也非行之為止也時乎當行道乎可行吾斯行焉吾雖行然止乎道也時乎當止道乎可止吾斯止焉非吾止亦止乎道也行止聽乎已耦而耕踰而避君子不以為止行止聽乎道聘列國見齊梁君子不以為不止何也彼之止非止乎道也此之行亦止乎道也如北辰焉杓建無定指而北辰有定居故曰動靜不失其時其道光明艮其止止其所也而孔子亦曰北辰居其所君子之止其所即北辰之居其所也上下敵應不相與者前一人面內而不自見其背况見已之面乎後一人見前人之背而不見前人之面况見後人之面乎所以釋艮其背不獲其身行其庭不見其人之卦辭也象曰兼山艮君子以思不出其位艮山也山不動之物也一山已不動況二山相重乎山兼重而二焉止而不動之至也君子體之以思不出其位可得而動乎緼袍緼袍立狐貉狐貉立止其位也典禮以禮聞典樂以樂聞亦止其位也前二者出位而思不惟不得狐貉併緼袍而喪之矣後二者出位而思不惟不得音樂併禮文而喪之矣大哉止乎有止而絶之者有止而居之者有止而約之者艮其背所以絶人欲而全天理此止而絶之也時止時行必止乎道此止而居之也思不出其位而各止其分此止而約之也大哉止乎夫止一端而已乎初六艮其趾無咎利永貞象曰艮其趾未失正也止不善必在初止之於初猶不能止之於末而況肆之於初者乎顔子之不逺復止一已之不善於初者也漢文即位之初喜嗇夫之辨捷而張釋之極言其害止其君之不善於初者也顔為幾乎聖而文為七制之主止於初之效也艮止也初六止之初也居腓之下偶而散趾之象也以六之柔而靜此趾之止而不行者也聖人猶有憂焉曰汝能止其初猶宜止其終曰利永貞者止其終之謂也然六止而初動故但言未失正六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也六二一卦之大臣也大臣者以道事君不可則止今則不然居大臣之位逢其上之剛必有順柔之忠而後可譬之一身以已下九三則猶腓也九三在上則猶背也九三陽也六二隂也陽倡則隂必和背動則腓必隨以六二之柔而欲止九三之剛以六二之腓而欲止九三之背其能與否已昭昭矣然必觀其心而後君子小人可判也古之人於其上之不善有拯而不隨者有先隨而後拯者有先拯而後隨者有不拯而隨者有不拯而隨其心不然者龍逢比干拯而不隨也楚靈王之問子革先隨而後拯也伍被之答淮南先拯而後隨也蜚廉惡來不拯而隨也君曰好色亦曰太王好色君曰好貨亦曰公劉好貨不拯而隨而心不然也六二艮其腓非不欲止其背之動也而柔不勝剛下不勝上故曰不拯其隨非樂隨也外不得不隨而中不得已也故曰其心不快言其不得已而隨也又曰未退聽也言其雖不得已而隨亦未肯退聽其上之輕動也九三非君也而居六二之上也六二不得不隨也君子於艮之六二察其迹而哀其心六二居背之下偶而立腓之象腓脛肉也六二中正故不快故未退聽九三艮其限列其夤厲薰心象曰艮其限危薰心也君子之學至於止其所而如山之不動可以免矣故初與四皆無咎五悔亡上吉二惟小不快而已今九三曰厲曰危曰薰心何也蓋三居物我之交內外之際而九三以陽處陽剛而進躁而動者也人有夜行而遇子都者已先焉子都後焉不惟子都不已見已亦不子都見也旦而一揖焉則喜子都之美矣喜生於見見生於不相背也九三下卦之背所以背六四而面內者也惟剛而進躁而動則有時回面而外向矣此內欲之所由出而外邪之所從入也故聖人戒之曰爾幸能艮其背矣今而列其夤之脊自危其心使之有定列而不亂行也爾幸能行其庭不見其人矣今宜艮其閾之限自危其心使之不踰間而不出户庭也昔也行其庭今也不踰閾則併與庭而不行昔也艮其背今也列其夤則併與背而不動何九三之能然也亦九三剛而進之力也惟其剛故反躁而靜如百鍊之金而不可革惟其進故反動而止如介然之石而不可轉九三之剛者質之美也九三之艮其限列其夤厲薰心者學之功也然則學顧可少哉故益不以舜之聖而忘逸樂之戒周公不以成之賢而廢遊田之規大哉學乎夤亦背也厲亦危也危薰心者操心至危若有薰蒸其心者九三竒而橫有門限之象艮為門闕六四艮其身無咎象曰艮其身止諸躬也六四居大臣之任上欲止其君之不善下欲止天下之不善惟不止諸人不咎諸人而自止諸躬則得之矣楚莊王好獵而樊姬不食禽獸之肉太宗喜武功而魏徵不視七德之舞此其事也王吉之賢能疏昌邑之獵楊綰之清能減汾陽之樂此其效也四居體之半身之象也六五艮其輔言有序悔亡象曰艮其輔以中正也六五艮之君也其言如絲之至微其出如綍之至大成王一言而天返風景公一言而妖星退可不謹哉與其言而未善寧止其輔頰而不言止而不止非不言也審而後言也審而後言者是惟不言言必有序矣何悔之有故髙宗三年不言一言而四海咸仰威王三年不鳴一鳴而齊國震驚艮之六五所以能艮其輔者以其德之中正而已所謂有德者必有言也五居上而偶有口胠而不合之象故為輔頰上九敦艮吉象曰敦艮之吉以厚終也上九以德之剛居止之終其髙風徑節剛健篤實如泰山喬嶽之巔其止豈可搖其厚豈可移哉此伊尹將告歸仲尼不踰矩之事乎敦厚也上九亦背之象故厚艮下巽上漸女歸吉利貞彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也臣從君如女從夫女之從夫聘則漸奔則速漸則正速則邪正則妻邪則妾臣之從君可速而不漸邪而不正哉漸而進則獲乎上而有功正而進則正其身以及國漸而進者誰也初六六二九三六四上九也獲乎上者孰為上也九五也九五以剛中之盛德居天下之大位故曰其位指而言之也諸爻得乎有位之大君故曰得位以此得彼也艮止巽順止則靜順則謙既靜且謙其進豈不正而漸哉有不動動斯達何窮之有長女歸少男故曰女歸象曰山上有木漸君子以居賢德善俗木在山木因山而髙也山有木木非人所植而固有也非人所植則聽於天而無所用其力因山而髙則浸以長而不驟至於髙所以為漸也君子體之以此處已則不自賢其德而居於賢德者之間故賢德者推而髙焉以此處人則不速責其善而俟其人之自善故風俗化而善焉又豈獨進得位進以正一端而已哉或以女或以木或以鴻其象亦非一端而已巽為長女又為髙鴻象也初六鴻漸于干小子厲有言無咎象曰小子之厲義無咎也鴻雲飛水宿之物也當其水宿而進於飛必有漸也故始進則漸升於水涯之江干如初六之君子在下而始進亦或自抱關擊柝而升或自乘田委吏而升也匹夫孺子如燕雀焉安知鴻之志哉或欲厲而危之或有言以毁之安知君子之不卑小官少安無躁之節哉為君子者付之莞爾勿深咎焉可也非不咎也其義不足咎也如足咎則孔子愠武叔孟子怨臧倉矣艮初山之麓故為干又偶立有江干兩岸之象六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也鴻自干而漸進于磐石之上則髙而安矣此六二漸進而居大臣之位之象也然居大臣之位食吾君之祿豈曰素餐乎亦欲置國家於磐石之安納君民於衎衎之樂而已故傅説之志在中興商髙而非后則不食其祿孟子之志在平治天下而食方丈則得志不為艮二山之石故為磐艮為小石九三鴻漸于陸夫征不復婦孕不育凶利禦寇象曰夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也止極者進必鋭伏久者飛必髙九三居於艮之終止之極也壓於巽之下伏之久也以陽居陽進必鋭飛必髙也是故自干自磐一飛而登于髙平之陸知進而已耳好髙而已耳知進而已故其類雖衆豈復回而顧好髙而已故非類在上亦必合而從初六六四九三之羣類也九三知進則往而不反決焉棄其羣類而離絶之矣六四非九三之耦也九三好髙則比而相悅靦焉孕而不育亦不知愧恥矣聖人戒之曰汝胡不正汝心明汝目而察之乎初六六二汝之類也六四汝之冦也汝盍亦和順於汝之類而相與扞禦於汝之冦乎如是則汝與初六六二可以相保而免為六四之所凶災矣豈惟無凶又且利焉故曰利禦冦故酈寄舍祿産而從平勃利禦冦也蕭至忠舍明皇而從太平公主婦孕不育凶也醜類也夫九三也婦六四也艮三山之平故為陸六四鴻漸于木或得其桷無咎象曰或得其桷順以巽也六四漸進而登于木則又在陸之上矣以九三之剛而漸于陸今六四乃超九三而出其上此危道也惟降而棲于可椽可桷之卑枝則庶幾無咎與漸于木者飛而至也得其桷者順以巽也君子之漸進于髙位不幸而在剛暴小人之上非順而巽巽而降未有能免者故子文下子玉而安陽處父上趙盾而見殺三禦四隂冦陽也四順三柔巽剛也四出艮之上為木為風故乘風而升于木九五鴻漸于陵婦三嵗不孕終莫之勝吉象曰終莫之勝吉得所願也九五以剛明中正之君居崇髙富貴之位此鴻之進于丘陵最髙之地之象也下有六二柔順中正之大臣九五與之合志一德以大有為於天下此如鴻之遇順風橫四海也何難之有然猶三嵗而不合不合而無成者何也五欲親二而九三在旁以間之如蒯通之説韓信二欲親五而六四近上以間之如管蔡之毁周公此其所以婦三嵗不孕也惟君臣皆有中正之德故九三間臣之計不行於六二六四間君之計不行於九五終不為其間之所勝而底於吉也彼不能勝此則此之志願得矣君之志願得則豈惟位之髙如丘陵哉功業之髙亦如丘陵矣雖然豈一日之致哉亦三嵗之漸而至也漸于陵非進於位之漸也進於功業之漸也故文皇之治不見於貞觀之初而見於三年之後開元元和亦然君臣遇合之艱也成就之不易也如此而或者欲一言而悟期年而化或者不妄則易妄矣婦謂六二不孕謂功無成五出山木之上故為陵鴻漸而至於陵乘巽之風故也又巽為髙上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也九三漸于陸上九復漸于陸何也漸之進至于九五之漸于陵髙之極也不可踰矣踰則僭故九三下卦之極上九上卦之極其進也皆至于髙平之陸而止矣然九三之漸于陸躁於進也雖平而髙上九之漸于陸安於進也雖髙而平何也自干自磐而至於陸則其髙為驟自陸自木自陵而復至於陸則其進為退上九以剛陽之德秉謙巽之極名居一卦之上實出一卦之外其位彌髙其心彌下其進彌徐其退彌速此其羽翼翔集截然而不可亂豈不足以髙出一世而為天下之儀表乎故良平安劉之策不妙於四老人冦鄧重漢之功不宏於一客星然則學者欲學漸之一卦將學其進乎將學其不進乎巽為進退又巽為風至上九風之衰也衝風之衰不能起毛羽故鴻復反于陸艮巽皆上實而下散鴻舒翼之象兊下震上歸妹征凶無攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也説以動所歸妹也征凶位不當也無攸利柔乘剛也歸妹者嫁女之家非娶婦之家也何以知其為嫁女之家漸曰女歸自彼歸我之辭此娶婦之家也今曰歸妹自我歸彼之辭婦人謂嫁曰歸此嫁女之家也曷為不曰歸女而曰歸妹女者愛之鍾也妹者孤之窮也何以知妹者孤之窮也妹之為言幼小之辭也無父而有兄之辭也豈有父在而女稱妹哉妹者敵兄之辭也無父而歸於人孰歸之也兄歸之也孰為之兄震是也故兊者少女震之妹也震者長男兊之兄也曷為歸妹征凶無攸利也不待兄以已歸于人而自往焉是淫奔也淫惡之大奔行之醜聘則妻奔則妾非凶乎又何利之有舜之從堯四嶽歸之堯也孔明從先主徐庶歸之先主也伯姬之歸宋魯成公歸之宋也此夫婦君臣之大義也非夫婦君臣之大義也天地之大義也天地不交萬物熄男女不交萬物熄君臣不交萬物熄故曰歸妹人之終始也嫁者女之終娶者男之始也説以動者兊説而震動也伯兄三夜不息燭不亦動乎少妹之孤身有所依歸不亦説乎惟不待兄之命而自征行以往焉則凶則無攸利爾而况位不當柔乘剛乎王輔嗣以為少女與長男交是誤以嫁為娶也上下卦言歸妹者四初無取女之辭如咸亦無女歸之辭如漸何從而知其交又以妹從姊而為媵愈失之矣巽為姊經有兄而無姊然則震之嫁其妹將焉歸少女歸于少男咸是已柔乘剛謂三隂皆乘三陽隂位乎陽之上故位不當象曰澤上有雷歸妹君子以永終知敝雷興雨則澤益滋兄舉禮則妹有歸此歸妹之象也傳曰昏姻者禍福之始故薑任興周文哀禍魯叔姬辱身董祁訴夫夏姬滅國君子於歸妹之始必慮永久之所終必知其歸之所敝也豈惟昏姻忠敝必野文敝必僿一代之敝也革俗必弱從俗必強一國之敝也清必隘和必不恭一行之敝也兼愛必無父為我必無君一學之敝也豈惟昏姻初九歸妹以娣跛能履征吉象曰歸妹以娣以恆也跛能履吉相承也初九之跛能履能履則非跛也九二之眇能視能視則非眇也非跛言跛非眇言眇眇言昧跛言弱也幼孤之妹昧弱不振待兄以振者也初九在下非妹也妹之娣媵也故驪姬之娣生卓子戴已之娣生惠叔皆媵也非匹也然卦辭言歸妹征凶而初九為娣則征吉何也征凶者不待兄之命而自往征吉者待女君之命而已往也凡師能左右之曰以今曰歸妹以娣是娣聽女君左右之也初九以妹媵之卑剛貞之德而能體昧弱之柔承女君之尊所以吉而相承也恆者能安其分之當卑也歸妹以娣其猶泰茅之茹乎非娣之賢也故君子不賢管仲子産而賢鮑叔子皮九二眇能視利幽人之貞象曰利幽人之貞未變常也初九六三九四六五皆言歸妹而九二獨不言何也九二之位下卦之尊者也即妹之身也妹之身而言利幽人之貞所謂幽人者誰幽人者男女賢德之通稱履之九二曰幽人貞吉言君子之幽貞也歸妹之九二曰利幽人之吉言少妹之幽貞也九二以孤幼昧弱之身而有視逺之聰明以女子無父之訓而有幽間中貞之賢德體隂而陽其性質柔而剛其德故也幽則至靜而不可動貞則至堅而不可渝皆剛陽中正之常德而不變者也故曰未變常也九二其女夷齊乎其宋伯姬陳孝婦之儔乎六三歸妹以須反歸以娣象曰歸妹以須未當也九二言幽貞未變之德而不言其所歸此未嫁而待禮也故曰歸妹以須須者待也然方九二未嫁以待禮而六三欲躐出於九二之上此已挾緑衣上僭之心矣故聖人從而正其分曰汝曷不反而歸於娣媵之列乎又曰未當者深貶其僭之不當也其在外則皇父卿士畨為司徒之時乎九四歸妹愆期遲歸有時象曰愆期之志有待而行也九四亦少妹之兄也而歸妹愆期而不嫁有待而後行何也待嫡兄之命也夫九二以少妹之孤視聽聰明斯已賢矣剛陽得中此又賢也幽貞不變此又賢也歸而須禮此又賢也嫁而愆期此又賢也其三聘之尹三顧之葛也與六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也九二之少妹在二則幽貞而不變至三則須禮而不輕至四則愆期而未行然則何時而歸於人乎待六五之命而後行也六五以帝乙之賢居至尊之位體中正謙柔之德而九二之賢女為之妹以是兄歸是妹豈不光華焜耀于而國而家哉於此而下嫁於諸侯又能自謂我雖女君也娣雖吾妾也不以已為過之而自以為不如位髙而志益卑身貴而行愈謙此帝妹之所以愈賢與推而放諸君道髙帝不如三傑文帝不及賈生其庶幾乎彼謂五帝其臣不及其聖豈惟五帝之罪人亦歸妹之罪人也月與日望則相敵幾望者月遜日也婦遜夫之象也故吉觀帝妹之遜其夫知帝乙之訓其妹觀帝乙之訓於妹知帝乙之孝於親蓋吾親有遺愛吾能解其憂吾親有所託吾能副其託不曰孝乎故帝妹之遜可能也帝乙之訓難能也帝乙之訓可能也帝乙之孝難能也大哉帝妹之遜乎大哉帝乙之孝乎至於武王集文王未集之統成王終武王未終之功抑又歸妹之大者與袂袖也假衣以明其人而不斥其人也上六女承筐無實士刲羊無血無攸利象曰上六無實承虛筐也六隂也故虛虛則無德居上尊也尊則為兄尊而無德其少妹不令之兄與故九二之為女奉承之於下如奉虛筐而無幣帛以實其筐上六之為士刲羊告廟於上如執虛器而無血膋以實其器少妹疇依焉儻無六五以主少妹之昏禮前人目不瞑矣一妹不足託宗廟社稷乎易者象也上卦有虛筐之象兊為羊上六而在外朝為許靖為王衍誠齋易傳卷十四
