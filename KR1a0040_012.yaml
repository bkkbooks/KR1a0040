body:
  text: 誠齊易傳卷十二宋楊萬里撰乾下兑上夬揚於王庭孚號有厲告自邑不利即戎利有攸往彖曰夬決也剛決柔也健而說決而和揚於王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也大以五陽而決去一隂以五君子而決去一小人此舜舉十六相去四凶周公與十夫去三監之時也宜其甚易而無難矣而聖人於此有懼心焉謂勿專倚乾之健必濟以兑之說然後小人可以決去而天下國家可以和平而無傷也古者孰有不以存小人而傷君子不以去小人而傷國哉漢之去宦官以袁紹而漢亡亦以紹唐之去宦官以崔昌遐而唐亡亦以昌遐去小人可易言哉故以其有乘五剛之大罪我是以聲其罪而揚之於王庭以其有不可忽之危機我是以信其令而警之以惕厲以共有不可恃之剛武我是以告其徒以尚武之必窮以其有一隂之猶存我是以勉其往以必至於純乾而乃終夫揚庭之未既惕厲之已至乃有勇中之怯健而說決而和也尚武之方戒利往之復進又有怯中之勇說而健和而決也聖人之去小人豈一端而足哉告自邑猶言告我家也言遍告五陽也象曰澤上於天夬君子以施祿及下居德則忌澤卑則鍾而聚髙則潰而決澤上於天髙矣安得而不決君子觀其決而及物之象故不專利於己而必施之以及下觀其髙而必潰之象故不敢居其聖而必戒之以為忌忌如道家所忌之忌初九壯於前趾往不勝為咎象曰不勝而往咎也初九陽壯之初位乎四陽之下趾之象也而決然行乎四陽之先前趾之象也倚一陽之壯而不待四陽之長鋭於行而躁於往欲以孤力而決去小人一小人雖微矣其易勝乎勝在往先者勝往在勝先者負況不勝在往先者乎故周公言往不勝而仲尼斷之曰不勝而往宜其咎也此陽處父抑趙盾宋義排項羽所以皆為咎也九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也九二以剛陽之才當夬決之時得大臣之位遇同德之君有衆陽之助可以決而無疑矣而能居柔以晦其剛得中而戒於過雖於四陽之盛而決一隂之衰乃惕然若臨大敵諄然若警夕掫有備如此雖有兵戎之驟至亦勿憂恤矣此狄仁傑從容存唐之事也不然無仁傑之志而竊仁傑之跡則為張禹孔光胡廣趙戒尊養時賊矣莫夜句絶九三壯于頄有凶君子夬夬獨行遇雨若濡有愠無咎象曰君子夬夬終無咎也壯于頄王輔嗣謂上六是也頄者頰之骨也體之在上者也九三外列乎五陽衆君子之林而內為上六一小人之助此小人之諜而君子之家冦也雖然不可疾而可曉也聖人曉之曰來汝九三取凶在汝取無咎亦在汝汝君子徒也舍君子從小人凶之道也舍小人從君子無咎之道也壯于頄是從小人也獨行遇雨是從小人也君子夬夬是從君子也若濡有愠是從君子也居下而壯乎上處陽而應乎隂非壯于頄之象乎舍羣陽而孑與之同志應一隂而任己以獨行不惟應之又與之和合若隂陽之和而雨焉非獨行遇雨之象乎棄同而即異叛正而附邪天下其孰能說之此其所以凶也汝曷不決而又決以絶上六之交汝曷不決而又決以協羣陽之志夬夬者決而又決也若濡者若上六之濡己而汙己也有愠者以上六為羞惡而愠見也去汙以自潔舍故以自新天下孰不與之此其所以無咎也段紀明助閹尹而害忠烈壯于頄而獨行遇雨者也溫太真舍王處仲而歸朝廷君子夬夬而若濡有愠者也為九三者其亦謹所擇以從聖人之曉已哉九三與九四皆有君子小人兩從之嫌而九三獨無咎者九四聞言不信而九三君子夬夬也何也九三以陽居陽九四以陽居隂也九四臀無膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不明也兑為羊九四兑之初也臀下體九四兑之下也羊者性之狠也陽者德之剛九四以狠濟剛宜其與羣陽並進以夬去一隂今乃不然九則陽之質四則隂之位以陽處隂以剛居柔於是百鍊為繞指夬決為不斷矣欲止而不進三陽進之於後而見傷是以有臀無膚之象欲進而不止則不當剛夬之位而弗果是以有其行次且之象欲從九五之牽于前而有行則不能忍狠愎之性而必違是以有不信悔亡之言之象劉牢之既從朝廷復背朝廷既從靈寶復背靈寶從順順者不納從逆逆者疑之既不得為君子又不得為小人哀哉以陽處隂九二九四同之所以異者九二中正九四媚說也九五莧陸夬夬中行無咎象曰中行無咎中未光也莧陸草之脆夬夬決之强中行決之和無咎決之安未光決之憾九五為決小人之主合衆陽君子之助以決上六一隂之衰如拔莧陸之草不啻也而何至煩吾君夬夬之極力哉既決之極力而不遺餘力矣而又行之以中而又僅能無咎而又有未足為光大之憾何也易中有難夬中有牽故也一隂易去而去之何難强君易決而決之奚牽曰惟小人易近而難遠非難遠也近之則難逺也近則寵寵則尊尊則僭僭則强强則難逺李輔國者其初一家奴而其晚號尚父貫盈罪大而代宗不敢顯戮之至遣盜以竊其首焉殺之者夬夬也遣盜者中行也誅一小人而無變者無咎也然隂竊殺之而不明正邦刑亦可羞矣是足為光大乎九五其初近上六而其終不得不去上六上六恃寵而上其君矣可得而去乎九五忍耻而以中道去之幸於無咎變而已矣何光大之有程子云莧陸馬齒也故至脆上六無號終有凶象曰無號之凶終不可長也夬之上六見聖人之仁心如天之大也何也不惟慶君子而深所以弔小人也曷為弔小人也小人亦受中於天與我同類者也特不能克其利心以復其良心爾上六以一隂而乘五陽之上自以為得矣不知五陽長而己必消及其消亡而後號咷也聖人曰汝至於此其勿號咷乎其終有凶而不可久長也乎庶其未至於此者猶可有改乎詩曰啜其泣矣何嗟及矣其夬之上六乎李斯父子潘嶽友朋臨刑之時正如此爾巽下乾上姤女壯勿用取女彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉隂陽之相為消長如循環然剝者陽之消然剝極為復不旋踵而一陽生夬者隂之消然夬極為姤不旋踵而一隂生當一陽之生也聖人未敢為君子而喜必曰朋來無咎言一陽未易勝五隂也當一隂之生也聖人已為君子而憂遽曰女壯言一隂已有敵五陽之志也既曰女壯又曰勿用取女申戒五陽以勿輕一隂之微而親昵之也逺之且不免而況親昵之若同室之人乎此聖人所深憂也文王之卦辭云爾而仲尼釋之曰姤遇也柔遇剛也言五剛不幸而與一柔相遇也一隂方壯而五陽遇之其勢豈可久長哉壯而不己必至於剝也姤遇之時若是其大可不戒哉然則相遇之道遂可廢乎曰柔遇剛不可長也若天地相遇剛且中正何可廢也天地不相遇則物不生君臣不相遇則道不行五陽乾也一隂坤也故曰天地二五皆剛且中正故曰剛曰中正遇之義若是其大其可廢哉不以一柔五剛之相遇而不戒不以一柔五剛相遇之可戒而廢天地君臣之相遇此易之貴於變也象曰天下有風姤后以施命誥四方天以風誥物后以命誥民初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也初六一隂始生如豕之弱者人之所忽也不知其中心未嘗忘蹢躅而踴躍也惟於其方弱之時繫之大車之金柅繫之則有牽而不得逞繫之于柅繫之固也繫之于金柅固之固也如是則一隂止而不得上進貞正之君子可以安吉也若不有以繫而止之或聽其往而進則凶矣髙祖之封濞明皇之不殺祿山是矣且繫于金柅繫何物也羸豕也先言金柅而後言羸豕不先得其繫之之地則逸其繫之之物矣九二包有魚無咎不利賓象曰包有魚義不及賓也仲尼於彖辭發明遇之時義甚大今觀之九二以後則見其時義之大矣九二君民之相遇得其時義者也九三九四君民之不相遇不得其時義者也九五君臣之相遇得其時義者也上九君臣之不相遇後其時義者也大哉遇之時義乎人之與物相遇欲速相遇而不欲速則失時相有不欲速相有而欲速則失義魚者衆漁之所利也衆漁求魚一漁先得魚喜遇之之蚤也喜於遇之之蚤而急於得而有之則魚不可得而有矣何也取之必有其器也大則綱纎則笱然後有以包而舉之不然急于取而徒手以往則亡具甚矣魚豈為我有乎故必有以包之斯得而有之包者緩辭有者堅辭取之緩則有之堅矣後雖有他人善漁者至利亦不彼及矣何也吾遇之之時蚤而取之之義緩也賓者他人之謂也髙祖先得關中遇之之蚤也漢先得之楚後至而奪之不惟奪之反王我於蜀我徐起而定三秦天下卒為漢而不為楚此包有魚而利終不及賓者也又何殃咎之有初六隂而在下民之象也魚亦隂類古者以魚比民九二以剛陽中正之德居下卦君主之位而首與初六遇此遇魚之最蚤者也其德足以包有之而無咎九三九四二賓其至已晚矣安得利以及之乎九三臀無膚其行次且厲無大咎象曰共行次且行未牽也一卦五陽而一隂五陽必爭赴於一隂一水衆漁而一魚衆漁必爭取於一魚初六之一魚此九二九三九四之所爭取者也九二最近初六最先遇初六則初六之魚已為九二所得矣九三居九二之後而必爭爭則必傷傷則欲進而不敢進自危而不力爭能不進而自危雖不得魚亦無後災故無大咎曰行未牽者猶幸其不牽於魚而必進也孔明說先主謂中原已為操所得而江東已為吳所得吳不可圖而可以為援此次且而無大咎也三居二後故曰臀爭魚而傷故曰無膚夬之九四與姤之九三辭同而九三無大咎者九四以陽處隂故柔而不決遂坐次且之纍九三以陽處陽故止而不行乃得次且之方九四包無魚起凶象曰無魚之凶逺民也九四非無剛陽之德以包納初六然曰包而無魚者四與初遠而不相及一也四以陽處隂又無中正之德二也四無君主之位三也四與初宜相應者也宜應而不應三失故也無德以得民無位以臨民而又逺民宜吾民之歸九二而去我也君而無民無民而舉事安得不凶起者舉事之謂子干子比自晉歸取楚而見殺而蔡公棄疾乃得楚二子遠而蔡近二子庸而棄疾賢故也九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也此九五九二之君臣剛遇中正之盛也九五以剛明之德乃含其耀而不矜以下逮九二中正之臣如杞葉之髙而俯包瓜實之美九二以剛正之德亦奉君命而不舍以上承九五中正之君如命從天降而決起盍歸之志君臣相遇之盛如此一小人雖壯何足慮也堯下逮舜之側微以杞包瓜之象舜遇堯為天人之合有隕自天之象何憂歡兜何畏孔壬固其理也上九姤其角吝無咎象曰姤其角上窮吝也上九之吝而不遇者時之後道之窮也非上九之咎也何也上九以剛陽君子之德而自處於髙亢不屈之地是將何所遇哉以我之髙遇彼之觸而已遇其角遇其觸也天下之情順則合乖則離遇其觸矣何遇之冀哉其為悔吝宜矣雖然上九何咎過之有吾道也窮而已安之可也既曰無咎聖人慰之之辭也又曰上窮聖人歎之之辭也仲尼之道大天下莫能容是也孟老于行荀廢蘭陵亦然而况賈誼仲舒馮衍之徒與大壯九三之羸其角晉上九之晉其角角在我也姤上九之姤其角角在彼也角在彼而我遇之也坤下兊上萃亨王假有廟利見大人亨利貞用大牲吉利有攸往彖曰萃聚也順以說剛中而應故聚也王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣萃者天下生聚全盛之極也天地聚而隂陽和萬物聚而食貨充君臣聚而大道行萬民聚而天下熙此豈一人一日所致哉聖人於其時也前必揆其所從後必稽其所終不揆所從其散孰聚不稽所終其聚復散昔者天下之散也何從而聚也刑錯不式之治生於反商政之日煙火萬里之富生於除秦網之時是可忘哉王假有廟用大牲吉所以報萃之所從而不敢有也今者天下之聚也誰得而散也永嘉之禍生於平吳之功天寶之亂生于開元之治是可懼哉利見大人者必求大人之助屈已以見之利貞者必守以貞正之道無逸以終之所以持萃之所終而不敢恃也順坤也說兊也剛中而應九五與六二也象曰澤上於地萃君子以除戎器戒不虞息者消之初盈者虛之始聚者散之原澤水之聚也澤上於地聚之聚也物有聚而不散者乎君子所宜坊也坊澤之聚者以坊坊治之聚者以備除戎器戒不虞言有備也此亦治之坊也與初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎象曰乃亂乃萃其志亂也詩曰士也罔極二三其德其萃之初六乎初六與九四正應也而九四君子之剛陽者也初六與六二六三同類也而二三隂柔之小人也始欲從九四則逺於君子而隔於二三欲不從二三則昵于小人而私於同類欲從君子者其始有孚也復欲從小人者有孚而不終也聖人曉之曰爾何擾擾為志之亂而妄欲與小人羣聚乎九四雖逺爾曷不號鳴以求應乎爾與九四雖不終然九四察爾初心之孚固將舍舊而開新與爾一笑而釋然相聚矣爾何恤於自新而不往乎其無咎決矣此聖人開初六自新之塗也不開人以自新之塗是驅天下之人而胥為小人也魏舒初欲從欒盈之亂既而乃歸范宣子召伯盈初已從王子朝之僭既而乃從劉文公君子與之是聖人開萃之初六之義也六二引吉無咎孚乃利用禴象曰引吉無咎中未變也君臣之聚會始於相求終於相信臣固求君也然君之求臣甚於臣之求君觀湯之於伊尹先主之於孔明則見矣然則何道以求之星辰非能自髙也引而髙之者天也賢臣非能自進也引而進之者君也六二之進非九五引之而誰也故曰引吉無咎此相求於初之道也及相得相信之後則如骨肉如一體豈復事於外飾哉故馮唐之對文帝張𤣥素之對太宗初以為廷辱卒盡其說馬援謂光武脫略邊幅魏徵告太宗不事形跡皆心孚而文薄者也禴者祭之薄而無文者也故以喻焉此相信於終之道也然六二德則中正而才則隂柔也自非陽剛如伊尹孰得五去桀哉如九五之引六二幸及其中未變之時而引之則得之矣不然如丁公之事楚吕布之事魏雖引之何吉無咎之有六三萃如嗟如無攸利往無咎小吝象曰往無咎上巽也六隂柔也三不中不正也挾隂柔不中正之資其誰納我故進而求聚於九四之君子則四非其類而不答退而求聚於六二之大臣則二非其應而不與萃聚之不合則戚嗟而無歸又何所利哉聖人憐之曰爾盍往從上六巽順之正應乎庶乎無咎然終不免於悔吝也此商鞅出走而諸侯不納之時也兊之上六反之為巽九四大吉無咎象曰大吉無咎位不當也九四以剛陽之資居近君之位下與民為聚則盡得三隂之衆上與君為聚則已逼九五之尊此如陳氏之得齊民司馬氏之得魏民也故聖人戒之曰九四必也柔順謙退如未居其位之時有不敢當其位之意則大吉而無咎矣四幸而居隂柔之位故也不然非凶于而國則害于而家也九五萃有位無咎匪孚元永貞悔亡象曰萃有位志未光也九五以剛陽中正之德當萃聚之時為萃聚之主豈不盛哉然有其位而無咎矣又曰匪孚又曰志未光乃若未盛者何也蓋卦辭有利貞之戒彖辭有聚以正之戒爻辭又有元永貞悔亡之戒非萃聚之難也永其萃聚之難也非永其萃聚之難也永其貞正之難也當天下之已孚而惕然懷匪孚之憂當志意之光大而歉然有未光之志可謂元永貞矣宜其久安長治有聚無散而悔吝銷亡也此伯益克艱之戒周公無逸之規也元者善之長上六齎咨涕洟無咎象曰齎咨涕洟未安上也聚不極則散不生治不極則亂不萌上六以隂柔之資說樂之尤而居萃聚治安之極此開元之末燕游之所由興元和之季宫室之所由侈也故聖人戒之曰臨至樂以至憂之心處已安以未安之慮庶乎無禍咎矣齎咨涕洟憂之至也巽下坤上升元亨用見大人勿恤南征吉彖曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也有位之升有德之升升位則足以行道升德則足以進道又曰升之道必由大人故升於位由王公升於德由聖賢又曰升位而見大人故無附麗小人之失升德而見大人則日入於君子之塗南征前進也此程子之言得之矣然舜大人也能升禹稷紂亦大人也能升飛亷孔子大人也能升顔子荀子亦大人也能升李斯四者之升必有所分矣君子之求升者謹之象曰地中生木升君子以順德積小以髙大棟梁拱把之積也聖人小善之積也在積之有漸進而不已耳而異端者曰一起直入欺哉初六允升大吉象曰允升大吉上合志也初六柔而旁散在一卦之最下木之根也九二九三剛而上進在初六之上木之幹也然初六在下而曰允升大吉者木與土相信而相得則木之升也必鋭士與主相信而相得則士之升也必達故曰上合志也然則初六與誰合志哉非六四而誰哉初六與六四正應也而初六木之始生也六四土之最下而生夫木者也六四為文王岐山之事則初六其吕望渭濱之事也與允信也九二孚乃利用禴無咎象曰九二之孚有喜也當升之世羣賢升於位君德升於聖天下升於治之時也然六五柔順謙退之君方歉然若有所未遑也為之臣者不濟以陽剛之才可乎惟六五得九二之臣君臣交孚是以盡其誠以大有為而盡去外飾之虛文臣有所當為則遂事而不為專上有所重發則衡命而不為悖皆用禴之義也用禴已見萃之六二文王之在岐山內文明而外柔順召之而至幽之而聽非閎散陽剛之臣盡力於外吁其危哉故曰總干而山立武王之志也發揚蹈厲太公之志也其升之九二乎如此而後無咎而有喜也九三升虛邑象曰升虛邑無所疑也九三木之生而出地者也其長也孰禦之九三以陽居陽進而近岐山之王其升也亦孰禦之如升無人之境耳故曰升虛邑又何疑焉其濟濟多士文王以寧之時乎六四王用亨于岐山吉無咎象曰王用亨于岐山順事也四侯伯之位也而文王以上聖之德處之天下方歸往以為王文王乃柔順以事商文王避之愈力天下歸之愈堅此其所以亨於岐山之一隅而有天下三分之二也吉孰大焉又何咎矣六五貞吉升階象曰貞吉升階大得志也升之時亂升而為治君升而為王然則六五升之主也其孰當之文王既當六四則六五其武王乎文王柔順也故為六四武王放伐也何亦為六五之隂柔乎六柔也五剛也中正也觀兵而退須暇五年故詩人頌之曰遵養時晦非以柔晦剛乎夫惟盡天下之貞固從文王之容德不得已而後放伐也故自君而升為王如厯階而升也宜其吉而大得志與垂拱而天下治是吾志也拯民於水火之中是吾志也貴為天子富有天下豈吾志哉上六冥升利于不息之貞象曰冥升在上消不富也易變也變則通上六以隂邪之小人乘一卦之上居升進之極猶冥然冒昧求升而不已宜其消亡而不富也若進德之君子變而通之反而用之移小人貪得不息之邪心為吾求道不息之正心何不利之有大哉易之道乎豈一端而已乎故訟之終凶用之自訟則吉隨之說隨用之說隨則凶乾之初九有勿用之戒而仲尼厯聘以愛日咸之上六有滕口之規而孟子好辨以明道晉之初未可以速進故貴於摧如之退然顔子最少而進未止益之上不可以過益故忌於或擊之傷然大舜已老而謙得益故曰神而明之存乎其人若夫隂邪而在上在上而冥升終消亡而不富非紂其孰當之誠齊易傳卷十二
