body:
  text: 誠齋易傳卷九宋楊萬里撰艮下兑上咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣上經首乾坤乾坤隂陽之辨下經首咸恒咸恒隂陽之交不辨分不嚴不交情不通故曰咸感也坤六三上而兑乾上九下而艮故曰柔上而剛下坤之一柔上矣二柔復下而艮乾之一剛下矣二剛復上而兑故曰二氣感應以相與説斯感感必止感而不止必流故利於貞而後吉艮少男兑少女艮上兑而已下之故曰男下女天地君臣父子兄弟朋友萬物皆以情相感而後通姑舉男女一端觀之然天氣先降而後地氣升男先下女而後女徳隨君先下臣而後臣志應先主見孔明得男下女之感矣象曰山上有澤咸君子以虛受人山受澤山之虛心受人君子之虛虛故感感故應初六咸其拇象曰咸其拇志在外也易者象也象者肖也如噬嗑之象則肖乎頥中有物如咸之象則肖乎人之一身初與二肖乎足三與四與五肖乎身上則肖乎口故初六為咸其拇拇大指也舉二大指則足見矣初六拇也咸而感之者誰也九四也九四之體一身之心也拇也腓也股也脢也輔頰舌也聽乎心而動靜者也九四説之初初六止之初初與四應者也九四之感初六欲行者也而初六止而不行是心行而足止也魯宣不能食叔盻季氏不能宰子騫是也九四説而不止曰志在外者欲外物而心不正也初内也四外也六二咸其腓凶居吉象曰雖凶居吉順不害也二與五應二行五之感而應可也而二之體則腓也股之下拇之上盖脛之肉所謂足肚者也其往无故而自動不待感而動者也鐘不叩而鳴則妖石非言之物而言則怪有不感而動者乎秦孝公三不聽商鞅之説而鞅三變其説以入之非不感而動乎故凶使鞅順義命而安居焉安居而不妄動以求入焉則亦吉而不害矣伊尹傅説吕望孔明感之而不應者有矣未有无感而應者也六二以隂居隂而順者也其位吉其體凶九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也三為一卦之股居足之上身之下不自動也隨人之身而動也自動則妄隨人則牽故九三之與六二其動異其失均也九三孰感而孰隨也感於上六之説而隨之也上六女之説説之極極而流者也而九三剛躁以隨之所隨者正其敝猶不正所隨不正其敝若何如貢禹之從王鳳五鹿之從石顯志在隨人不擇其人志之所執每執愈下豈惟往吝而已九四貞吉悔亡憧憧往来朋從爾思象曰貞吉悔亡未感害也憧憧往来未光大也九四在一卦之體如一身之心也不言心而言思責其廢心而任思也心者身之鏡思者鏡之翳鏡則虛而照思則索而照虛而照無物也索而照有物矣惟无物者見物有物矣安能見物哉故虛而照則明索而照則昏仲尼繋之曰天下何思何慮盖此心何思何慮則虛虛則貞貞則吉何悔之有今也不然憧憧焉役思於事物往来屈伸之變故思未能感通於事物而事物萬緒朋来從之而不勝其擾且害矣非如貞吉无思之時未感而无害也以思窮物適以物窮思安能窮神知化而成光大之盛徳哉唐徳宗之猜忌以之九五咸其脢无悔象曰咸其脢志末也王弼云脢者心之上口之下其膺膈之間乎此一身至虛无思之地也九五當之宜其為咸感之盛也止曰无悔何也盖无思而神則明无思而不神則昏神者心也不神者膈也膈雖无思昏懵而已九五是也係二説上不忘其本而志其末二與上皆隂柔不正之人也而九五係之説之雖无思也非昏懵乎元帝之優柔不斷似至虛似无思而非也係説恭顯故也九與五皆陽剛也而其位在咸如一身之脢也脢也不柔亦无用之剛而已上六咸其輔頰舌象曰咸其輔頰舌滕口説也上六居説媚之極有啟口之象是小人之在上近君用事以口才而感動九五之君者也其公孫衍張儀淳于髠陳賈之徒與夫吾之一身感之至易者也感而非其道雖一身不能相使如咸之自拇自頰是也盖血氣流通精神洞逹則一身輕於一羽血氣壅閼精神漂離則一指重於百鈞而况天地之於萬物聖人之於萬民與夫父子夫婦兄弟朋友之間乎故咸之六爻有不感而應有感而不應有應感而失其應有思感而不勝其應有不感不應而為无用之感應有非道之感而不許其應然則咸感之道豈易乎哉巽下震上恒亨无咎利貞利有攸往彖曰恒久也剛上而柔下雷風相與巽而動剛柔皆應恒恒亨无咎利貞久於其道也天地之道恒久而不己也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣咸以少男下少女此男女之新婚恒以長女下長男此夫婦之偕老男下女則女隨女下男則男尊男尊女卑尊卑定位然後天地日月春秋君臣父子長㓜之常分正矣正則可久久則可恒故曰利貞剛上謂乾之初升而震柔下謂坤之初下而巽終則有始荀爽謂乾氣下終復升上居四而為始坤氣上終復降下居初而為始程子謂動則終而復始所以恒而不窮若夫夫妻反目父子相夷君臣罔終朋友隙末皆失恒之道矣象曰雷風恒君子以立不易方終始變化者恒之道所以久而不窮立不易方者恒之節所以久而不變初六浚恒貞凶无攸利象曰浚恒之凶始求深也四應初理之常初求四亦理之常然不安於義命而躁於求挟隂柔之資持巽入之術相求之始不量其交之淺深而遽深求於其上雖正亦凶何利之有盖勢利之塗猶萬仞之淵深則没淺則出君子疾趨而避之且恐不免而又求深可乎賈捐之之薦楊興為京兆以楊興之薦己於上前是也不然賈誼之説文帝京房之説孝元所謂雖正亦凶者與九二悔亡象曰九二悔亡能久中也以陽居陽常也九二以陽居隂非其常也宜悔而亡者二五相應皆恒久於中道者也人皆曰予知擇乎中庸而不能期月守也三月不違一善不失其惟顔子故擇中庸無祗悔仲尼皆以許之九三不恒其徳或承之羞貞吝象曰不恒其徳无所容也九三以剛躁之資處上下之間當雷風之交動而无恒者也其徳无恒不可以作巫醫為卜筮難乎免於羞辱矣盖忽忻驟忿父不能以安其子初正終譎士不能以孚其朋如鄭朋之兩從吕布之屢叛人誰納我宜其无所容身也九四田无禽象曰久非其位安得禽也九四以陽居隂以剛居柔非其位也然久居而不去貪得而不止如日獵而不反者安得禽之獲哉揚雄久居莽賢之間官不過侍郎執㦸是也金門玉堂非其時則有道者不處也顧雄欲之而不得者作易者其知雄之心者耶六五恒其徳貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也夫强於婦其敝猶弱君强於臣其敝猶柔今也五君位也六五長男之正體也為君則柔弱而下從九二之强臣為夫子則柔弱而下從九二之强婦以此為恒此婦人之以順為正以一守順則吉也為君為夫制義自我者也而用之凶於而家害於而國必矣其魯哀晉元之世乎上六振恒凶象曰振恒在上大无功也處静者如奉盈懼其動也處動者如操舟願其静也處動者猶願其静處静而願其動也可乎上六居守恒之世當處静之時為在上之臣謂宜鎮以安静之治可也今乃挾隂邪之資居震動之極必欲振而摇之者志於要功而已聖人探其志而折之曰大无功也桓温枋頭之役殷浩桑山之師是已功安在哉艮下乾上遯亨小利貞彖曰遯亨遯而亨也剛當位而應與時行也小利貞浸而長也遯之時義大矣哉吾讀易至遯而嘆曰遯其見聖人之心乎聖心焉在曰在天下而不在一身故曰遯亨遯而亨也遯而亨者窮於進而通於退雖然聖人之退聖人之通天下之窮也聖人豈悻悻然决於退哉五以剛陽當君位而與二為應其時猶可與有行者乎二隂雖長於内然漸而未驟四陽猶盛於外其勢猶可以小有所正而未至於大壊也乎孔子去魯而行之遲孟子三宿出晝而猶曰速聖人之心在天下如此故曰遯之時義大矣言其進退之時去就之義甚大而未可躁也故小人之於一身徼倖於萬一聖人之於天下亦徼倖於萬一象曰天下有山遯君子以逺小人不惡而嚴卦之名有以象有以義地中有山謙象也天下有山遯義也何謂義取二隂長於内四陽將消於外三變則為否也其義為陽避隂君子避小人故曰遯遯者退而避也退而避者豈必江海山林然後為遯哉大遯遯於朝小遯遯於野舜遯共驩不於歴山旦遯管蔡不於曲阜孔子與陽貨同國孟子與王驩同事故曰君子以逺小人不惡而嚴孔子答貨曰諾吾將仕矣孟子與驩朝暮見何疾惡之有見貨亦矙亡見驩未嘗與言行事何不嚴之有惟不惡故不害惟嚴故不汙初六遯尾厲勿用有攸往象曰遯尾之厲不往何災也進處後則逺利明退處先則逺害蚤處遯之世上九剛而知㡬則最先遯九五剛也則又遯九四剛也則又遯故上為肥遯五為嘉遯四為好遯皆喜其蚤也初六柔而不能决止而不能行又居遯之最後故為遯尾故危厲而災揚雄仕於莽蔡邕仕於卓是己曰勿用有攸往又曰不往何災言其往之不蚤今往无及也程子曰它卦以下為初遯欲在前故初乃為尾尾在後六二執之用黄牛之革莫之勝説象曰執用黄牛固志也六二不言遯者二遯之主也四陽為我而遯者也以隂長之極居大臣之位聖人幸其柔順中人之資不能為奸雄之魁也又憂其執柔順之不堅也則己未必能亂天下而无固志以從亂者有矣張禹從鳳孔光從莽皆大臣之柔順而无固志者黄中也牛順也執與革皆堅也堅執柔順則其順不可勝言矣九三係遯有疾厲畜臣妾吉象曰係遯之厲有疾憊也畜臣妾吉不可大事也九三非无剛明之質而暱係於二戀戀而不能遯亦終於危害而己此紀唐之所以媿龔勝機雲之所以媿張翰也暱係非大人之事也臣妾小人之事也以己臣妾人則吉以己臣妾於人則危九四好遯君子吉小人否象曰君子好遯小人否也遯而誠為好遯隠而偽為素隠好遯者如好好色素隠者如鄉原徳之賊隠而偽不若不隠而誠也九四以乾之初當遯之世知遯之早味遯之腴宜其好遯之篤也故聖人許其為君子賛其為吉又歎其非小人之所能為也微陋巷之顔汶上之閔舞雩之曽其誰實當之九五嘉遯貞吉象曰嘉遯貞吉以正志也九五以天徳宅君位而當遯之世其將焉遯而亦曰嘉遯貞吉又曰以正志何也聖人天也天不能違時况聖乎故堯舜遯天歴伊周遯天經孔孟遯天意是六遯者遯之至嘉志之至正者與上九肥遯无不利象曰肥遯无不利无所疑也上九以剛斷之極居遯之世在无位之地處一卦之外遯之最先者也自非道徳之豐肥仁義之膏潤安能去之无不利决之无所疑乎此孔子不脱冕而行孟子浩然有歸志之事也乾下震上大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣惟正故大惟大故正正則舉天下萬物莫能加不曰大乎大則舉天下不正无所事不曰正乎正而大大而正天地之情不過是也而况人乎天地之情不可見也以正大而可見學者求道舎正大何適矣四陽盛强二隂微滅大者勝則小者衰剛者動則柔者退强者長則弱者消理之自然也泰曰小往大来是也象曰雷在天上大壯君子以非禮弗履不有雷在天上之巨力不能有非禮弗履之至行盖以雷震之威震其私以天討之師討乎已初九壯于趾征凶有孚象曰壯于趾其孚窮也初九以陽剛之資當陽盛之時宜其可以强而征也而征凶信窮何也在下故也在下而用壯此賈誼欲去絳灌南蒯欲去季氏所以凶且窮也有孚者信其必然也九二貞吉象曰九二貞吉以中也九二居大臣之位為衆陽之宗當大壯之世曷不舉一世以大有為以慰天下之望乎而循循然以剛居柔以中自守僅能貞而吉者陽既壯矣壯既大矣又振而矜之豈不以過中失正而敗吾大壯之勢乎故四門穆穆之日舜无復四罪之舉四海皇皇之後周公无復三監之功至魏元忠之再相依違无所建明裴度之晚節浮沉為自安計豈大壯九二之謂哉九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也九三强之極也其强可以果於勿用不可以果於用故聖人戒之曰用之則為小人勿用則為君子小人如羝焉喜於鬭而狃於勝喜於鬭故技止於一觸之勇狃於勝故怒及於无心之藩然藩无心而能係角易往而難反終覊纍其角而後已羸與纍古字通也故雖貞而亦厲而况不貞乎陽處父灌夫之徒是己用罔无所用也羸其角鄭𤣥作纍九四貞吉悔亡藩决不羸壯于大輿之輹象曰藩决不羸尚往也九四居近君之位得衆陽之助而能以剛居柔不用其壯此其所以貞也故吉而悔亡九三觸藩而羸九四不觸而决者九三遇九四之藩而九四之上皆隂爻也豈惟藩之决亦无羸角之憂豈惟角不羸亦有往進之喜輿之大可往而進也輹之壯尤可往而進也三十輻俱壯而輿可往四陽俱協而時可往此陸賈調和平勃以安劉滅吕之事耶程子云輹與輻同六五䘮羊于易无悔象曰䘮羊于易位不當也六五當衆陽盛强于下之時乃能使衆陽帖然而自䘮者正以柔順和易之徳而調伏之也故无悔然則六五之才雖與位不相當乃所以為相當也徳踰於位位踰於才故也羊即四陽也唐代宗以之上六羝羊觸藩不能退不能遂无攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也上六以壯之終居動之極故亦有羝觸藩之象不能退居衆爻之上也不能遂處一卦之窮也故无攸利然猶幸其柔也故艱則吉君子之進也揖必以二其退也辭止於一唯其思之詳也是以進之難也進之易則退必難矣上六之不能遂非病也不能退乃病也以隂柔之人超六位之上眷眷焉而不能退上不過為張華其下商鞅李斯矣艱則吉在初而進之難也至於其終譬諸乘虎下則死不下亦死好進而上人者可不懼乎誠齋易傳卷九
