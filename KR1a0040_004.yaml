body:
  text: 誠齊易傳卷四宋楊萬里撰乾下坤上泰小往大來吉亨泰其上古之極治與不惟後世不可復也中古其庶乎爾蓋自有天地以來非一聖人之力至是而後有就也乾坤天地之太初屯蒙人物之太初有物此有養故需以養之養者生之原亦爭之端爭一生焉小者訟大者戰師以除其惡比以附其善畜以生聚履以辨治而後至于泰豈一手一足之力哉故曰古之無聖人人之類滅久矣乾坤開闢之世乎屯蒙鴻荒之世乎需養結繩之世乎訟師阪泉涿鹿之世乎畜履書契大法之世乎泰通堯舜雍熙之世乎過是而後泰而否否而泰一治一亂治少亂多泰豈可復哉故曰泰其上古之極治與小往隂往而外大來陽來而內否泰吉凶之道無他隂陽邪正外內消長而已彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也泰之時天地交而萬物通天地之極治也上下交而其志同天下人物之極治也極治之功幽至於天地明至于人物無不泰而通焉孰為此者聖人也聖人何道而臻此一言以蔽之曰進君子退小人而已消長在彼內之外之在此大哉泰之治乎要哉致泰之道乎或曰小人有才可終廢乎獨不可參而用之御之以君子且化之為君子乎曰易曰內君子而外小人又曰小人勿用必亂邦也聖人之言如是而止爾若曰參而用之御而化之聖人未之言也象曰天地交泰后以財成天地之道輔相天地之宜以左右民天下之理大和生於通大戾生于隔天本乎上而其氣下降地本乎下而其氣上騰天地交通所以為泰也聖人所以補天地助民人不過裁成天地之道還以補其不及合其自然而已豈更駕而外取哉天地之道何道也一言而盡曰交而已君民之情交故鰥寡達乎旒纊君臣之志交故幽側發乎夢卜天人之心交故言行感乎日星大哉交之為道乎初九拔茅茹以其彚征吉象曰拔茅征吉志在外也一茅拔衆根隨一賢舉衆俊歸泰之初惟一陽首進則三陽類進矣欲退羣小固非一君子之力欲進羣賢固不可無一君子之力堯舉一舜乃得十六舜舜舉一禹乃得九禹吉孰大焉君子之志在天下不在一身故曰志在外也九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也六五以柔中之君專任九二剛中之大臣此所以致泰之極治也九二將何以答六五之知盡致泰之道其綱一其目三何謂一曰包荒以宏其度何謂三曰用人之際不以全責偏不以近忘遠不以羣間孤剛果之才偏于勇責其不全則天下有廢才幽遠之士壅於簡搜之不傅則天下有逸士孤立之賢塞於朋主之不力則天下有厄賢是三人者有一不能兼容豈包荒用人之度也哉九二體其一以行其三此其所以能合於六五中行之君而致泰亨光大之治也尚之為言配合也如西漢以列侯尚主之尚其堯舜野無遺賢之世乎九三無平不陂無往不復艱貞無咎勿恤其孚于食有福象曰無往不復天地際也平與陂相推往與復相移居泰之世者勿謂時平其險將萌勿謂隂往其復反掌九三陽盛極矣隂將復泰將否矣可不懼乎君臣克艱而守正庶乎其無咎倘或不恤此理之必信則將自食其福而永終矣食如食言之食沒而盡之之謂也何也天地交際隂陽往來在九三六四之間也開元之末天寶之初其泰之九三乎六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也天下之理屈之甚者伸必烈伏之久者飛必决隂以處下為位之實也今也三隂升而居上失位久矣九三陽盛而衰六四乘其衰而求復帥其類而下集羣飛而來者翩翩然矣此其願欲之所同者故不待結之以富而其鄰從之者甚于從富不待戒之以令而其類信之者速于信令蕭傅隕而恭顯薦貢禹王章誅而欽永賀王氏九齡罷而林甫引仙客國忠其泰之六四乎嗚呼九三之時猶可為也六四之時不可為也六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也王姬之貴不有其貴而貴其夫君人之尊不居其尊而尊其賢此六五以柔中之君而下從九二剛中之臣也言莫子違者主之蔽從諫如流者君之明至于如婦之從夫則有百從而無一違矣豈特如流而已此豫唯克邁乃訓爾交修豫罔豫棄高宗所以從諫之聖也以祉元吉中以行願者君任其臣以致泰之治則泰之福溥乎天下君之願欲孰大于是六五坤之主故為帝妹上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也泰至於上六則隂盛而陽微君子消而小人長泰往而否來如城之頺而為隍於是治化而亂存化而亡國化而家辟化而庶有不忍言者矣詩曰高岸為谷深谷為陵是也天命靡常至此極亂矣雖欲用師孰為之用雖欲告邑孰為之聽雖出于正孰免于吝其懷愍劉石之世乎嗚呼聖人之戒亦不緩矣而猶有不懼者何也坤下乾上否之匪人不利君子貞大往小來泰之卦辭約曰泰小往大來吉亨而已喜君子進而天下治也否之卦辭詳曰否之匪人又曰不利乂曰君子貞又曰大往小來痛小人進而天下亂也元亨利貞卦之四德泰得其一曰亨而又曰吉亨亨之至也否得其二不曰利而必曰不利曷為不利也用匪其人小人之利天下之不利也曰貞而必曰君子貞曷為君子獨貞也君子之貞天下之不貞也泰之君子以一身之亨亨天下否之君子以天下之正正一身非不欲正天下也時不可也故曰君子貞言貞固自守而已彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也易中極亂之辭未有痛於否之彖者匪人一用何遽至于天地不交而萬物不通上下不交而天下無邦乎萬物不通則舉天下而為墟天下無邦則舉國家而為墟小人之禍何若是烈也蓋秦亡于李斯上書之日漢替于張禹談經之時咸陽之煨燼始皇之塗炭何必見而後悟哉內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也隂陽剛柔不惟君子小人而已亦氣類應感而自至也主德不斷亦隂柔也女謁通行亦隂柔也近習用事亦隂柔也是三者有一焉小人乘而入之矣故內小人而外君子小人道長君子道消聖人必先之以內隂而外陽內柔而外剛惟隂命隂惟柔召柔氣類然也象曰天地不交否君子以儉德辟難不可榮以祿不交者湮而不流隔而不達之謂不交之病豈一端而已天不下濟地不上行此一不交也雖然此天地不交之幽者也至有澤不下流情不上通此一不交也是亦顯矣豈幽乎哉雖然此君民不交之遠者也至有君猜而不孚其臣臣忌而不格其君此一不交也是已近矣豈遠乎哉雖然此上下不交之外者也至有一身之中上炕而隂不泝下冰而陽不注此一不交也是已內矣豈外乎哉雖然此一身不交之隱者也至有耳不交乎目目不交乎耳者唐德宗人言盧杞姦邪朕殊不覺耳不達乎目也秦二世笑趙高以鹿為馬之誤而信其言以關東之盜無能為目不達乎耳也一身之中耳目不交是愈顯矣豈隱乎哉是一身之否也非一身之否也一心之否也一心之天地已否矣而欲上下之情通天地之氣交可乎否至于此不可為矣此扁鵲望見桓侯而走之時矣君子當此之時儉德辟難而已辟難可也何必儉德非能忍天下不可忍之窮不能辟天下不可辟之難窮之不忍而難之是辟辟之未幾而誘之者至誘之所投禍之所隨也惟不可榮以祿庶乎免矣初六拔茅茹以其彚句貞吉亨象曰拔茅貞吉志在君也一君子進小人未必退一小人進君子必退非畏一小人也知羣小必以類至也是故泰之初九一君子進而有拔茅之象此其所拔者蘭也否之初六以一小人進而亦有拔茅之象此其所拔者莠也拔蘭者其根不盈掬拔莠者其根可束小人之類進甚于君子之類進也歡兜入而四凶集賈充不留而羣小憂故初六一隂方長而君子已知其三隂之類從矣已有引身而退貞固自守之心矣曰貞吉亨者以退為吉於進以窮為亨於亨也自君子以退為吉以窮為亨而天下懼矣雖然此豈君子之本心哉彼拔茅彚進而此貞吉之志未嘗不在君也畎畝不忘之義也六二包承小人吉大人否亨象曰大人否亨不亂羣也六二以柔諂之資居大臣之位下則并包羣小而為之宗如林甫得仙客國忠之助上則順承于一君以堅其權如林甫縱明皇逸欲之樂當是之時羣心相慶可謂小人吉矣為大人君子者宜若之何以否處否以獨處獨則身愈否道愈亨貞愈獨羣愈遠矣羣謂羣小也六三包羞象曰包羞位不當也初六小人之媒許史是也六二小人之魁石顯是也六三小人之朋鄭朋五鹿是也然小人鋭于初壯于二窮于三羣小用事三斯盈盈斯窮矣九四一陽在外者將復進矣六三之勢安得而不窮雖然君子見幾於未窮之先小人樂禍於己窮之後包羞忍耻以苟富貴而不忍去不知其位之不當而身之將危也思上蔡之大悔華亭之鶴而後已九四有命無咎疇離祉象曰有命無咎志行也濟否在君子主濟否不在君子而在君君子有濟否之才有濟否之心而其君無濟否之命則為陳蕃為曹爽為建寧王倓其君有濟否之命而君非剛陽之君則為魯昭公為高貴鄉公上無剛陽之君下無剛陽之臣而君有濟否之命則為文宗為訓注九四以剛陽之臣受九五剛陽大君之命以此清羣小而濟否世豈惟無咎又且疇類皆䝉福焉可以行其志矣此志即初六之時懷在君之志乃今得君而行其志耳非一日之暫非一旦之驟也九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也濟否之君不可以有輕心心輕無成不可以有汰心心汰無終欲濟否有成而能終其惟有警心者乎九五以剛陽之資宅中正之位當否極之世又得九四上九羣陽之助可以休息天下之否無難矣雖然聖人有憂之憂之者何憂其無警也惟勿恃其否之可休勿安其休之為吉而常有危亡之慮則休否之吉可以固如桑本而不拔矣光武日謹一日以十年為遠審黃石存苞桑所以能身濟大業延祚四百也曰其亡又曰其亡警之至也不然如梁武帝唐莊宗身得天下身失天下休否可恃乎大人謂三陽上九傾否先否後喜象曰否終則傾何可長也上九以剛陽之才佐九五剛陽之君得九四剛陽同列之僚友撥亂而反之正傾否而復於泰可以喜矣上九猶有懼心焉以傾否為先以喜泰為後剛制其喜而不敢先焉如此則否終必泰否不長否矣君有其亡其亡之戒臣有先否後喜之心馮異謂願陛下無忘在河北時小臣不敢忘巾車之恩郭崇韜謂無忘戰于河上之時當使煩暑生清凉得否之九五上九之義矣離下乾上同人于野亨利涉大川利君子貞人與人羣居天地中能高飛遠走不在人間乎而獨與人為異何也人異乎人者物之棄人同乎人者物之歸然同而隘則其同不大同而䁥則其同不公同人于野公而大也同乎人者公而大則天下歸之故亨天下歸之何險不濟故利涉大川然則當無所不同乎曰不然利在君子以正道相同而已君子與小人為同則君子為小人小人與小人為同則小人害君子豈正也哉故九五可同六二而九四不可同九三彖曰同人柔得位得中而應乎乾曰同人六二以隂居隂故曰得位下卦正中故曰得中二與五應故曰應乾同人曰同人于野亨利涉大川乾行也一柔應五剛下應上也五剛應一柔而九五正應上應下也上下相應其同大而公矣乾行上應下之謂同人曰三字衍文明以健中正而應君子正也唯君子為能通天下之志兩武相戰兩邪相傾安能同哉以乾之剛健而離以文明下之非兩武也以五之中正而二以中正應之非兩邪也所以為君子之正同也君子以正相同則天下之志正者感而通不正者化而通焉往而不大同哉象曰天與火同人君子以類族辨物天與火其性俱上故為同人天火相同于上萬物相見于下粲然有辨矣故君子以之類族辨物既曰同人又曰類辨無乃為異乎同其不得不同異其不得不異所以為同之大所以為利君子初九同人于門無咎象曰出門同人又誰咎也門室之始初九同人之始吾與人曷常不同隔之者門也吾一出門則天地四方孰不吾同者何咎之有此顔子克己之學六二同人于宗吝象曰同人于宗吝道也彖辭贊六二得中而應乎乾贊其德之中正也爻辭吝六二同人而同于宗吝其才之柔弱也以同于宗族為同則宗族之外皆築而封之於同之外矣此楚王亡弓楚人得之之心也吝嗇甚矣九三伏戎于莽升其高陵三嵗不興象曰伏戎于莽敵剛也三嵗不興安行也九三挾初九同剛暴之德覆之于六二之下伏戎于林莽之中也據下卦之極而居其上升于高陵也九三何為而然也忌六二應乎九五之君而欲劫之以同己也使六二肯同己則九三奸雄之心濟矣其如九五之剛而不可敵何是以久而不能興也桓溫忌王謝之忠壁人以圖之而不能此伏戎者也欲得九錫以升高而王謝緩其事未幾死焉此升于高陵三嵗不興者也安行者安得而行哉九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也九三九四同利相趨同害相死之人也二人者皆有覦其上之利而有牽其下之害是故九三恃初九以為戎九四恃九三以為墉一伏戎于下一乘墉于上以仰逼九五之尊其志皆不利六二之應九五而有牽于己也六二肯我同而後九五之勢孤九五孤而後九三九四之援合今六二秉大臣中正之德堅與君同心之操凛不可奪則九三有兵九四有城將何施焉陶侃握重兵據上流此九四乘墉之勢也外則憚溫嶠之忠內則創八天之夢欲攻其上疑其不克欲干天命知其不可豈真畏天下之大義而自反君臣之天則哉知困而僅保其吉爾嗟乎六二以一柔弱之君子而能抗九三九四兩剛强之小人隂消其一而使之不興深愧其一而使之自反者中正而已矣人臣苟中正矣何强之不弱何弱之不强哉九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也九三九四之謀下欲奪六二之上應上欲間九五之下應豈惟六二忠而不二微九五中直而不疑臣亦豈能自信于君哉管蔡毁旦燕蓋譛霍先悲而號也羣小之黨既殱周霍之忠益明後喜而笑也惟成王昭帝之中直然後能力主君子而力勝小人大師剛而力之謂故師莫大乎君心而兵革為小克莫難于小人而敵國為易君臣同則人畢同矣上九同人于郊無悔象曰同人于郊志未得也郊野一也同人于野為亨為利同人于郊止于無悔其未得志者上九居一卦之外而無位雖欲同人而人皆同乎九五矣誰我同者此項羽之衆一散而不再合李密之衆再合而卒不能濟故曰志未得也君子之於人異勿處先同勿處後乾下離上大有元亨程子謂離乾合而為卦之才故能元而亨又曰大有盛大豐有也彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨同人大有一柔五剛均也柔在下者曰得位曰得中曰應乎乾而為同人我同乎彼之辭柔在上者曰尊位曰大中曰上下應而為大有我有其大之辭德剛健而文明應乎天而時行皆所以有其大乾健離明象曰火在天上大有君子以遏惡揚善順天休命離為火為日卦之德有日之明今也處明不以盈而以虛乾為天為健卦之德有天之健今也處健不自高而自下此大舜舍己從人不有其大也以日之明行天之健則天下之善惡內無遺照外無遺决然亦豈自用哉天討有罪吾遏之以天天命有德吾揚之亦以天吾何與焉此舜禹有天下而不與也故曰順天休命同人明在下而不敢專故止於類而辨大有明在上而由己出故極于遏而揚初九無交害匪咎艱則無咎象曰大有初九無交害也初九禀剛陽之資不曰無德逢大有之世不曰無時上有六五之主不曰無君下有衆陽之賢不曰無類然以無交而害者孤遠在下故也賈生明王道而黜於文帝好賢之代仲舒首羣儒而廢于武帝用儒之朝絳灌公孫非其交也此非君子之咎也咎有所在也愈難進君子愈無咎矣故聖人傷之曰大有初九無交害也非傷初九也傷大有之世猶有此遺恨也雖然使大有之世孤遠皆不遇則釣築終不遇矣九二大車以載有攸往無咎象曰大車以載積中不敗也蓋軫輪輻之器不厚不良者非大車文武常變之用不運不博者非大才惟大車為能輕天下之至重邇天下之至遐夷天下之至險大才亦然不然安有重積于中而不敗于外哉九二以中正之德剛健之才為大臣任大事當大安危大治亂而能無往而或咎者有大才如大車也故辭聘受聘事夏事商相成湯相太甲有往必正者初非二伊尹出征入輔作都制禮相武王相成王有往必集者亦非兩周公九三公用亨于天子小人弗克象曰公用亨于天子小人害也九二大臣九四邇臣九三位雖高而非大臣之任君尚遠而非邇臣之親蓋諸侯君公之職也諸侯之於天子何以驗其忠與否哉此心通塞而已跡遠而情邇身疏而心親此通于天子也不然源源而貢於外躍躍而萌于內可謂忠乎此所謂小人弗克也爾身在外而心王室朕心朕德而惟乃知周之諸侯所以忠賢也亨者通也九四匪其彭無咎象曰匪其彭無咎明辨晢也初九大有之寒士九二大有之大臣九三大有之諸侯九四邇臣也孰為邇臣殆周之世外之左右諸大夫內之侍御僕從其是與知政守藩邇臣不如大臣諸侯近君用事大臣諸侯不如邇臣近君者勢不震而盛用事者權不招而集權勢所歸禍敗所隨也惟明足以辨禍福之機則能不有其盛庶乎無咎矣彭者盛之至晢者明之極不然為主父偃為董賢為𢎞恭石顯為李訓鄭注禍敗可勝言哉衛青之不薦士張安世之遠權勢可謂有匪其彭之明矣九四離之初故明晢以陽處隂故匪其彭六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而無備也六五為大有盛治之君離明而晦之以隂虛中而執之以柔專任誠信故能感發其下之志愧服其下之心下感發則君臣之孚不約而自交下愧服則道德之威不猛而自洽信以發志以我之誠信發彼之誠信也易而無備以我之和易徹彼之周防也武帝信霍光託以周公之事昭烈信孔明至有君自取之之語然二臣者終身不忍負二主之託又焉用周防也哉然必如大有之羣賢然後可始皇信斯高順帝信梁冀易而無備可乎上九自天祐之吉無不利象曰大有上吉自天祐也上九以剛陽之德居一卦之外而能安然退處于無位之地淡然不攖於勢利之場此伊尹告歸子房棄事之徒與保其名節而終其福祿自天祐之吉孰大焉嗟乎八卦乾為尊六十四卦泰為盛然乾之上九悔于亢泰之上六吝而亂盛治備福孰若大有者六爻亨一吉二無咎三明主在上羣賢畢集無一敗治之小人無一害治之匪德生斯時雖如初九無交而難進縕袍華于佩玉飲水甘于列鼎而况九二之大臣九三之諸侯九四之邇臣上九功成身退之耆舊乎嗚呼盛哉誠齊易傳卷四
