body:
  text: 誠齊易傳卷十六宋楊萬里撰兊下坎上節亨苦節不可貞彖曰節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通天地節而四時成節以制度不傷財不害民厥初生民無窮民也民奚而窮也民之欲無窮而財之生有窮以有窮奉無窮民於是乎始窮聖人憂焉故受之以節節者約侈而歸節也節則裕裕則通故曰節亨亨者通也然有財之窮亦有節之窮財之窮自不節始節之窮自過於節始過於節則人情苦之而不可久於是節之說又窮聖人憂焉故受之以中中者非不節亦不過於節故曰苦節不可貞又曰其道窮也又曰中正以通中則通矣雖然中無形也無形則難守於是中之說又窮聖人憂焉故受之以制先之禮後之法禮一立則截然不可踰法一立則凛然不可犯上下有分名器有等然後財不傷民不害矣非必上之虐取然後為傷害也下無制度則財以侈自傷民以侈自害也下侈且然况不止於下侈乎大哉聖人之制度乎其如天地乎天地節而四時成聖人節而天下富坎陽兊隂故曰剛柔分二五皆以陽居中故曰剛得中兊說坎險故曰說以行險二陽當君臣之正位故曰當位冬閉不固則春生不茂故曰天地節而四時成象曰澤上有水節君子以制數度議德行水之在澤盈則溢平則鍾此節之象也兊說坎險說過則流險以節之此節之義也二陽盛二隂節之一陽盛一隂節之此節之理也故曰澤上有水節民侈受之以節節苦受之以中中無形受之以制聖人之防人欲足矣乎曰未也約民以制以制為制也先民以身以身為制也故曰制數度為未足必反而議吾身之德行焉嗚呼周矣初九不出户庭無咎象曰不出户庭知通塞也君子將有以節天下必始於節一家節一家必始於節一身顔子之節非求之外也節性而已不遷怒喜怒節矣不二過過愆節矣一簞瓢奉養節矣不出户庭之間而制數度議德行不傷財不害民節之道具矣何咎之有塞則行之户庭而準通則行之四海而準而況為邦乎初九窮而在下故不出户庭九二不出門庭凶象曰不出門庭凶失時極也不出户庭不出門庭一也以初則無咎以二則凶何也初處士二大臣也身為大臣上逄九五陽剛中正之君謂宜佐其君制數度以節天下之欲議德行以節其君之欲此其時不可失也今乃下同初九處士之節私淑門庭之內而已一何不廣也故凶故公孫𢎞之布被節則節矣於窮奢之主虛耗之民何禆焉九二說之主容說之臣故也六三不節若則嗟若無咎象曰不節之嗟又誰咎也六三以兊說隂柔之極而在人上挾其說豫充盈之勢極侈汰以自奉而不知節至於人惡其盈鬼瞰其室天收其聲然後戚嗟慨歎亦何及矣自取之耳又誰咎哉鄭伯有晉石崇是已至見逐於國人追誦於白首而不悟也三居澤之極故溢而不節六四安節亨象曰安節之亨承上道也六三之不節不及於節上六之苦節過於節無過焉無不及焉節而中中而安其惟六四乎六四在坎之下居水之趾安焉自節而斷然不溢者也方九五之君以甘節先天下乃得六四之大臣安節以承其上之道也此天下所以蒙不傷財不害民之福也故亨非六四之亨天下之亨也代宗欲致太平而楊綰以清德相曾不崇朝而黎幹崔寬郭子儀翕然而承之非承綰也承代宗之道也使綰之清節不出於安而出於强是三人者肯心服而承之哉幹與寬可强而服也子儀可强而服也乎九五甘節吉往有尚象曰甘節之吉居位中也九五以剛德為節之主宜其過於節也然甘而不苦者以其位乎中也中則不過不過則可美而易從矣禹是也宫室卑矣衣服惡矣飲食非矣何其節也然致美黻冕致孝鬼神又何華也此其所以無往而不可尚天下皆受其吉康與上六苦節貞凶悔亡象曰苦節貞凶其道窮也上六居節之極故為苦節苦節非不貞正也而奚其凶果凶矣夫凶悔吝大者凶小者悔小者尚亡大者奚有焉悔無凶亦無矣今也前曰凶後曰悔亡是凶而不凶也學者至此宜覃思焉蓋君子之行或過或不及故聖人之言或抑或揚上六在一卦之外此世外之士也世外之士過於節而行一概苦節亦何惡於人然厲其節極其苦以為貞正之操而不屑一世此世之所疾故有凶之道焉伯夷隘是也然人苦其苦而已甘其苦不怨不懟不惑不偷又何悔焉聖人憫其人而深戒之以凶又嘉其節而深許之以悔亡悔且亡况凶乎是不許其一而許其百也聖人之意章矣又哀之曰其道窮也豈不曰斯人也而有斯窮也不以非道而窮蓋以道而窮者與孔子曰君子固窮固之為言固當然也又曰伯夷叔齊餓于首陽之下求仁而得仁又何怨然則上六之凶何知非吉而其窮何知非通與嗚呼上六之道其使人悲也雖然可悲也而上六則榮矣貞凶悔亡之辭學者勿以其一廢其一則上六之窮未為終窮也說者乃以上六爻象之辭與卦辭所謂苦節不可貞之辭彖所謂其道窮也之辭比而同之使其一意而申言則易贅矣夫卦彖之辭聖人不以苦節繩天下也上六之辭君子以苦節繩一身也以苦節繩天下不可以苦節繩一身又不可是退夷齊而進伯有石崇也豈惟易贅也節之卦可廢矣兊下巽上中孚豚魚吉利涉大川利貞彖曰中孚柔在內而剛得中說而巽孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也中孚之為卦三與四二柔在內則中虛中虛則無我二與五二剛得中則中實中實則有物中庸曰不誠無物心如器焉誠之在心如物之在器焉器虛然後物得而實之心虛然後誠得而實之若有我之心先立則吾心先為有我之私所實矣將何地容此誠哉心者神明之舍舍不虛神明將何居焉夫惟此心洞然而虛則至誠充然而實矣充然者發於中而孚於外此所以為中孚也中有玉者外必輝中有誠者外必孚孚之為言此感於彼彼信於此之謂也是故中孚之所發上行之則順下信之則說故曰中孚柔在內而剛得中說而巽孚乃化邦也孟子曰不誠未有能動者也中孚所動至微而信豚魚至危而蹈水火至顯而化邦至應乎天焉往而不動哉海客之機心海人未知而鷗鳥先知中孚之至信所以及豚魚燕客之忮心秦人未覺而白虹先覺中孚之利貞所以應乎天然則涉危化邦有不足為者象曰澤上有風中孚君子以議獄緩死風無形而能震川澤鼓幽潛誠無象而能動天地感人物此澤上有風所以為中孚心一誠而誠萬用用之大者其惟好生不殺乎故中孚至誠不殺之心首用之以議獄緩死好生洽民舜之中孚也不犯有司天下之中孚也天下中孚則萬心一心矣鳥巢可窺況豚魚乎無他不殺之心孚于鳥耳使無誠慤好生之心巢中之鳥不為海上之鷗乎中庸曰誠不可掩議獄者求其入中之出緩死者求其死中之生至元惡大姦不在是典故四凶無議法少正卯無緩理初九虞吉有他不燕象曰初九虞吉志未變也邪不間不可與存誠僞不去不可與言誠是故中孚之誠不可不防其有他也然責子在初間家在初防心亦在初若生子在初生見於書責子之法也間有家志未變見於家人之初九間家之法也虞吉志未變見於中孚之初九防心之法也虞之為言雖無虞戒不虞是也不及其初志之未變而防之俟其亡而追炎而撲曲而揉決而隄則噬臍矣一身之外無非妄一誠之外無非僞妄與僞皆所謂有他者也如禦冦賊如避風雨察吾心一毫有他則惕然而不安則防之周矣不忠不信不習當如曾子之所省者三勿視勿聽勿言動當如顔子之所克者四其庶幾乎不燕不安也九二鳴鶴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也九二以剛正誠實之德而遇九五剛中誠實之君進而居大臣之位其孚何先其惟以賢事君以心感賢乎夫惟九二剛而不諛正而不忌誠實而不欺以此號召天下之同類是心一萌微而章隱而顯羣賢孰不響然而和之者蓋有此爵祿者我九五之君也不私此爵祿於已而樂與羣賢共之者九二中心之至願也出於中心之至願而無一毫之忌疾同類何疑而不孚何畏而不應乎彼有實忌仲舒之經術而薦之以相悍藩不悅真卿之剛正而薦之以使叛臣豈中心之孚也哉鶴祥禽也以喻九二之賢也在隂以陽處隂也其子同類也六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也水之為物深則靜淺則動深則融淺則結六三澤水之最上淺而未深之水也今夫澤水之遇風也其上則波其下未必波其遇寒也其淺則氷其深未必氷何則淺則易搖深則難撓也六三為澤水之淺居柔說之極故一與物遇鼓之則動罷之則止結之則泣融之則歌安能有守而自信哉人必自信然後人信之六三已且不自信又何孚於人無它柔說躁動而在人上其位不當故也儀秦軫緩在在反覆之人是已物我相遇曰敵風水相遭亦曰敵澤遇巽故曰得六四月幾望馬匹亡無咎象曰馬匹亡絶類上也為臣者不能誠其身則不能誠於君六四以隂居隂以順居下處已而不盈也不曰誠其身乎以一隂承九五孤進而不黨也不曰誠於君乎人知以盈自裕莫知以盈自仆人知以黨自助莫知以黨自蠧六四不盈如月之近於望不黨如馬之亡其匹其中心之誠人信之君信之又何咎矣張良蚤師黃石晚從赤松月幾望也韓愈前不汙伾文後不汙牛李馬匹亡也絶類上也謂絶黨以承上九五有孚攣如無咎象曰有孚攣如位正當也至誠如中孚可謂道盛德至矣然五爻不言孚而九五獨言有孚豈不曰誠之至孚之盛其惟九五之所獨有而二三皆莫望其末光乎曰然然則九五之孚下以其化邦則民斯從感物則物斯信涉險則險斯夷應天則天斯動乎曰是未足為九五有孚之吉也九五以剛健中正誠實之德來天人萬物之應方且惕然如拘攣而不少肆歉然自斂退而不敢居若不足以受大人萬物之歸已而不足以當天下之正位者此九五有孚之至也曰攣如者九五之心也曰位正當者非九五之心也天下之心也至此所以為中孚之主也卦辭吉而此無咎亦九五之謙也九五雖剛而為巽順之主故攣如上九翰音登于天貞凶象曰翰音登于天何可長也天下之理德之小者不可以僥大任才之下者不可以慕髙位無其資者不可以過其望也上九處中孚之外非中孚之徒無中孚之實為中孚之聲此妄而盜真詐而盜誠者也而乃挾其聲之善鳴下欲以動夫衆上欲以動夫君而躐取髙顯之位求之亦不可得得之亦不可久雖正亦凶况不正乎此如樊籠之雞乃欲一飛而登天可乎夫一舉千里者鴻鵠也翔于萬仞者鳯凰也怒而九萬者鵬也何也彼誠有其才德也曽謂一雞而能登天乎晉之王衍唐之訓注是也上九巽之極髙者故曰登天巽為雞故曰翰音艮下震上小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之者不宜上宜下大吉上逆而下順也小過之世何時也用靜吉用作凶之時也曷為靜吉而作凶也君臣俱弱一也上動而下止上作而下不應二也隂盛而陽孤邪衆而正寡小人長而君子消三也可以不靜而輕作乎哉當是之時君臣必也自揆其才互量其力而安處其時小有所過則可大有所過則不可卑有所就則宜髙有所舉則不宜如飛鳥焉有所飛必有所歸也飛而無歸凶孰大焉是故飛有山可棲則不可以排空而飛也若下舍其艮之山而欲上窮乎震之大空至於無歸而遺音哀鳴則何及矣是以聖人首戒之曰小過亨利貞可小事不可大事言小者過則亨則利然必正乃可也有所為則不可也猶恐其不量才力不度時宜而輕動也又戒之曰有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也言無若飛鳥薄山棲羡雲飛始乎躁卒乎悔也維卑飛則吉則順則宜髙舉則逆則不宜也周平王之伐鄭魯昭公之伐季氏東晉之北伐石晉之挑契丹是已柔得中謂二五剛失位而不中謂三四上逆謂五上以隂乘陽下順謂初二以柔乘剛內二陽外四隂有飛鳥舒翼之象聖人因其飛之象而戒其飛之過象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉澤滅木為大過蓋澤水沒於林木之上此過之大也山上有雷乃為小過何也此以二卦之時言也夫雷之聲其收以仲秋其發以仲春艮山也為東北之卦居寅丑之間今也山上有雷是季冬孟春之間而雷聲已發是反時為災也故亦為過然已近於發生之時故其過小過與不及皆德之纍也亦皆君子進德之地也小過過矣君子用之則過於善故為過恭為過哀為過儉是三德者病不過耳過何病哉然是三者豈君子獨能之乎小人亦能之為過傲為過易為過奢初六飛鳥以凶象曰飛鳥以凶不可如何也飛鳥不宜上宜下大吉初六下也宜吉也而曰飛鳥以凶何也卦之形有飛鳥之象內二陽之實為身外四隂之散為翼而初六上六又翼之鋭者也翼之鋭者不量其力之微不飛則已一飛則有髙翔逺過一舉千里之意初六隂柔之小人常有進躐髙位之心故聖人戒之曰飛鳥以凶又曰不可如何言髙位必疾顛如髙飛之必速墮也蓋小過諸爻皆患於過不患於不及而初六之小人一過則進居於二而為大臣矣豈不凶于而國哉凶于身不足道也故陽城欲壞白麻而德宗不相裴延齡李甘欲裂詔書而文宗不相鄭注此得聖人戒初六之㫖矣六二過其祖遇其妣不及其君遇其臣無咎象曰不及其君臣不可過也六二以隂柔之小人居大臣之髙位常有過其分之心故常有弱其君之心然倣徨而不敢進窺覦而不得僭者有二陽以振其前也過其一又遇其一進則九四禦其腹退則九三要其背故其僭不及於六五之君非不欲及也遇二臣之振已不可越而過也不有君子其能國乎二剛失位而其有益於君猶如此使其得位宜如何哉周勃有驕主色而折於袁盎之一言淮南有反謀而寢於汲黯之死義陶侃有坐觀危亂之意而忌於溫嶠義旗之見指皆遇其臣故不及其君也九三以陽居陽故稱祖九四以陽居隂故稱妣過其祖遇其妣豈惟六二安而無咎哉天下國家實無咎也九三弗過防之從或戕之凶象曰從或戕之凶如何也君子之進不可過惟防小人不可不過防之不過有時不幸而從之矣非必升其堂嚌其胾如永從鳳光從莽固從憲雍從卓然後為從也不防而信之斯為從之矣從之斯受其戕賊之禍矣國人皆知白公將為亂以告子西而子西獨不信曹操之篡漢路人皆知之而荀彧獨不疑至九錫而始有異議故皆受其禍六二有進而僭其君之心故聖人戒九三之迫切如此也九四無咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也當小過之世逢隂柔之君有羣隂用事之黨上六之小人居髙位矣六二之小人為大臣矣初六之小人則又飛翔而並進矣當是之時君與國其殆哉不幸而二剛皆不得位一居下卦之外一居上卦之下皆非得要地者又幸而剛分處於內外以遏羣小往來之衝二君子者豈以失位而不勉乎聖人既戒九三以過防小人而勿從之矣則又重告九四曰爾雖失位不當也爾雖恬退而弗過於進也然爾既遇六二之欲越爾而上僭而往從之則必厲勿用往也必戒可也永守爾之貞正可也能是則無咎矣彼隂柔之小人終不可使之道長也此聖人戒九四之至也天下多難得一君子猶可恃之以安而況九三與九四同志而分處乎一蔽遮王室於外一扞衛吾君於內雖六五之弱庸可覬乎故周公居東不可無召公之為保良平從行不可無蕭相之留中此愛莫助之詩所以一倡而三嘆也六五密雲不雨自我西郊公弋取彼在穴象曰密雲不雨已上也六五弱矣然九三九四相與協力或推之或挽之宜其能大有為而澤潤天下也然密雲而不雨何也天地之氣隂陽和則雨今衆隂寇二陽二陽戰衆隂隂陽不和一不雨也隂陽均則雨今隂盛而陽微二不雨也隂陽交則雨今震動于上而艮止於下上下不應隂陽不交三不雨也雨露發生之母雷霜肅殺之主震與艮皆東卦也生卦也西郊殺地也卦為生卦而雲興於殺地安得雨四不雨也六五之君何為其然也一隂不能主二陽亦不能勝羣隂故也大而澤潤天下既不能卓然立沛然施矣乃欲力其大弱以矜其小强如初六上六之飛鳥而不能射也如六二之逾越而不能止也則亦乘其棲宿於巢穴者弋而射之不知夫弋不射宿聖人不乘物之不虞以為己之能也乘物之不虞以為己之能亦可羞矣晉明帝戮王敦之尸唐代宗竊輔國之首是足為天子之威也乎六五之公弋取彼在穴是已六五以隂處陽故雖弱而猶有所弋以為强也然則古之弱主亦曷嘗無有為之志哉六五震之主也然自九三九四等而上之至於六五則為兊兊正秋也故曰西郊雲降則雨升而不降則不雨已上者升而不降也公弋言王公之弋也易有辭同而㫖異者故履之幽人為男子而歸妹之幽人則為女子歸妹之跛眇為女子而履之跛眇則為男子然則小畜之與小過同於密雲不雨中孚之與小畜同於有孚攣如豈可比而同之哉董子曰易無達占詩無達詁春秋無達例孟子曰以意逆志是謂得之上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也上六以隂柔之資挾震動之才豈惟不與諸爻相遇而已直超而過之必出其上極其髙如飛鳥焉亢滿如此豈不罹災眚之凶乎上自共歡下暨斯髙其禍敗一轍也而後之小人好進者爭趍之而未已哀哉離下坎上既濟亨小利貞初吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也出多難而入無難是為既濟之世當是之時小者亦亨况大者乎蓋無一人不亨無一物不亨無一事不亨也如濟川焉舍川而陸舍舟而轂危者安險者濟何憂之有然人皆敵於洪流莫或敵於夷塗人皆懼於覆舟莫或懼於覆車是以初吉而終亂也秦滅六國而秦自滅晉平吳亂而晉自亂隋取亡陳而隋自亡惟聖人能外內無患自非聖人外寧必有內憂此鄢陵之勝范文子所以憂晉之必禍也蓋人之常情多難則戒戒則憂憂則治無難則驕驕則怠怠則亂聖人見其初吉而探其終亂惟能守之以貞固而不移持之以憂勤而不息則可以免終亂而不窮矣故戒之曰利貞又曰終止則亂其道窮也剛柔正謂六爻剛居剛位柔居柔位柔得中謂六二終止謂上六柔怠自畫非克終既濟之才象曰水在火上既濟君子以思患而豫防之泰天地之明交也既濟水火之明交而天地之互交也故泰者既濟之純既濟者泰之雜自泰之外孰有如既濟之吉亨者火炎上也降而居下水潤下也騰而居上此水火之明交也初與三五皆乾也分而下於三隂二四與上皆坤也分而上於三陽此天地之互交也天地通氣水火濟飪此其為既濟與當是之時固衆人所喜而君子所懼也見其吉思其亂先其患豫其防可以保初吉而無終亂矣此堯舜警戒無虞之道也初九曳其輪濡其尾無咎象曰曳其輪義無咎也初九濟難之初將去危亂而之吉亨也惟初九以剛居剛有濟難之才又能竭濟難之力如良馬焉駕大車涉大川川將離而未離岸將登而未登自非竭力以曳其輪至於濡尾而不之恤何以能濟乎宜其無咎也此周公東征之事乎六二婦喪其茀勿逐七日得象曰七日得以中道也六二以隂居中婦象也九三在前為婦車之蔽茀象也然九三之火逼近六四之水火將進而隔於水喪茀之象也婦車有蔽而後可行喪其蔽不可行之象也六二有文明中正之德太平之賢臣也當險難既濟之後太平之盛時也上有九五剛陽中正之君太平之聖君也以賢臣當盛時遇聖君行吾道以守盈成吾見其易易也然一有小隔於其間則此道柅而不得行此衆人之所躁而競君子之所靜而俟者也躁而競者勝負未可知靜而俟者不久而自定故曰勿逐七日得然非以中道自處而不躁安能如此故曰以中道也故管蔡之謗周公公不辨而王自悟燕王上官之譖霍光光不言而帝自察二與五為七六二與九五相應故為七日得詩有翟茀九三髙宗伐鬼方三年克之小人勿用象曰三年克之憊也未濟求濟者寧既濟求過於濟者傾九三當既濟之後挾重剛之資居炎上之極有求過於濟之心此小人之好大喜功而不可用者也雖以中興之賢君一入其說輕用軍師以伐逺方之小夷猶久而後勝既勝而中國之民亦憊且困矣以賢君伐逺夷宜易而難宜速而久宜福而禍而况其餘乎武帝承文景之後而伐胸奴太宗當貞觀之隆而征髙麗皆此類也善處既濟者其惟光武却臧宫馬武之請乎六四繻有衣袽終日戒象曰終日戒有所疑也陵於居者牆以寇退立水於宅者舟以水涸葺此匹夫匹婦之愚所能知也當無難之時而不為多難之備有天下國家者獨不是之知乎六四居水之下火之上是燥而涸之時也宜喜而憂宜安而危方且皇皇焉求敝衣之袽為窒隙之具以備葺舟之用又且終日而戒焉疑焉無頃刻而不戒不疑焉常若夜半而水驟至焉夫惟湯之旱所不能懈故堯之水所不能溺此有備無患傅說所以戒髙宗也曰繻有衣袽有之為言不至於求而無之謂虞翻曰繻衣也袽敗衣也繻或作襦九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也九五以剛明中正之君撫既濟無難之運思患豫防此將奚先其惟清心寡欲恭儉無逸乎祀國之大事也過於豐不曰傷財厚於神不曰過制然猶以為用大牲不如薄祭之福俟備物不如急時之勤而況於奉已也乎以此防民然文王之游田未嘗而八駿之轡已駕孝文之露臺不作而萬户之宫已新此聖人所以為九五而深慮也殺牛大牲禴薄祭也西鄰之時言急時而不懈也上六濡其首厲象曰濡其首厲何可久也上六既濟之極如已濟大川自謂沒世無風波之虞矣不知濟其一又遇其一求載而無宿舟求涉而無善游乃欲褰裳而馮河此必溺之道也危而不可久生也明矣此晉武平吳之後明皇天寶之末也可不懼哉濡至於首則溺其身可見矣坎水故濡上六在上故為首此聖人所謂初吉終亂者與然猶有不信者何也坎下離上未濟亨小狐汔濟濡其尾無攸利彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也易之卦六十有四其辨邪正其防消長其警勤怠其戒治亂安危存亡其變不知其幾也幸而至於既濟矣而其終猶未濟然則事何時而濟濟何時而定乎蓋天下國家之治如人之一身如天地之造化一身吸必有噓天地晝必有夜天下國家治必有亂其變無息聖人處之亦無息此易之道也是故泰復變為否既濟復變為未濟處既濟者在於有持守克終之心處未濟者在於有進為克終之才心不克終故既濟為未濟才而克終故未濟為既濟濟斯亨矣故曰未濟亨非未濟之亨也未濟而能濟之亨也既曰亨矣又曰小狐汔濟濡其尾無攸利何也三陽失位而弱於才如狐之能濟而恨其小也惟其才之能濟而恨其小且弱故狐幾濟而衰力不能以舉其尾如事之幾成而敗才不能以畢其功萇𢎞朝錯房琯是已柔得中謂六五未出中謂未出於險中剛柔應謂六爻皆一隂一陽自相應也象曰火在水上未濟君子以慎辨物居方水在火上則成烹飪之功故為既濟火在水上反是故為未濟然君子觀未濟之象而得慎辨物居方之理何也六位皆一隂在下一陽在上物各有辨居不亂方則類聚羣分之理得矣故舜與共歡雜處堯朝非辨物居方也進二八退四凶辨物居方也可不謹乎初六濡其尾吝象曰濡其尾亦不知極也既濟之初九濡其尾則無咎未濟之初六濡其尾則吝何也初九强於才者也已濟而濡其尾賀其濟而後濡也故無咎初六弱於才者也幾濟而濡其尾憂其濡而不濟也故吝管仲之三歸反玷絳侯之有驕主色初九之濡尾也桓溫至洛陽而復敗劉裕得關中而復失初六之濡尾也亦不知極謂才之小且弱者其極終無成而不自知也然雖不知其終極之無成而能力其弱以濟難其濟爾志也其不濟非爾志也故聖人惜之曰吝吝者力不足之辭也九二曳其輪貞吉象曰九二貞吉中以行正也既濟之初九曰曳其輪濡其尾則乘者人曳者馬也未濟之九二止曰曳其輪而已則一人而乘且曳也人乘車而馬曳之或兩或四或六則其車輕其濟易吾乘之吾曳之則其車重其濟難故九二視初九可以為難矣自非九二以剛健堅貞之才居大臣中正之位受九五孚信之知安能以一身莫助之力而獨濟大難之險以底於中正之吉乎一蕭何而助者二人一鄧禹而助者二十有七人一𤣥齡而助者十有七人馬曳輪也羽既死飛又死而孔明自將以出祁山身曳輪也哀哉六三未濟征凶利涉大川象曰未濟征凶位不當也六三以隂柔之資當險難之極而位下卦之上位浮於才已若獨行以濟難得不凶乎然下有九二剛健之大臣上有九四剛明之近臣六三能柔順以親附之亦可因人以成事涉險以濟難矣其丙吉王導之徒與九四貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也臨難而坐觀履險而不欲濟無志者也有志矣患無才有才矣患無位有志而無才者欲濟而不能濟有才而無位者能濟而不得濟備斯三者其惟未濟之九四乎懷剛正之資其志立矣奮震動之威其才果矣居近君之地其位親且重矣是惟無動動而用之以伐逺夷則有大功受大賞必矣宜其志之得行吉而悔亡矣然未濟之九四聖人喜其伐鬼方之賞既濟之九三聖人憂其伐鬼方之憊何也既濟之世利用靜未濟之世利用動也然未濟之九四亦必曰三年者戒其欲速謹之至也雖許其動可輕動乎馬援請行征蠻於建武之隆李靖請行伐狄於貞觀之盛既濟之九三以之宣王興衰撥亂之世而吉甫伐玁狁召虎伐淮夷方叔伐蠻荆未濟之九四以之六五貞吉無悔君子之光有孚吉象曰君子之光其暉吉也六五逢未濟之世為濟難之主而應之以隂柔之才宜其如周平王晉元帝之弱也今也以貞正而吉以孚誠而又吉以光暉而又吉又許之以無悔何其反也蓋未濟之六五其體離也在天為日在地為火日與火雖柔猶剛雖弱猶强故日之在夏曀之益熱火之在夜宿之彌壯六五文明之至盛而養之以晦剛烈之至猛而掩之以柔方且虛其中以臨照百官正其身以一正天下堅其誠以信任羣才故初六之在下而弱才乃最先濡其尾以為之用九二剛健之大臣則又自曳其輪以為之用六三之弱才則又親附二陽以為之用九四剛明之近臣則又奮伐逺夷以為之用安得不一掃大難為無難之世一變未濟為既濟之時乎備三吉之盛福而無一毫之悔尤又何疑焉其湯武髙帝之創業少康宣王光武之中興事耶上九有孚于飲酒無咎濡其首有孚失是象曰飲酒濡首亦不知節也未濟至於六五已變而為既濟矣至於上九則周文武終於逸樂之時也上九於此夫何為哉燕兄弟燕朋友燕羣臣嘉賓推孚誠以待下以與天下樂其樂而已故曰有孚於飲酒無咎然治亂同門憂樂同根天之道也故又戒之曰濡其首有孚失是又戒之曰飲酒濡首亦不知節也其明皇末造之事耶既濟上六之濡首者水也未濟上九之濡首者非水也酒也水之溺人溺其一身酒之溺人溺其身以及其天下國家故洚水之害小於儀狄之酒禹惡㫖酒之功大於平洚水誠齊易傳卷十六
