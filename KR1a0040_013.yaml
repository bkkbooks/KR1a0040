body:
  text: 誠齊易傅卷十三宋楊萬里撰坎下兊上困亨貞大人吉無咎有言不信彖曰困剛掩也險以說困而不失其所亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也一陽陷二隂之中一隂蔽二陽之上皆剛掩於柔也剛掩於柔君子掩於小人能不困乎然困而亨何也亨不于其身于其心不于其時于其道也逢乎坎之險處以兊之說身雖困也心未嘗困也困而不失其所亨惟君子能之故曰亨不于其身于其心心曷為而亨也說也曷為而說也貞也曷為而貞也中之剛也剛于中者百險不能隕其正正於己者千憂不能喪其說烏往而不亨乎此大人之事故曰亨不于其時于其道君子之說樂而亨大人之剛貞而吉其困亨一也又何咎之有若處困而求亨求亨而尚言將以求通乃所以得窮也聖人恐人不深味困亨之腴而好徑求困亨之蹊誇以亨其鬻妄以亨其競媚以亨其合其誰信之信於人亦必不免于天儀衍斯鞅是已故又戒之曰有言不信尚口乃窮然則困亨之義於此乎於彼乎而王輔嗣曰窮必通也處窮而不能自通者小人也信斯言也則甘藜羮樂陋巷皆小人矣二五皆剛中兊為口象曰澤無水困君子以致命遂志澤之為澤以有水也今水在澤下是無水之坳堂爾此其所以為困也君子居之以其莫之致而困者安之命以其所得為之義者遂其志彼有所安此有所遂矣志乎堯舜遂之斯堯舜矣志乎孔顔遂之斯孔顔矣孰能禦之困之所以亨與初六臀困於株木入于幽谷三嵗不覿象曰入于幽谷幽不明也小人之掩君子聖世所不能無也況困之世乎當困之世不必得位之小人而後能掩君子也雖在下無位之小人亦囂然有掩君子之志矣初六是也所幸者進而求四之應則四自厄於困之中如枯株之不能庇退而伏於二之下則已自墮於坎之底如幽谷之無所覿此其所以欲困九二之君子而不能也其叔孫武叔公伯寮之徒與初者卦之下體故為臀欲困君子而自困欲掩君子而自幽小人亦何利哉九二困於酒食朱紱方來利用亨祀征凶無咎象曰困于酒食中有慶也小人之困君子何仇於君子哉不過如雞鶩之爭食鴟鳶之嚇鼠爾小人所茹君子所吐九二陽剛之君子為初六六三二小人所掩九二吐而去之簞食瓢飲有方丈之不如草耕木茹有五鼎之不易所困者酒食之末而已吾何困哉然户庭之不出紱冕之自來粢盛之弗設精誠之自通有吐食脫服而不得逃者何也時雖困也身雖掩也上有九五之君有剛中之德與己同德而不與小人同道故也然則小人能終掩君子乎雖然寧君已先毋已君先自我求焉自我往焉則凶又誰咎非其事凶也其道凶也枉已正人非凶而何中有慶者言不與小人爭食而剛中自守所以有朱紱之慶也利用享祀者以精誠通乎君猶享祀通乎神也使左右能止即墨之封關張能間孔明之密則困之九二不足徵矣齊蜀霸者也而況不為霸者乎然則君子病不困爾困何病哉坎為赤故為朱紱朱紱方來言自來非往求也六三困于石據于蒺藜入于其宫不見其妻凶象曰據于蒺藜乘剛也入于其宫不見其妻不祥也月掩日則日食日掩月則月食隂陽消長如循環也天下豈有小人專掩君子之理哉初六與六三夾九二而交掩之小人長矣不知夫六三者進則困於二陽如石之壓其上退則乖夫一陽如棘之刺其下下將奔初六之鄰則閉於一陽而不得出其所舍上將求上六之援則隔於二陽而不得見其所耦於是外敵交至而反為君子之所掩親戚皆叛而盡失小人之所助其管蔡陷周公燕上官陷霍光之事耶妻謂上六與己親也三陽上隂故三以上為妻九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也氣同則從聲比則應各從其類也易之相應豈必以位哉四與初應者位也困之九四其應不在初六而在九二者類也九四為上六所掩其望九二之應如乞師於鄰國以解入郛之圍也而九二徐徐而來者隔於六三之閡其前如金車之堅而不可却也然陽進而不止隂止而不進吝於始必通於終蓋四雖困於三之隔然四之志乎二則不渝也二雖不當初之位然二之與乎四則必應也當困之世為君子者類苟同矣應不在近志苟通矣來不在速期於終不為小人所掩而已陳平交絳侯以誅諸吕仁傑薦柬之以誅二張近乎困之九四矣三在下故為車剛故為金又坎為輿九五劓刖困于赤紱乃徐有說利用祭祀象曰劓刖志未得也乃徐有說以中直也利用祭祀受福也當困之世而不能拯也小人掩夫君子而不能去也君子掩於小人而不能白也則何貴於易哉易有道焉存乎其人而已孰為其人上有拯困之君下有拯困之臣則柔可消剛可長困可亨吉矣九五以剛中之才正大之德為困世之君則上有拯困之君矣九二之大臣又有剛中之才九四之近臣又有陽剛之志則下有拯困之臣矣君臣同德患不為爾一有為焉孰為小人刑之以劓刑之以刖孰為君子錫以紱冕享以精誠小人去而君子伸始乎困而徐乎說脫天下於困窮之淵而躋天下於福慶之域是易之道也志未得謂未刑小人之時中直即中正上六困於葛藟于臲卼曰動悔有悔征吉象曰困於葛藟未當也動悔有悔吉行也上之一爻有處一卦之上者有處一卦之外者處上則為尊髙之極乾之上九是也處外則為吉凶之輕困之上六是也九五九二九四之君臣以陽剛之才具中正之德刑小人用君子拯一世之困而天下受福矣上六以一隂之孤處極困之後出刑戮之外亦適有天幸也雖有掩君子之志亦何從而逞哉然始則為二隂之所榮如困于葛藟之蔓而不得脫終則乘二剛以自危如據于臲卼之几而不得安動亦懼禍之及故曰有悔聖人於此開其三面可也遏其歸師不可也故許其征吉又許其吉行皆縱其去而不追其窮也夫惟開小人之去而後免小人之禍是故拯困之道莫上乎征吉而劓刖為下傕汜之事可不戒哉巽下坎上井改邑不改井無喪無得往來井井汔至亦未繘井羸其瓶凶彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也人非水不生活水非井不甘潔然井德盛而功艱何也求與嗇兩忘德也惠與怨兩消功也有遷邑以就井無遷井以就邑井何求焉不為汲者喪而虛不為不汲者得而盈井何嗇焉汲而往者其欲充汲而來者其望切愈養而愈不窮井何惠焉汲者之力有强弱則綆有入而未出瓶有繫而不反井何怨焉堯舜之世以禹稷為井春秋戰國之世以孔孟為井然禹稷能濟天下之饑溺而孔孟不能者德盛而功艱也齊景公曰吾老矣不能用齊宣王曰吾惛不能進於是非汲者之弱於力乎功之艱斯人之凶而不幸也井何心哉繘綆也汔至者綆幾至泉而未出也羸繫也古羸縲通用剛中謂二五惟剛中故不改巽入也巽乎水入乎井也入乎井而能上乎水則井之功行入乎井而不能上乎水則井之功廢故凶今巽下二爻初六九二在坎之下若瓶之覆而入井之象九三六四二爻若井中之瓶覆者復仰之象而坎之九五隔其上若繫縲其瓶而不能上乎水之形坎為水巽為木木者汲之器也器入水而復上水者井之象也九五上六坎上二爻有瓶仰而出井之象韓信以木罌缶渡師其古之汲瓶之類與羸纍字解在大壯象曰木上有水井君子以勞民勸相水下有木汲器之入也木上有水汲器之出也汲器入而水德行汲器出而水功著此井之象也勞之賚之君子所以法井之德勸之相之君子所以法井之功勞賚與也勸相助也水言與器言助有水無器井能自活斯人乎故汲引之功不下於洌泉勸相之惠不隘於勞賚初六井泥不食舊井無禽象曰井泥不食下也舊井無禽時舍也居下流者歸衆惡安舊習者絶新功初六在一井之底居於下者也宜其泥之不澄也處幽隂之極安於舊者也宜其泉之不新也井之可飲可食潔清故也今也泥而不潔舊而不清衆禽且無一食之者而况人乎人之棄而不食時之舍而不用將誰尤乎養人者必自養用世者必可用故顔之樂道曽之詠歸漆雕之仕未能信不知者以為真忘斯世矣九二井谷射鮒甕敝漏象曰井谷射鮒無與也水一也其地則不一曰井曰谷是也地不一則功亦不一故谷之水以注而下為功井之水以汲而上為功注而下者其功及魚鱉汲而上者其功及百姓今九二雖有微陽生微水非如初六之純乎泥也然亦在泥之上井之下其所注射僅下及於泥中之蛙鮒耳是井不為井而反為谷不上出而反下注止及於蛙鮒之瑣細而反不及於魚鱉之盛多曾谷之不如也譬之一漏甕下注而無養人之功何足以為井哉二下比於初六初六隂潛而細微有小人之資有鮒魚之象既下比小人則上之君子無我與者矣上無我與則上無我汲者矣子常信無極而國皆怨子馮昵八人者而君不安是也谷下注甕漏亦下注皆不上出之義九三井泄不食為我心惻可用汲王明並受其福象曰井泄不食行惻也求王明受福也九三以陽明之質居井下之上當一井之半則泥者去注者浮淺者深此泄治之井甘潔之泉也可食而莫之食可汲而莫之汲者以其猶未出井之上也渟可用之才當在下之地而枉其養人之才德故為之惻然於心而歎其上之不我燭也可食者井也不食者人也井何惻焉井不自惻而人之行而過者惻之井不求上之我燭而人為之求其明者以燭之此作易者所以為井歎也非為井歎也為有才德之君子不見用於上者歎也非為君子之不見用者歎也井一用一邑受其福君子一用天下受其福有美井無善汲則如無井有君子無明王則如無賢仲尼曰明王不興天下孰能宗豫然則九三之惻也井云乎哉君子云乎哉在下之君子如九三之泉在井之半掩於物逺於人非明之至者不能燭其幽也故微明揚之堯帝則大舜雷澤之漁父微明哲之髙宗則傅說巖野之胥靡六四井甃無咎象曰井甃無咎修井也治國欲新為學欲新進德欲新曰作新民治國欲新也曰溫故知新為學欲新也曰德日新又日新進德欲新也六四之井甃其進德之新乎甃者甓而修之也井一修則舊井為新井德一修則舊學有新功大哉井之有功於斯人乎大哉修之有功於斯井乎井至六四則泉溢而將上出之時也不患人之莫已汲而患已之莫已修井之不修井之咎也修矣或汲焉或舍焉或食焉或否焉井何咎哉故德之不修足以憂孔子學不能行足以病子貢六四􅄲有兩甓接連之象故為甃九五井洌寒泉食象曰寒泉之食中正也一井主乎泉天下主君泉有德一邑汲之君有德天下汲之洌而寒者泉之德中而正者君之德九五以陽剛中正之德居大君之位猶泉以甘潔清寒之德為一井之主也天下之人酌而飲之若渴者之於井也孰能禦之泉而不洌不寒君而不中不正人有吐井泥羞汙君而去之耳故傅說非其后不食伯夷非其君不事君天下者可不懼哉上六井收勿幕有孚元吉象曰元吉在上大成也井至於上六則瓶之入者出水之虛者盈井之功用收其成矣雖然功之未成其患在不成功之已成其患在成非功成之患也功成而倦之患也功成而倦是井泉既上而復幕其井也夫惟勿幕然後天下信其吉之大天下信其吉之大然後聖人許以成之大此大禹之勤儉周公之吐握也與上六􅄲開而勿幕之象離下兊上革已日乃孚元亨利貞悔亡彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以說大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時大矣哉易之道至於革聖人其喜於革乎抑懼於革乎曰懼於革也何以知之曰革者聖人之不得已也何以知其不得已也曰火逢水則滅水逢火則竭二女居則同而志則别是可以不革乎天下之事苟不至於如水火如二女聖人豈得已而不已乎故戒之曰已日乃孚又曰革而信之言其初之未信也曰元亨利貞悔亡又曰革而當其悔乃亡言革之而非大亨非大利非大正皆革而不當也其能無悔乎革而不信革而有悔則如勿革故曰聖人懼於革也然則何以能革而信革而當乎曰彼之所以失見此之所以得灼知其理於未革之先當如離之文明未革而民願之將革而民從之相慶其舉於既革之後當如兊之說如是者可以革而信革而當矣天地得此理故革而四時成湯武得此理故革而天人說革之時豈細故哉可不懼哉秦之變法趙之胡服莽之革漢靈寶之革晉豈曰革而信革而當也乎象曰澤中有火革君子以治厯明時火者就燥之物也今在澤中是以水革火之象也物窮必革亦衆矣鑽燧生於茹毛上棟生於營窟質敝必文寬窮必猛革之為用豈特治厯之一事哉食者人之天厯者食之天舉其大它可推矣厯貴乎革者三辰有差厯亦萬變也初九鞏用黃牛之革象曰鞏用黃牛不可以有為也觀六爻之辭益知聖人之懼革也初九戒革之蚤六二戒革之專九三戒革之躁九四戒革之疑上六戒革之過五者之戒詳矣然後九五不待占而決也初九革之初也當革之初遽可以革乎曰未可也當固執之堅忍之為黃牛之革焉不曰未可以有為而曰不可以有為者戒之之嚴也以此戒之猶有朝錯削七國之禍六二已日乃革之征吉無咎象曰已日革之行有嘉也以六二中正文明之臣遇九五陽剛相應之君此時而不為何時而可為今曰已日乃革之然後征吉然後無咎然後行有嘉慶者不有所倡不可以和不有所主不可以贊必也吾君已有革之之日而主之吾乃可以贊而革之乃者緩辭也後而不先之辭也中正文明而濟之以隂柔故也惟其緩而審故以征則吉以行則慶故季孫問二邑之叛然後孔子可以陳墮費之言趙鞅無君命而逐君側之惡人則春秋以為叛六二獨得而專於革乎九三征凶貞厲革言三就有孚象曰革言三就又何之矣九三居下卦之上位亦髙矣接上卦之交權亦近矣為離卦剛明之極才亦全矣可以革矣今又曰征凶貞厲者往則必凶雖正亦危也何其戒之之太詳也聖人蓋曰九三不患不剛患在太剛不患不明患在太明何也剛明而過中故也必也如革卦卦辭之三言者然後可以成就而信於天下也曷謂三言曰大亨也大利也大正也大亨無塞大利無害大正無邪以此而革何革不就以此而行何行不達曰又何之矣言焉往而不可哉故伊尹相湯革夏必以五就其敢躁乎哉九四悔亡有孚改命吉象曰改命之吉信志也初九戒蚤六二戒專九三戒躁然則天下之敝終不可革乎曰當革在敝可革在時故曰革之時大矣哉當而未可其賊曰果可而或違其賊曰疑革至九四蚤者遲專者隨躁者衰矣而又不為不以疑而賊大謀乎聖人勸之曰可以革矣慮之既詳其悔必亡既謹其圖天下已孚當是之時奉君命而革之可以吉也君命未安吾改君命而革之亦可以吉也君制命臣承命者也臣而改命改命而吉也可乎曰事君在志行志在事志然而事亦然君子不以志違事志然而事不然君子不以事違志君命曰可君事曰可奉命可也君命曰可君事曰否改命可也吾既信吾矣君獨不信吾志哉豈惟君信之天亦信之天信之君信之矣君信生於天信天信生於自信雖然改命不可許也非誠有其志者不可改也故孟子曰有伊尹之志則可而革之九四曰信志也志不在於興漢則罷兵厯下之役韓信不可以改命而伐齊志不在於厚楚則致田犨櫟之命子躬不可以改命而却鄭然則九四何以得自信其志而聖人許其改君命也曰九四兊說之初也又能以陽剛而處四之柔順也此其改命豈犯上而侵君者乎故許之也然則九三有為而聖人沮之九四不為而聖人勸之何也曰九三所謂由也兼人者也九四所謂求也退者也革以改為義臣改君命亦革之一也故於九四發之九五大人虎變未占有孚象曰大人虎變其文炳也可革不革是以敝濟敝既革悔革是以敝易敝革之道亦難矣蓋舉國之欲止不能止符堅之行舉國之欲動不能動漢文之靜雖然與其輕也寧重與其喜也寧懼今也革至於九五聖人獨决之以未占而有孚是龜筮有所弗詢鬼神有所弗謀也無乃輕於革乎蓋天下無灼然之理則聖人無決然之舉革之道初戒其早二戒其專三戒其躁其可革未灼然可革也四戒其疑已灼然可革矣九五以陽剛之資居兊說之上當大君之位兼四爻之助其可變可革之理灼然如虎文之炳也尚何待於占乎此湯武革命順乎天而應乎人之事也上六君子豹變小人革面征凶居貞吉象曰君子豹變其文蔚也小人革面順以從君也革至於九四可革也至於九五能革也至於上六從革也雖然可革在理能革在已從革在人聖人盡其所能革而不盡其所從革君子革心蔚然如豹文之不可掩小人革面勉然順吾君而有所從是亦足矣復欲進而未已忿其革面而必强其革心凶之道也故曰征凶惟安而居焉正而守焉斯吉矣故苗民七旬而乃格舜猶以為速商民三紀而乃變康王不以為遲憂其革之盡也非憂其革之盡也憂其革之過也巽下離上鼎元吉亨彖曰鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨鼎象也象者卦之形肖鼎之形也以列足而載一腹以一鉉而貫耦耳非鼎之形乎六爻畫而鼎之形以具二卦合而鼎之用以行以巽之木入離之火而烹飪之用著矣古者聖人之制鼎豈自奉口體而已哉有鼎之用有鼎之德享上帝養聖賢乃其用也體巽之順以順於義理體離之明以達其視聽體六五之柔中以應剛陽之聖賢乃其德也全其德以施其用焉往而不大亨乎故曰是以元亨且夫革去故鼎取新去故取新何獨鼎哉食者生民之大本鼎者火化之元勳革鴻荒而新萬法孰為革故取新之初乎孰有大於革茹毛為火化之初乎一初既立而萬法類從矣象曰木上有火鼎君子以正位凝命程子謂君子居處必正命今必重蓋取諸鼎然又有一說焉革之湯武革命謂天命也革以革之必鼎以定之易之凝命即書之定命也又古之傳國以鼎猶後世之璽也故傳曰禹鑄鼎象物其後鼎遷于商于周又曰武王克商遷鼎洛邑又楚子問鼎于周王孫滿對曰周德雖衰天命未改鼎之輕重未可問也此亦正位凝命之一說然必曰君子者不惟其器惟其人故鼎以紂輕以武重初六鼎顚趾利出否得妾以其子無咎象曰鼎顚趾未悖也利出否以從貴也去惡不盡良庖無潔清之鼎去敝不盡聖人無新美之治是故不有傾寫不可以盡去一鼎之惡不有滌蕩不可以盡去一世之敝鼎之初六天下草昧隂閉之初猶宿昔滓濁之鼎也將欲去其故以取其新可不傾寫滌蕩使無一毫之不盡乎故為鼎者顚覆其趾以盡出其否惡為治者滌蕩其舊以盡徹其晦冥否惡盡而貴珍之膳來晦冥徹而陽光之治起湯之革夏必代虐以寬髙祖之入關必除秦之苛布漢之寬也初在下故為趾六隂而虛故顛覆巽為長女而初六居下故為妾妾者隂閉晦冥之象六雖隂而初為陽故為子子者陽剛光明之象物忌顛覆惟鼎每覆則每潔故未悖九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終無尤也鼎者宗廟之重器賢者聖人之鴻鼎非重夫鼎也重夫鼎中之實也鼎有實則可薦諸上帝可薦諸聖賢可飽夫天下九二以陽剛之才德居大臣之正位上遇六五離明謙柔之主下得三四同德之助此鼎之有美實天人上下所同恃以為享者也然寇陽者隂讐正者邪初六與吾近而吾仇也寇我而能我即則此必受其即仇我而能我動則彼必乘其動今也初六以一隂之孤而壓於衆陽之底故有疾我之心而無即我之便九二以陽剛之才而充以篤實之德故有不動之志而無可乘之隙大哉九二之實德乎壯哉九二之不動乎一鼎不可動則萬夫廢一心不可動則萬議息故流言不能動周公刺客不能動裴度而周唐遂安慎所之者言謹審而不動也我一有所之彼斯乘之矣惟慎所之故吉而終無悔尤九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也鼎實一而味殊其下者重而沉其上者輕而浮其中者粹而美曷粹而美也間於輕重清濁之中也初六鼎之足六五鼎之耳上九鼎之鉉孰為鼎之實三陽是也孰為實之中九三是也故謂之雉膏雉者肉之珍膏者雉之珍此鼎實粹美之至也然味成而莫之食何也九四塞之於前而六五改之於上也萬物以足行鼎以耳行六五離明之君而不食九三之雉膏非九四塞之而誰也其行也或塞之其食也或間之六五用九三之意所以改也上之意改則下之行塞矣魯平公見孟子者樂克啓之也不見孟子者臧倉改之也雖然暗君用賢之意可改而明主用賢之意不可改六五明主也九四其能終改之乎一旦而悟如雨之沛然而下矣始若虧損而可悔終則潤澤而逢吉豈終不食九三之雉膏也哉破斧九罭之詩是也鼎耳革革言改也其行塞耳不從則鼎不行也失其義謂君臣之義為九四所間而相失於始也九四鼎折足覆公餗其形渥凶象曰覆公餗信如何也鼎實至於四鼎之盈實之重也持盈者必有髙天下之德然後能無傾任重者必有過天下之力然後能不踣九四以陽處隂德已薄矣以近君之大臣下應初六隂柔之小人力已小矣與小人而同事必與小人而同禍此其所以折足覆餗而沾濡其身也焉得不凶乎元顯與反覆之牢之以圖靈寶袁粲與惜身之褚淵以圖蕭道成晉宋之亡覆公餗也顯粲之誅其形渥也信如何者言信任小人其禍何如哉深以戒之也六五鼎黃耳金鉉利貞象曰鼎黃耳中以為實也挈一鼎者聽於耳挈天下者聽於君耳者一鼎之主猶君者天下之主也然主鼎有二道鼎實中則正過中必溢鼎鉉剛則舉不剛必墜主天下有二道持盈以中正則為天下之利不中不正則驕心生明皇之季是也用臣以剛直則為天下之利不剛不直則諛臣進元帝之貢薛韋匡是也黃言中金言剛貞言正利言為天下之利六五􅄲分布於上故有鼎耳之象六五本坤體故黃中得九二為大臣故為金鉉上九鼎玉鉉大吉無不利象曰玉鉉在上剛柔節也雨既浹而雲歸鼎既薦而鉉逸鼎至於六五之持盈鼎之功成矣至上九之鉉乃既薦而安逸之時也然則上九其功成身退之大臣乎有犯無隱在位之大臣也有犯有隱不在位之大臣也非隱也寓直刺於旁諷之中藏面折於忠愛之表隱之犯有甚於犯之犯也季康子欲用田賦使冉有訪諸仲尼是時仲尼不在位也故仲尼不對非不隱也既而私於冉有告以周公之籍非隱也此鼎之上九玉鉉在上之義也九陽也剛也上隱也柔也九二在位之大臣故為金鉉粹於剛也上九不在位之大臣故為玉鉉玉者質剛而德柔溫潤故也故曰剛柔節也言剛而非剛柔而非柔皆中節也夫如是豈不大吉而無不利乎然九四以剛處柔則為折足上九以剛處柔則為玉鉉者在位不在位故也上九乾體乾為玉誠齊易傳卷十三
