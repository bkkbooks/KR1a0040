body:
  text: 誠齊易傳卷五宋楊萬里撰艮下坤上謙亨君子有終彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙自天道下濟而光明以下言謙之亨也自天道虧盈而益謙以下言盈之損也九三以乾下坤故下濟一陽故光明坤本居下故卑今居上故上行山高而降于地謙之尤也地卑而藴夫山謙之益也舊說謂山能下為山之謙郭氏謂非山之謙地之謙皆偏也非山之謙何以能降于地非地之謙何以能藴夫山乾自虧而下濟乃有光明之益坤自卑而變上乃有流行之通曰虧曰變謙也曰益曰流亨也何必中昃盈食岸為谷谷為陵然後為虧益變流之證哉神人之道亦若是爾害也福也惡也好也果自外乎謙尊而光卑而不可踰君子之終也君子德彌尊而心彌卑以保其德乎非保其德也進其德也保者惜其既足進者歉而未止惟其歉而未止故德尊而益光卑而益尊以此始以此終其進德也庸有既乎故謙者君子進德無既之壑也象曰地中有山謙君子以裒多益寡稱物平施山不能有天地而地能有天山君子觀此而得天之理多或裒之寡或益之不稱則慍不平則忿君子觀此而得物之理大取諸天小取諸物君子觀此而得謙之理初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也初六以至柔處至下謙之謙也謙之謙其過謙乎曰盈患過謙不患過至柔謙也至下養夫謙也牧養也謙何俟夫養曰盈日鋤日不除謙日養日不長此顔子若無若虛之謙六二鳴謙貞吉象曰鳴謙貞吉中心得也位以德躋德以位衰二以柔順之德居大臣之位此君子所甚懼也是故號鳴咨詢以講求謙之道鳴者講求之切也柔順謙之資講習謙之學所以謙而正正而吉也非中心之自得鮮不為貴位所移矣此禹拜昌言之謙九三勞謙君子有終吉象曰勞謙君子萬民服也九三以一陽主五隂禀剛陽之才任天下之重以有大勳勞于天下勞而不謙其勞必奪謙而不誠其盈必廢所以有終則吉也萬民服者非服其勞也服其勞而謙謙而終也大哉謙乎大哉謙之有終乎周公公孫碩膚上也子儀功蓋天下而主不疑其庶乎六四無不利撝謙象曰無不利撝謙不違則也爻之利有利于承上有利于乘下六四近六五之君居九三之右上承謙德之君非謙則傲傲者違承上之則下乘勳勞之臣非謙則忌忌者違乘下之則違其則者乖其宜也惟謙則施之上下無不利矣撝施也此臯陶豫未有知之謙勃驕主傲也渾排濬忌也六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也五以君上之尊體謙柔之德欿然不有其崇高富貴之勢此一卦謙德之盛也推不富之心納天下之善則其臣鄰翕然舉衆善以歸之矣高帝不如三子故能有三子兼天下之智合天下之勇焉往不利哉利用侵伐姑舉其大者雖然謙無不利遂挾之以靡不為乎聖人戒之曰征不服也不服而征不得已耳舜征苖不得已也武征胸奴不得已乎上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也上六位愈高志愈下亦如六二號鳴以求謙之益則衆善畢赴焉往不利哉衆人以居高為得志上六以居高為未得志此善之所赴也衛武享國百年而作抑詩以自警且曰勿以我耄而舍我其教戒我此上六之鳴者與坤下震上豫利建侯行師建侯天下禍福之始行師天下禍福之終天下事有大于二者乎然動而順天下之理舉而順天下之心理動而人心順心順而人心說則二大事一小事其焉往不利而况小于二事乎豫說也彖曰豫剛應而志行順以動豫豫順以動故天地如之而況建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉順言理豫言心何以知理之當然哉心之同然是也觀人心則見天理蓋人心天理之集也循其所當然斯得天下之大說故曰順以動豫理先心而得也合其所同然斯行天下之大順故曰豫順以動理後心而行也豫矣順矣天地亦如之而於建侯行師乎何有何以知天地亦如之乎天地能順晝夜而不能以夜為晝能順寒暑而不能以暑為寒順之故三光全而寒暑時違之則薄食興而愆伏起聖人得此不言而信不怒而威天下信于動先說于動後尚何事刑罰哉而況建侯行師乎不然逆尾大之勢而建侯必為漢之吳楚違舉國之諫而行師必為秦之淮淝何利之有坤順震動九四剛五隂應書曰水清四海言兵寢也易曰刑罰清言刑措也象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考順以動者天理出而奮者天聲師其理以建侯行師師其聲以作樂崇德聖人何為哉天而已矣初六鳴豫凶象曰初六鳴豫志窮凶也九四豫之主初六四之應當逸樂說豫之時以隂柔居下之資而有上下交應之嬖挾口才以濟狡志利其身亦凶其身凶其身亦凶其國曰鳴豫小人有口才者也曰志窮狡志而極其欲者也故暴公以讒鳴伊戾以諛鳴儀秦以說鳴髠衍以辨鳴朝錯主父偃以謀鳴江充息夫躬以訐鳴王叔文以治道鳴李訓以大言鳴鳴乎下應乎上凶在其中矣而况極其志者乎初六地之初九四雷之初二者交應雷聲初出地也故為鳴豫鳴謙則吉鳴豫則凶何也謙可鳴也豫不可鳴也六二介于石不終日貞吉象曰不終日貞吉以中正也二以隂處隂靜而貞也位乎中爻中而正也是豈升盤樂之堂躋懷安之域者哉故其處豫如介石其去豫如脫兔何俟終日吉孰大焉蓋袗衣不能易舜之陶漁赤舄不能萌旦之驕吝六三盱豫悔遲有悔象曰盱豫有悔位不當也有人主之近幸有人臣之近幸六三人臣之近幸也以隂邪居陽位據下卦之極高九四之大臣進則盱而仰視其上之豫方且位已逼而進不厭此悔之道故陽虎幸于季氏則圖季氏上官桀幸于霍氏則圖霍氏季霍幾危虎桀亦敗所謂盱豫悔聖人不許其盱也退則遲而固戀其豫之寵方且患將及而退不速此亦悔之道故潘嶽知負阿母而不能離賈謐蕭至忠知善宋璟而不能去公主客主同誅交相為纍所謂遲有悔聖人非幸其遲也不許其盱折其萌也非幸其遲哀其成也長禍之萌而不悟樂禍之成而不去何也人不稱位位不當望而已吁小人亦何利於位哉九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也動天下之大舉以規天下之大功其難有五有志無位志則不伸有位無主位則不定有主無助主則不堅有助無才助則不立九四為動大舉之主致天下之豫我之由也非兼五得以超五難吾未見其動之有濟也小動猶難況大動乎九四以剛陽大有為之志果决不疑之才而居近君大臣之位主之以六五柔順之君助之以衆隂上下之朋小動小得大動大得何五難之有大禹興治水之大役伊尹任伐夏之大事周公决東征之大議是也故得曰大有得志曰大行皆大動也朋盍簪五隂合聚而助之也盍合也簪聚也六五貞疾恆不死象曰六五貞疾乘剛也恆不死中未亡也六五以柔弱之資居逸豫之時耽宴安之鴆所以疾也有九四剛正之臣以正之所以貞也一正君而國定然其效止于恆疾而不死終不能去疾為全人何也弱也元帝有望之望之不能使之為孝宣安帝有楊震楊震不能使之為光武正而不死中而未亡九四之力已不少矣自正者挺而速見正者揉而復上六冥豫成有渝無咎象曰冥豫在上何可長也上六以資之柔居豫之極昏冥于逸豫之樂其咎成矣而無咎者極而能變故也知逸豫之不可長憣然而能變安知逸豫之主不為憂勤之主乎渝變也豫而能變則為太甲為齊威王不變者小則漢成帝唐明皇大則太康唐莊宗震下兑上隨元亨利貞無咎元亨亨之大利貞貞則利隨而不正咎必至焉何亨之有故聖人有隨之隨有不隨之隨堯俞禹拜隨之隨也害有在于象恭則吁僝功之薦利有在于遷國則違胥怨之咨不隨之隨也惟貞之隨惟大亨無咎之歸兑少女震長男男行女隨彖曰隨剛來而下柔動而說隨大亨貞無咎而天下隨時隨時之義大矣哉剛凌柔則離柔乘剛則爭剛下柔則說說則隨初九以乾之剛下于坤之二爻九四九五以乾之剛下于坤之一爻三剛自外而來以下于三柔故動而說隨也曰大亨貞無咎動而貞也曰天下隨時孰為時也聖人也不曰天下隨聖人而曰隨時隨其動而貞之時也貞者道之體動者道之用時者道之跡聖人以用隨體天下以跡隨用故時出於聖人天下隨聖人時成于天下聖人隨天下大哉時乎大哉隨時之義乎震動兑說象曰澤中有雷隨君子以嚮晦入宴息兑正秋也收雷之時也君子觀象而得息之義日入而息君子獨能違而不隨乎而况靜作因革仕止久速之時乎然則仲尼終夜不寢周公夜以繼日非與曰易之隨時天也聖人之競辰人也嚮晦日將夕也初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也主是事之謂官隨以動而說為義也孰主是動非震之初九乎天下之事不動于常而動于變渝者變也初九主一卦之動當事變之始其古之發大難當大變决大議者乎主是變也非有以仗天下之至正開天下之大公未見其濟也故正則吉公則不失貞者正也出門者公也董公進發喪之議而名項為賊故王朝錯决削地之議而漢有其地故亂正則吉不正則凶也舍御事艱大之言而從十夫之謀故成東征之功用訓注小人之䇿而舍裴度李德裕之賢故稔甘露之禍公則有功私則無功也為初九者其動可輕乎哉出門而交謂震出而交兑也吾動而彼說隨斯有功而不失矣六二係小子失丈夫象曰係小子弗兼與也以六二視三四則六三小子九四丈夫六二居大臣之位偏係于六三則必失九四非九四不我即也隨於䁥則遠者不麾而自去從于邪則正士不問而自疏勢不兼也故薳子馮初嬖八人而巫臣退避以遠罪郭子儀初信張曇而幕僚相率以求去而况不為薳郭者乎牽于彼而吾隨之曰係六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也以六三視二四則六二小子九四丈夫六三之志舍六二從九四惟不失其所隨故有求而必得非求在外而可必也求在我而可必也求道得道求仁得仁孰能禦之利居貞貞者求在我者也陳相舍陳良而從許行六二以之夷子舍墨氏而見孟子六三以之九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也得天下之心致天下之隨君道也九四處大臣之極逼君位之近而得人之隨雖正亦凶况不正乎惟中有愛君之誠外盡為臣之道又全之以明哲之節可以保其功名而免危疑之凶矣程子謂非聖人大賢則不能伊周孔明是也其次則郭子儀淵哉程子之言也不然正則為徐偃王霍光不正則為莽卓雖不凶猶凶也九五孚于嘉吉象曰孚于嘉吉位正中也九五以乾之陽剛居兑之中正為一卦說隨之主應六二正中之臣此聖君至誠樂從天下之善者也吉孰大焉孚誠也嘉善也堯之舍己從人舜之聞見一善上也高祖從諫轉圜太宗導人使諫次也堯舜聖之隨高祖太宗賢之隨上六拘係之乃從維之王用亨于西山象曰拘係之上窮也上六以柔順之德居說隨之極得民心之隨固結而不可解亡以為喻若有以拘而係之者喻之不足若又從而縶之維之者是雖逃之有不脫辭之有不聽而况可得間而離之乎二程以為太王居岐龜山楊氏以為文王居西山之事上窮上之極巽下艮上蠱元亨利涉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也蠱泰之變泰之初九上而為蠱之上九泰之上六下而為蠱之初六故蠱亦泰之壞陽上而不降隂下而不升則上下之情兩隔而不通巽順而不健艮止而不行則上下之才兩弱而不立天下之事焉得而不壞乎蠱事之壞也蠱壞矣而曰元亨曰天下治何也蓋桓以無知興文以里丕霸故亂為治根蠱為飭源雖然亂不自治蠱不自飭不植不立不振不起故利於濟大難往有事也然則其遂徑涉而徒往乎曰否舉事之始逆慮其敗當在事先追愛其成當在事後庶乎其可甲始也先後各三日思之詳也終則有始者尤以後甲為重也後甲終也能謹其終則能保其有始矣象曰山下有風蠱君子以振民育德無事而不動山也山下有風則風薄山而事生風落山而事壞君子當有事而壞之時起而飭之則將奚先飭壞在振民振民在育德振者作而起育者養而施風言振山言育初六幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也初六弱于才而卑于位然當壞之時為子而辭其幹乎能幹則其父有子有子則其父無咎然弱于才矣何以能幹盡惕厲之意以承其父之意則吉矣曰考則非存曰意則繼志不然弱才而强决卑位而高步涉他之誅欲尊晉也南蒯之叛欲强魯也知幹而不知厲者也九二幹母之蠱不可貞象曰幹母之蠱得中道也初六承考九二幹母譬之家其父亡而母存乎家有父則一子而易治家無父而有母則衆子而難立然則九二其孰為母六五是也六五才既弱體又止則君非大有為之主九二德雖陽剛資則巽順則臣非大有為之佐事壞于考主于母幹于衆子母倚子者也衆子倚長子者也九二是也而長子又以柔順之資佐其母此時為何時也其幽王之末造平王之初政乎故晉文侯非中興之佐平王非中興之主東遷之業就而文武成業微矣曰不可貞不可反之正也曰得中道僅得為中才之事也雖然六五吾有憾也九二吾無憾焉使九二而非順則為田常為意如為莽卓為王敦桓溫矣求為文侯可得乎豈惟無憾於九二吾猶為六五賀也九三幹父之蠱小有悔無大咎象曰幹父之蠱終無咎也革弊者非剛則革不力過剛則禍必亟過剛而禍不亟者九三其庶乎然亦危矣九三以剛處剛過剛也見天下之弊不勝其憤欲一决而去之此其禍不為朝錯則為景延廣然能小有悔而無咎者九三處巽之極以極順行過剛故過而不過小有悔過剛也無大咎極順也子房之安太子仁傑之存唐嗣其蠱之九三乎六四裕父之蠱往見吝象曰裕父之蠱往未得也天下之壞有大壞之壞有補而未全之壞大壞革之可也補而未全徐之可也補壞之才有革而補之之才有徐而補之之才革而補之强于才者也徐而補之弱于才者也六四居下卦之上上卦之初當初六九二九三幹蠱之後事之壞者亦少飭矣其未飭者皆補而未全者也六四以隂柔之才居近君之位此大臣之弱于才而膺補壞未全之任者也可以徐不可以亟可以寬不可以迫故曰裕父之蠱勸以寬也又曰往見吝曰往未得戒其迫也高帝革秦為漢漢不秦矣亦未三代也補而未全者也惠帝欲有為曹參欲無為非不為也自量其不如蕭何而不敢為也故能成清靜寧一之治此蠱之六四寬裕而不敢勇往者與六五幹父之蠱用譽象曰幹父用譽承以德也六五以柔德居君位繼父業乃能成幹蠱之治者用其譽髦之臣承以衆賢之德也初六之小臣倡其幹九二之大臣柄其幹九三之近臣勇于幹六四之大臣致其裕六五何為哉恭已正南面而已衆賢所輔君無隂柔而况剛明之君乎然則閹之弊文宗曷為不能革曰文宗有六五之柔無六五之輔非無輔也有一裴度而不能用也上九不事王侯高尚其事象曰不事王侯志可則也臣事君子事父一也上九臣也而不事王侯然則為子而不事父與蓋上九之不事其君有三當天下蠱壞之時君子皆有振而飭之之心今也有初六九二九三以幹之又有六四以裕之又有六五之君兼羣賢之幹裕者而用之則上九不必為上九之與九二九三其德同其位殊則上九不得為若夫天下大壞盡羣賢之力佐隂柔之主萬一不振一木獨能支傾厦乎則上九不可為然則上九之不事王侯非志也時也志在我時在天君子不以我違天亦不以天喪我舍之則藏不可則止時也於是不事王侯非不事也不得事也非以為高尚也人高尚其事也故曰不以我違天雖然畎畝不忘君江湖存魏闕志也曷嘗去于心乎故曰不以天喪我此其事雖外為天下之所高而其志實為天下之可法巢許夷齊四皓嚴光其人也與荷蓧晨門異矣誠齊易傳卷五
