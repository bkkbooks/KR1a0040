body:
  text: 誠齊易傳卷六宋楊萬里撰兑下坤上臨元亨利貞至于八月有凶臨之元亨利貞非乾之四德也亨貞而已故彖曰大亨以正至于八月非必至遁而後為八月也陽進上窮隂生下反反而再進然後為遁則猶隔之以泰大壯夬乾姤也陽未消而曰消不久何也蓋消不在遁而在臨臨之消不在初九而在九二自坤之初六為復之初九與坤之六爻而七故曰七日日陽也七與初皆陽也曰來復者聖人喜一陽之來歸也自坤之六二為臨之九二與坤之六爻而八故曰八月月隂也八與二皆隂也曰有凶者聖人戒四隂之猶盛也九二以二陽之進逢四隂之阻不曰凶乎六三一隂已在前矣迫切近矣不曰消不久乎二君子方來而四小人未去君子可不戒乎若俟至於遁而有凶則自郢及我九百里焉能害我舜以一臨四周公以一臨三孔子以一臨一故舜之流放周公之東征視孔子兩觀之役為難自一卦言則二陽對四隂為君子寡而小人衆自六爻言則六三一爻為小人彖曰臨剛浸而長說而順剛中而應大亨以正天之道也至于八月有凶消不久也浸而長說而順君子之亨也剛中而應君子之正也剛以驟而長長必易消剛以狠而進進之不順剛以過而忤忤必不應浸而長則莫之忌說而進則莫之拒中而和則莫之違能此三者則大亨矣然必正而後可是三者有一不正浸則姦說則諂和則流蓋正者天之道也浸謂二陽未大盛剛中謂九二應謂六五象曰澤上有地臨君子以教思無窮容保民無疆澤上有地以地臨水以上臨下之象也澤之潤萬物有與而無竭君子以之教人而不倦地之容萬物有受而不隔君子以之保民而無外初九咸臨貞吉象曰咸臨貞吉志行正也君子之學豈不欲有臨哉臣之臨事臨民君之臨天下均臨也初九當陽長之初處位下之極而其名實氣志已足以感動六四近君之臣此必有不介而合不沽而售者初九宜起而從之不可失也方且守貞固以為吉者蓋士之從人患不在審而在於果近臣賢且正乎四皓從子房近臣不賢且不正乎兩生拒叔孫不然有從無審如固從憲融從冀雍從卓劉栁從叔文吉乎故曰志行正也非不欲行志也惡不正也咸感也九二咸臨吉無不利象曰咸臨吉無不利未順命也初九居下而不輕從近臣宜也九二當剛長之運感六五之君得大臣之位吉矣無不利矣何嫌何疑而未順君命乎蓋君之於臣非致敬盡禮道合志同則不足與有為也可以順命則赴之如决流如轉規未可以順命則守之如介石如移山故武丁一君甘盤傳說異去就武王一聖太公伯夷異顯晦伊尹孔明一身於成湯先主異後前九二之於六五何必汲汲於合哉且六五中順之君虛心以俟九二而不能必其從而况强愎之君乎二陽方長千載一時也而初九守貞固九二未順命則衆隂可得而忌之乎忌且不得而忌而况得而害之乎六三甘臨無攸利既憂之無咎象曰甘臨位不當也既憂之咎不長也剛長之世將泰之世也故初九升聞之君子九二得位之君子六四好賢之近臣六五任賢之大君上六厚德樂善之長者小人在位者六三而已以隂柔之資據二陽之上自知其位之不當自疑夫二陽之見逼然孤而無與亦何能為哉挾兑說之極行甘諂之言容而已然君子可不憂乎彼雖甘諂而不獲利也吾亦憂之而後咎不長也不然子西昵白勝死於白勝五王輕三思死於三思甘可信乎故曰言甘誘我也防誘者昌六四至臨無咎象曰至臨無咎位當也剛多善亦不必偏善柔多不善亦不必偏不善士君子何必資禀之同哉六四之至臨以己之至柔臨初九之至剛而能以柔應剛相與應感而惟恐初九之不我從此其所以柔而無咎宜聖人贊以位之當而非竊位蔽賢者與師德薦仁傑蕭嵩薦韓休庶乎臨之六四矣師德容仁傑者也嵩非容休者也師德賢而嵩難六五知臨大君之宜吉象曰大君之宜行中之謂也六五以柔中之君臨九二剛中之臣未嘗自任其聰明睿知也是宜為君者也而曰知臨何也惟不自任其知而兼衆智是以大其智故曰知臨又曰大君二帝三王之聖一也舜曰大舜禹曰大禹好問拜昌言而已上六敦臨吉無咎象曰敦臨之吉志在內也君子有志不得行無位也蓋有有位而不能行其志者矣竊位之徒是也然則勿病無位病無志有志矣有位可行也無位亦可行也臨之上六是也上六無位而能以厚德樂善之志從二陽之君子吉孰大焉又何咎矣故祁奚之免叔向在於請老之後非有位也吕强之庇黨人乃無寵任之柄非有力也君子病無志耳嗟乎臨之世二陽方長而六五之君主之六四之近臣應之上六無位之賢者亦厚之君子之逢斯世何其幸哉下卦為內志在內從二陽也上六何以從二陽曰隂從陽上反下敦厚也坤下巽上觀盥而不薦有孚顒若上示下瞻之謂觀下之觀上其猶觀祭乎觀祭者不於其薦於其盥當盥酌必躬之初不以萬物易一誠及薦獻多品之後乃以一誠託萬物以誠託物誠始衰矣上之化下為盥而不為薦則孚誠有諸中而顒肅應於下矣彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣教莫大於觀感而政令為下故曰大觀孰能大觀九五是也何大乎九五以中正也九五之聖人以陽剛之資體中正之德形於上觀於下而天下之不中者中不正者正矣孰不內順而外巽心服而身化哉何其神也觀天之神道而法之耳天之神道安在哉中正而已四時不忒是天之中正也運四時而無形者莫如風此天之神也謂巽也感天下而無形者莫如誠此聖人之神也謂九五之中實也惟天下之至誠為能立天下之中正惟天下之中正為能化天下之不中不正故既曰中正以觀天下又曰有孚顒若孚誠也中庸曰至誠如神故曰聖人以神道設教而天下服象曰風行地上觀先王以省方觀民設教風行地上而無不周故萬物曰見天王省天下而無不至故天下曰見聖人隨其地觀其俗因其情設其教此省方之本意也虞周時巡是也穆王之遊始皇之巡武宣之行幸本意乎初六童觀小人無咎君子吝象曰初六童觀小人道也九五大觀在上而初六逺之兹謂童觀童觀者蒙而無見也蒙而無見在凡民為可恕故無咎在君子為可責故吝歡兜之薦共工四嶽之薦鯀一也而人不吝歡兜越人之彎弓兄之彎弓一也而人不怨越人所謂小人無咎君子吝也非無咎也不足咎也六二窺觀利女貞象曰窺觀女貞亦可醜也蒙而無見曰童有見而小曰窺有見固愈於無見也有見而小其愈於無見幾何六二之與九五正應也非如初六之逺於五也然六二以隂暗之資亦安能觀九五之大觀哉不過小有所見而已故御事以東征為艱子路以正名為迂斯見也在女則貞在士則醜六三觀我生進退象曰觀我生進退未失道也必進忘其身必退忘其君皆失其道也欲進退不失其道其惟觀我生乎生出也才德自我出者也我之才德可以進而不進是使赤子不得乳其母也未可以進而進是未能操刀而製錦也六三以柔居剛其位非正必進不可也以順應上其勢有牽必退不可也量已而為進退庶乎未失道也未失者非深許之辭也此亦學者事也若夫聖人仕止久速惟其可而已何必量己哉六三九五皆曰觀我生辭同而德異六三察己以從人九五察人以修己六四觀國之光利用賔于王象曰觀國之光尚賔也九五有剛明之德而四近之故願仕而觀其光六四俟明德之君而後進故其君尊尚之而賔其人下不輕一身則上不輕一士矣箕子近天子之光觀國也王訪于箕子尚賔也九五觀我生君子無咎象曰觀我生觀民也民之善惡生於君君之善惡形於民九五欲觀己之所生觀於民之君子小人而已天下皆君子耶我庶乎無咎矣天下有一小人耶其咎將誰歸故觀堯舜者以比屋觀文武者以羣黎上九觀其生君子無咎象曰觀其生志未平也君子身有用舍志無用舍上九以剛陽之德而居一卦之極當無位之地而負達尊之望故其志未嘗一日不反觀其德之出於己者吾之德其皆君子耶乃無過咎何也吾之身不為天下之所用而吾之德為天下之所仰豈以身之約而志之安乎故曰志未平也子思之在魯子方之在魏裴晉公之在緑野其身彌退其憂彌重故君子無位而有憂小人有位而無憂震下離上噬嗑亨利用獄食有梗治亦有梗梗食者齧梗治者决不齧則味不合不决則治不通嗑合也亨通也曰利用獄獄刑人之事也何利乎用獄也獄廢則梗存矣彖曰頤中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也卦形頥之象九四頥中有物之象三剛三柔分而不雜明而辨也震動離明雷震電耀明而威也六五以柔居五雖不當位然利在用獄不過剛也然則治獄者明以察情非矜其明威以懲惡非尚其威一聽於六五仁厚中和之君而已此先王治獄之本意象曰雷電噬嗑先王以明罰𠡠法威取諸雷明取諸電然曷嘗黷刑哉以此明罰敕法而已罰者刑之薄法者刑之先先故知而不敢犯薄故懷而不忍犯金作贖刑明罰也象以典刑𠡠法也初九屨校滅趾無咎象曰屨校滅趾不行也屨校不懲必至荷校而械其首滅趾不誡必至滅耳而獻其馘初九之小人能懲於薄刑止其惡而不行則不貽上九惡積罪大之凶禍矣故庶頑以撻而格王駘以兀而賢朝為小人暮為君子豈特無咎而已六二噬膚滅鼻無咎象曰噬膚滅鼻乘剛也自二至五皆曰噬何也三臣分去惡之任一君當去惡之主也然六二之去惡則為差易何易乎六二也及初九之淺也初與四為應四於卦為校二能絶其應而不通則四自孤而無與矣故吳濞非楚則反不决燕旦非上官則謀不發膚者患之淺鼻者氣之通豈惟六二以中之德而去惡哉亦居臣之位乘初九之上也故曰乘剛德與位偕又何咎矣六二六三六五有衆齒上下噬齧之象六三噬臘肉遇毒小吝無咎象曰遇毒位不當也六三之去惡視六二則難矣何難乎六三也九四為一卦之梗若臘之堅而難噬也噬之則遇毒而傷齒矣而况齒之弱者乎六三以柔弱之才居剛决之位此弱於齒而噬夫堅者也能不遇毒乎故曰位不當也然則欲去惡者可使才不稱位乎百揆非舜則去四凶以安民祗以危民司冦非仲尼則誅正卯以治魯祗以亂魯然小吝而無咎者能度其才而噬其小者庶乎吝而不至於咎矣九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也九四一卦之梗也乾胏有骨之肉一味之梗也九四自為梗而曰噬乾胏噬之者誰也以九四噬九四也曷為以九四噬九四也以九四剛直之大臣噬九四强梗之大臣也居大臣之位而近君者豈一人而已哉舜與共歡雜處堯朝周公與管蔡並居周位去共歡管蔡之强梗也故得金矢以鑽乾胏則骨去而肉可噬得剛直以去强梗則惡去而治可通金言剛矢言直剛惡者為乾胏剛善者為金矢然猶曰利艱貞吉蓋去惡實難非正固則必敗於怯漏於踈訓色變怯也蕃宣章踈也然有强梗者天下之不幸去强梗者聖人之不得已故曰未光六五噬乾肉得黃金貞厲無咎象曰貞厲無咎得當也屯之九五陽剛之君而大正則凶噬嗑之六五隂柔之君而噬强梗則無咎何也彼無助此有助也曷為有助也噬嗑之强梗有三而六五以離明之君體中正之德又得三二剛正之助則去惡何難焉而况初九强梗之淺上九强梗之衰又皆無位而無勢其近君而逼者九四一臣而已而九四同位之剛直者自足以噬之至于六三亦協力以噬之若夫初九之强梗則六二已折其萌而噬其淺矣則六五之君何為哉惟一上九惡積罪大之小人無位已衰者爾主之以六五中正之君輔之以九四同位剛直之臣加之以六二六三協力决齧之助則上九之乾肉何難於噬哉故曰得當言勝其任也霍禹之兵權已解李輔國之過惡已極故宣帝代宗除之不難也然猶曰貞固危厲謹之至也去强梗除元惡豈可忽哉黃言中金言剛上九何校滅耳凶象曰何校滅耳聰不明也初九滅趾故惡不行上九滅耳以聰不明使耳而聰聰而明則聞過而改久矣何至於惡積罪大而受大戮之凶乎商鞅不聽趙良之言蕭至忠不受宋璟之諫故及離下艮上賁亨小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下上卦本坤而上六之柔來文九二之剛文雖柔而質剛又中正故亨下卦本乾而九二之剛上文上六之柔文雖剛而質柔又非中正故小利有攸往乾下於坤而中爻升于坤之上故為天文以乾坤之變言也離明炎上而艮止之則火之氣焰鬱積光華而成文故為人文以離艮之體言也天文之著者三辰五行之象觀之可以察四時之變人文之著者三綱五常之典觀之可以成天下之化大抵質者物之辨文者物之雜周官畫繪之事雜五色曰𤣥與黃相次又曰青與赤謂之文賁天𤣥地黃火赤山青象曰山下有火賁君子以明庶政無敢折獄山下有火賁解已見上賁文明之卦而大象言明不及逺言政不及獄明用於政則文不蔽明不及獄則明不矜明庶政離也無敢折獄艮也初九賁其趾舍車而徒象曰舍車而徒義弗乘也君子則文之所在也達則振斯文以飾天下窮則卷斯文以飾一身初九以剛正之資秉文明之德而在下無位斯文其廢乎亦還以飾天下者飾一身而已斯文未廢也賁其趾飾其身之所行也何以飾其所行惟義所在而已義在仕舍徒而車義在止舍車而徒仕患無其時今居賁飾文明之時時患無所主今近六二文明之佐然初九舍乘車而從徒行者何也二吾近而非吾應也四吾應而吾逺也逺者不得從近者不强從何也義也夫以初九之賢也六二又賢也然初九猶不强從於六二非其與也賢而非其與且不從而况非其賢者乎故太公非不賢而伯夷不從之以諒武王侯霸非順指而嚴光不從之以事光武初九賁世之放民也亦賁世之榮光也斯世而有斯人非榮乎六二賁其須象曰賁其須與上興也士有待而後發未有不待而發士有求而不應未有不求而應非珍身也珍道也珍吾道猶汙吾道而况貶吾道乎六二主一代文明之大臣也逺自坤之上六惠然而來以佐興文明之治者也然非六五文明以止之君有化成天下之文秉中正柔順之志以求六二之飾也六二肯輕就乎故曰賁其須須來也亦待也意興於上吾與於下而已與許也故曰與上興也下有禮樂之文而上未遑君子惜其不待求而發上有禮樂之問而下無對君子恥其求而不能應雖然寧取房杜母惜賈誼房杜不能必有能者矣至曰未遑舉吾道而委溝矣惜也誼知易之賁未知賁之須也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也賁德盛在九三其千載一時乎其當堯之文章周之禮樂之世乎蓋九三處文明之任聚剛柔之文二與四以柔而文三之剛三以剛而文二四之柔制作備矣文物著矣譬之於物光華潤澤其如沃而濕之乎詩曰六轡如濡言光潤之至也夫立君臣父子之分以為禮樂法度之文鴻荒之世其理具其法隱伏羲之世其法立其文粗堯舜成周之世其法備其文著既備矣既著矣又何加焉曰守之自天髙地下之象至亷逺堂髙之勢此百聖之功千載之積豈一手一足之力哉文之始難成而文之成易壞今賁飾之文如濡之著夫何為哉永貞固以守之則下不陵上卑不陵尊而萬民定天下安矣故周禮存則魯安周籍去則周衰六四賁如皤如白馬翰如匪冦婚媾象曰六四當位疑也匪冦婚媾終無尤也上九以乾文坤以剛文柔六四之柔從上九之剛可謂有白受采之質矣然隔於六五而不得親受飾也賁如皤如其質可受上九之賁也白馬翰如其志願從上九之急也質美而受飾志急於從飾可也然隔於六五之君間而憂疑怨尤則不可也何也六五與六四其德同於柔順而相親非冦讎也故聖人釋其疑解其尤而曰位雖若隔而可疑德則相親而終無尤也故許行能使陳相不識陳良而徐辟能使夷之見孟子許行相之冦也辟非夷之之冦也婚媾之親也六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也六五文明以止之君兼羣臣藻飾之業成天下文明之化六五其遂足乎曰未也方且垂雲漢昭回之光下飾丘園髙蹈之士將以幣帛厚意之禮招而致之不使天下有一賢之遺文治有一毫之缺此賁之至盛也然聖人猶曰吝終吉者幣有所宜施亦有所宜吝吝之於非其人然後施之惟其人矣吝故榮榮故喜喜故吉賢者榮之而畢赴喜孰大焉百里入而秦喜樂克用而軻喜喜孰大焉然賁之時猶有士之隱於丘園非六五之恥乎且隱丘園者孰哉初九義不乘六二之車舍之而徒行者是也六二不能致初九而六五之君乃能致之六二異乎子房而六五之賢於髙祖可以為六二歉而為六五賀矣六五何恥焉故曰六五賁之至盛也六五坤體坤為吝嗇故曰吝終吉嗚呼六五之賁丘園其湯之莘高宗之巖文王之渭乎上九白賁無咎象曰白賁無咎上得志也易窮則變文窮則質上九居賁飾之極文之窮也救文之窮其惟質乎故曰白賁白者質素而無色也上九居賁之世自下卦之二分而文上六之柔志在成賁也不成賁以吝而成賁以白然後賁之治成而賁之敝不作不敝故無咎無咎故得志布被於窮奢之時者未為矯而齊詐非其人瓦器於美新之俗者未為陋而閏仕非其世固有似白賁而非者矣誠齊易傳卷六
