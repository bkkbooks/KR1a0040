body:
  text: 誠齋易傳卷十宋楊萬里撰坤下離上晉康侯用錫馬蕃庶晝日三接彖曰晉進也明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也晉之世上則天子進乎德有不己之明下則諸侯進乎順有不己之報進乎德如日之出於地愈升愈明進乎順如地之承於日愈下愈髙下順上而不已故上燭下亦不己是以錫馬蕃庶而恩之者豐晝日三接而禮之頻也君進於明可也臣進於順可也諸侯非在廷之臣也在外之臣也在外而不進於順則尾大而􅏓盩矣坤為馬離為日日出於地為晝三接下三隂也柔進而上行謂六五也康侯天子鎮撫諸侯以安之也上下相安則天下安象曰明出地上晉君子以自昭明德日有掩則明者曀心有掩則明者盲明出地上則孰掩夫日自昭明德則孰掩夫心禹之惡旨酒湯之不邇聲色不殖貨利徹其掩以自昭也自昭者自用其力以瑩之之謂故日出如躍昭德如濯初六晉如摧如貞吉罔孚裕無咎象曰晉如摧如獨行正也裕無咎未受命也屹然于進退之初者不詒凶于身怡然于疑信之間者不見咎于人初六處進為之初未受命於上當是之時必進則躁必退則激未見信而必其見信則諂且懟必也屹然而立則躁激消怡然而裕則諂懟泯惟初六順而靜者能之晉如進也摧如退也罔孚未見信也楊氏以孟子進退有餘裕當之得之矣六二晉如愁如貞吉受兹介福于其王母象曰受兹介福以中正也六二以柔順之德逢文明之君當亨進之位能居中守正以進為憂而不以進為喜若此可以得吉矣可以受庶馬三接之大福于其君矣薳子馮避令尹之位蔡謨辭司徒之拜皆以進為憂者王母君之柔中者也六五是也六三衆允悔亡象曰衆允之志上行也六三以隂居陽下不為六二之大臣上不為九四之近臣蓋身退而德進位卑而望髙者與故其志上進以順麗乎大明之君志發乎此衆信乎彼而其志得行矣宜其悔吝之亡也大則如二老歸周而天下從小則如一隗入燕而羣賢至是已下二隂皆順上故曰衆允九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也處遁惡後處晉惡先九四以剛狠之資超貴近之地處羣下之上躐三隂之前以康侯則逼乎王室如鄭莊之逼周以近臣則僣乎王權如桓溫之僣晉故貪夫位而不思釋畏乎下而恐見奪如鼫鼠然雖正亦危况不正乎貪者將上僣於六五畏者猶下忌於三隂上僣而其進不遂以其君之明而不可犯也下忌則其進有牽以其僚之順而從上者衆也使上暗如二世下散如髙貴卿公九四其孰禦雖然以剛狠之強臣居逼近之髙位九四處之固不當也處九四於不當之位者誰乎六五悔亡失得勿恤往吉無不利象曰失得勿恤往有慶也六五柔主也宜不立者也宜悔吝宜憂恤宜非吉宜不利而聖人斷然許之以悔亡以勿恤以往必吉必無不利又勸之以往則有慶且夫悔則亡矣六五慶也恤則勿恤矣六五又慶也往則吉矣六五又慶也往則無不利矣六五又慶也是四慶者它卦或得其一二已為卦之盛今六五柔主乃兼此四慶而有之然則王之不立者其福固如是乎曰主德尚剛惟晉之一卦主德不尚剛曷為晉之主德不尚剛曰晉之主德如日之出地此朝日也天下己服其明矣初出之朝日而遽若方中之烈日天下其不旱熯暍死矣乎惟柔故明而不虐燭而不察淑而不烈大抵日中非日之盛而莫盛於朝日剛明非晉之盛而莫盛於柔明蓋日之為明朝則升中則傾君之為明柔則容剛則窮六五晉之盛明之主也宜其福之盛也孰謂其柔而不立哉大則如商髙宗之不言小則如齊威王之不鳴書曰柔而立又曰髙明柔克六五以之失得勿恤謂得與失皆勿憂恤六五離也為日為火雖柔猶剛也上九晉其角維用伐邑厲吉無咎貞吝象曰維用伐邑道未光也上九以剛明之資進而至於首又進而至於角剛之極也明極者必窮物剛極者必觸物故不勝其剛而無所用之維思攻伐人而已夫明不自照而用之以窮物剛不自攻而用之以伐人若反其剛明而有自危之心聖人尚許其吉無咎也或挾其剛明而自以為貞固聖人知其吝未光也子玉剛而無禮陽處父剛而干時所以敗也晉明卦也而四隂吉悔亡二陽厲且吝德宗以明強自任其未有得於此乎厲者愓厲而自危也離下坤上明夷利艱貞彖曰明入地中明夷內文明而外柔順以蒙大難文王以之利艱貞晦其明也內難而能正其志箕子以之易之道有時有人逢其時顧其人用之者何如耳如明夷之時明之傷也孰傷乎明也地掩夫日所以傷夫明也惟能掩而不傷是明夷之道也是時也何時也紂之時也是道也孰能用之用一卦之道者文王也用一爻之道者箕子也文王用一卦故內焉離之文明我則用之以不失其盛外焉坤之柔順我則用之以服事殷用是二者是故以此蒙犯羑里之大難而紂無所施其虐此文王掩而不傷之道也箕子用一爻故不惟利於居易而亦利於處艱艱而利利而正蓋不晦其明則以艱險而傷其生何利之有不正其志則以艱險而傷其明何貞之有大難以天下言內難以一家言紂之難大能及天下而不能及文王小能及一家而不能及箕子此用明夷之力也然彖辭象辭同曰明入地中明夷易之例未有也恐此明入地中四字為衍象曰明入地中明夷君子以蒞衆用晦而明變而不窮者易之道用而不窮者易之人如明夷一卦用之以處險則為文王與箕子明而晦用之以居易則為蒞衆之君子晦而明明而晦故全己晦而明故燭物故曰推而行之存乎人又曰神而明之存乎人初九明夷于飛垂其翼君子于行三日不食有攸往主人有言象曰君子于行義不食也飛者不願不高今乃垂其翼知其不可不退也行者不能不食今乃三日不食知其不可不速也可以退則退可以速則速君子當明夷之初知其傷之者將至故決焉長往而不顧或者見議而不恤何也晦己之明避上之暗義當去之之速也何食之暇楊氏謂接淅而行是也當紂之時其伯夷太公避居海濱之事乎六二明夷夷于左股用拯馬壯吉象曰六二之吉順以則也六二居明夷之時最不幸者也何也當此之時惟晦者可免於傷而六二乃有文明之德此暗主所甚忌也惟去者乃免於傷而六五乃居大臣之位此昏世之所不得去也以其位之不得去故有左股之傷股肱左右者大臣之象也以其德之文明故有馬壯之拯初九九三乾馬用壯之助也助之者壯處之者順所以吉也非吉之吉也凶之吉也既傷股矣非凶乎傷而獲拯非凶之吉乎當紂之時此正文王之事也見囚者傷股也伯夷太公歸之閎夭之徒脫之者馬壯之拯也柔而恭淵而懿臣罪當誅而天王聖明者順以則也則者有君人之大德而乃有事君之小心順乎君臣之天則也故詩人歌之曰順帝之則而仲尼今贊之曰順以則也詩人仲尼其見文王之心乎九三明夷于南狩得其大首不可疾貞象曰南狩之志乃大得也六五當箕子六二當文王然則孰當紂乎當紂者其上六乎上六位之髙暗之極此明夷之主也非紂當之其誰當之然則孰當九三程子以為湯武之事是也程子混而言之婉也試别而言之九三其武王之事乎九三居下卦之上而體離明之極膺南面之望而應上六之敵是惟無狩狩一而獲明夷大害之首矣然則緩其狩而不疾者昭其至正也志於得其首而非志於利其得者昭其不私也非武王伐紂之事其何事乎故恭行天罰是南狩也勝商殺紂是大首也須暇五年是不疾也克相上帝寵綏四方曷敢越志是志得也六四入于左腹獲明夷之心于出門庭象曰入于左腹獲心意也上六明夷之君也六四明夷之佐也明夷之時有昏暗之君而無隂柔小人之佐孰與逢昏主之惡而傷君子之明哉惟六四以隂柔之姦居近君之位是故挾左道用非僻以中其君之欲至於深入其腹心而壞其中探得其傷害君子之志意而肆於外於是聖賢有不免於傷者矣且暗王之與小人何仇於聖賢而必欲傷之乎蓋上暗下明惡易以形此邪彼正勢難以並此其理也然小人知傷君子以逢其君不知傷君子以傷其君故得大首者九三也大首之所以見獲者非九三也六四也當紂之世所謂六四者其飛亷惡來之事乎出門庭者出而肆于外六四坤之初也坤為腹六五箕子之明夷利貞象曰箕子之貞明不可息也五君位也而聖人以箕子當之者明夷之時六五以隂居陽以柔居剛得中守正陽剛之君子也紂不足以當之當之者舍箕子而誰也又箕子與紂同姓之親也此孟子所謂易位之卿也箕子既有此嫌而又與微子皆疑於商家及王之制意其當時天下之望亦或以六五之德與位歸箕子與此紂所以疑之之深所謂內難者也非為之奴以深晦其明則居艱而不利非守其貞而不同其惡則明滅而或息晦其明故全於人明不息故全於天五陽明也六隂晦也以六晦五故為箕子之明夷上六不明晦初登于天後入于地象曰初登于天照四國也後入于地失則也上者六位之至髙故初登于天而四國望之照臨上六者昏德之終極故後入於地而天下失其所法則是以既曰不明又曰晦者甚其昏之辭也紂之嗣位聞見甚敏材力過人其初登于天照四國之時乎及其以昏棄失德而為獨夫其後入于地而失則之時乎離下巽上家人利女貞彖曰家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣正莫易於天下而莫難於一家莫易於一家之父子兄弟而莫難於一婦一婦正一家正一家正天下定矣故家人之卦辭曰利女貞大哉女貞之利乎女正者女非自正也蓋有正之者孰正之男也正女以男正男以父之身正身以言行前之二正在彖後之二正在大象與上九然家人之職二其道一婦職順父職嚴合嚴順之道存乎正嚴而不正獨嚴不行順而不正獨順不立故曰利女貞曰正位曰家道正曰男女正天地之大義天地之義以男女正為大而况天下萬事乎故曰正家而天下定女內謂六二男外謂九五父母謂上九六四尊而在上者兄謂九三弟謂初九利女貞謂巽長女離中女正位內外謂名分若吕武南面則男女易矣名分亂矣象曰風自火出家人君子以言有物而行有恆巽木也風也今舍木取風離日也火也今舍日取火蓋火本生於木木者火之父風還出於火火者風之母如家人夫婦父子相生無已也物必有自出風自火出教自家出家自身出故君子正言行以嚴身嚴身以家嚴家以天下言必有物言而無物則欺行必有常行而無常則偽欺乎言偽乎行而能正家者無之初九間有家悔亡象曰間有家志未變也婦訓始至子訓始稚及其志意純一而未變也初九處家人之始初而用陽剛之嚴治有防間之逺慮一日之正終身之正也何悔之有此舜之刑于二女文之刑于寡妻也魯桓公唐髙宗反是六二無攸遂在中饋貞吉象曰六二之吉順以巽也婦無遂事必有尊也言有夫也婦職饋祀必有敬也言有先也婦而遂事則僣僣則家不齊時有牝雞鳴晨之禍婦而不職則傲傲則家必隳時則有腐木為柱之禍六二以柔順之令德宅壼內之正位退然無攸遂以尊其夫劬然羞饋祀以事所職正孰大焉吉孰禦焉故聖人贊而譽之曰順以巽也順則安而不僣巽則卑而不傲此二女之事舜太姒之事文也褒妲反是九三家人嗃嗃悔厲吉婦子嘻嘻終吝象曰家人嗃嗃未失也婦子嘻嘻失家節也正家之道嚴勝則厲和勝則溺嗃嗃而嚴嚴勝也嘻嘻而笑和勝也然嚴勝者雖悔厲而終吉故聖人勸之以未失和勝者雖悅懌而終吝故聖人戒之以失節九三剛而過中嚴勝者也正家之道聖人取焉自九五上九六四而降九三亦家人之長也其一家之兄與周公之誅管蔡訓康叔得嗃嗃之義矣莊公之於假文帝之於長景帝之於武其嘻嘻者與六四富家大吉象曰富家大吉順在位也善富家者不寶珠玉而以父慈子孝為珠玉不豐粟帛而以夫義婦聽為粟帛故六四之富而吉吉而大聖人釋之曰六四之富非以富而富也父子夫婦各順其位而不相踰越是謂富矣易之富家即記之家肥也六四以柔順而居下卦之上上卦之內其家人之母與思齊太任是已舜母反是九五王假有家勿恤吉象曰王假有家交相愛也正家在政睦家在德正人在法感人在心使我正人易使人愛人難使我愛人易使人愛我難使人愛我易使人人交相愛難非以德睦之以心感之安能使之交相愛乎九五以乾德之剛明居巽位之中正為天下國家之至尊而愛心感人巽而入之此所以感假其家人以及天下莫不人人交相愛勿憂天下之不憂而自吉也以文王為君以太姒為妃以王季為父以太任為母以武王為子以邑薑為婦其不交相愛乎故詩人歌之曰刑于寡妻至于兄弟以御于家邦此交相愛也仲尼頌之曰無憂者其惟文王此勿恤吉也上九有孚威如終吉象曰威如之吉反身之謂也人能不以惡於子者事父則天下皆舜人能不以檢於身者自恕則天下皆文王誠意中充則德教外孚也上九以過剛之威而嚴其家未至也以嚴家之檢而誠其身斯至矣此其所以成家而享正家之吉也九五君也上九君之上其文王之王季與故周家之正有刑于太姒者有刑于文王者九乾剛故威上巽極故孚孚者誠乎身兊下離上睽小事吉彖曰睽火動而上澤動而下二女同居其志不同行説而麗乎明柔進而上行得中而應乎剛是以小事吉天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉易通則窮窮則通睽者人物之散也離之火兑之水燥濕俱動而異就物之散也離仲女兑季女仲季同居而殊姻人之散也物聚則朋散則孤孤矣焉得而不窮然睽孤而小事吉何也散不可聚睽不可合凶不可吉則無為貴易矣兑之説麗乎離之明是合睽也六五進而上行是合睽也六五得中而應乎九二是合睽也故曰易窮則通合睽之道又有大者天地之判而合男女之别而耦萬物之分而聚非合睽之大乎故仲尼贊之曰睽之時用大矣哉故曰易窮則通象曰上火下澤睽君子以同而異禹顔同道而異趨夷惠同聖而異行未足為同而異也孔子一孔子而齊魯之去異遲速孟子一孟子而今昔之饋異辭受此同而異之也乃一人自為水火矣君子亦何必好同而惡異乎初九悔亡喪馬勿逐自復見惡人無咎象曰見惡人以辟咎也此聖人合初九九四之睽也善合睽者與其亟也寧舒與其褊也寧宏蓋初九之與九四上下異趨而相叛水火異性而相賊惟相叛故初九動而下固不與九四而為徒九四動而上亦舍初九而不與俱彼舍我而去故有喪馬之象初九能聽其去而勿逐須其定而自復是以悔亡此合睽以舒不以亟之道也相如之感亷頗子儀之安光弼是也惟相賊故九四之火值初九之水則熄初九之水值九四之火則涸彼㸑我而我涸故有惡人之象且水在火上則涸今火在水上亦能涸初九何也蓋水火相遭有自下涸上者鼎釜是也有自上涸下者實水于中而盛之以上覆下承之器環之以上下四方之火是也又離日也常晹能焦大澤者也初九之於惡人能不以避為避而以見為避是以無咎此合睽以宏不以褊之道孔子見南子孟子解子敖陳實弔張讓是也若非避咎乎惡人則無所事於見惡人孔子不見陽貨是也且初九剛也而能舒且宏何也説故也初與四偕乾體而同陽德乾為馬同故復初九降屈以下於九四故為見惡人水在火下故為辟咎九二遇主于巷無咎象曰遇主于巷未失道也此聖人合九二六五之睽也睽之諸爻皆睽之睽惟九二六五乃睽之合故遇主于巷曷謂巷詩曰誕置之隘巷傳曰行及弇中一與一誰能懼我弇亦狹道巷者道路之隘徑也曷謂遇傳曰不期而會曰遇遇者邂逅之適然也今有二人而東西行者適相遇於隘巷之中趾之外無他地路之外無它岐雖欲逃猶將遭之雖欲隔之猶將覿之是其遭也孰得而並是其覿也孰得而分乎一與一故也今諸爻皆不遇六五而九二剛正之大臣乃得遇六五寬柔之明主六五皆不應諸爻而乃應九二此應之專而莫之分遇之獨而莫之並者故曰得中而應乎剛又曰遇主于巷君臣之相遇如此而止曰無咎何也有三不幸也當睽之時一也主弱二也諸爻皆睽而寡助三也其平王晉文侯之事乎此所謂小事吉也不然髙宗得一傅説武宗得一德裕無咎而己乎未失道道亦路也必相得而不相失也六三見輿曵其牛掣其人天且劓無初有終象曰見輿曵位不當也無初有終遇剛也此聖人合六三上九之睽也且六三之於上九正應也曷嘗睽而不合哉睽之者九二九四也我欲行而合上九則九二牽我輿於後我欲進而遇上九則九四掣我牛於前六三以柔居剛惟柔故下不能制九二惟剛故上進而犯九四彼阻我而不得進我犯之而必進彼在我上其傷我必矣天言上劓言傷也然六三以柔順之德和説之極而居二陽之間處重險之位位不安而德足以調伏於二剛又遇上九之應九主之於上故睽於初而合於終也子産相鄭之初駟良方爭南晳相攻子産謂子皮曰國小族大不可為也有欲攻子産者有欲殺子産者而子産能焚謗書賂伯石以和柔調伏之子皮子太叔又力主之鄭遂以治得六三之義矣六三坤體為中為輿九四睽孤遇元夫交孚厲無咎象曰交孚無咎志行也睽者乖之極孤者睽之極九四以獨陽處二隂之間孤立而無與危厲之不暇乃能無咎此已幸矣又得行其志以合天下之睽何也與在下之善士如初九之同德相遇以誠相交以信是故孤者朋睽者合何志之不可行何難之不可濟哉舉朝皆武氏之臣而狄仁傑以一身徇唐非孤立於睽離之世乎乃下薦洛川司馬張東之薦一柬之而五柬之合與仁傑而六周復為唐仁傑之志行矣豈惟無咎又何厲矣元夫善士也六五悔亡厥宗噬膚往何咎象曰厥宗噬膚往有慶也創巨者其愈遲傷淺者其合易天下睽離之時此亦創巨痛深之病也六五乃以隂柔之資而君之宜其悔宜其咎宜其合睽之難也今也乃能合天下之睽如傷肌之淺而合之之易者何也得九二陽剛之宗臣以佐之之力也是以悔亡是以何咎是以有慶大哉佐乎有其人雖弱君且能合天下之離而况得剛明之君乎程子以成王周公劉禪孔明當之得之矣噬膚傷之淺也上九睽孤見豕負塗載鬼一車先張之弧後説之弧匪冦婚媾往遇雨則吉象曰遇雨之吉羣疑亡也上九有六三以為正應非孤也而云睽孤者居離明之極過於明也過於明故過於疑過於疑故無往而非疑見豕負塗疑其穢已載鬼一車又疑其祟已先張之弧疑其為冦而害己後説之弧又疑其可親而非害己疑心羣起而若不可解者為六三者安得而近之此上九之所以孤也然惟天下之至明為能生天下之至疑非天下之至明亦不能釋天下之至疑其初雜然而疑其後渙然而釋以上九之至陽遇六三之至隂隂陽相和而為雨則羣疑釋然而俱亡矣當其善疑也似唐德宗之於蕭復薑公輔及其疑之亡也又似成王之於周公要之皆不及昭帝之於霍光先主之於孔明矣先張之弧後説之弧以畫卦之象言也解在下繫蓋取諸睽章誠齋易傳卷十
