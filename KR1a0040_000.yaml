body:
  text: 誠齋易傳易類提要臣等謹案誠齋易傳二十卷宋楊萬里撰萬里字廷秀自號誠齋吉水人官至寶謨閣學士致仕韓托胄召之不起開禧間聞北伐啓釁憂憤不食卒後諡文節事迹具宋史本傳是書大旨本程氏而多引史傳以證之初名易外傳後乃改定今名宋代書肆曾與程傳並刋以行謂之程楊易傳新安陳櫟極非之以為足以聳文士之觀瞻而不足以服窮經士之心然聖人作易本以吉凶悔吝示人事之所從舍人事而談天道正後儒説易之病未可以引史説經病萬里也理宗嘉熙元年嘗給札寫藏祕閣元胡一桂作易本義附録纂疏博采諸家乃獨不録此書一字蓋以其文士輕之然萬里文章氣節自足千古此書亦不可磨滅至今猶在人間區區門户之見亦何足為萬里輕重歟乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀誠齋易傳原序易者何也易之為言變也易者聖人通變之書也何謂變蓋隂陽太極之變也五行隂陽之變也人與萬物五行之變也萬事人與萬物之變也古初以迄于今萬事之變未已也其作也一得一失而其究也一治一亂聖人有憂焉於是幽觀其通而逆紬其圖易之所以作也易之為言變也易者聖人通變之書也其窮理盡性其正心修身其齊家治國其處顯其傃窮其居常其遭變其參天地合鬼神萬事之變方來而變通之道先立變在彼變在此得其道者蚩可哲慝可淑眚可福危可安亂可治致身聖賢而躋世泰和猶反手也斯道何道也中正而已矣唯中為能中天下之不中唯正為能正天下之不正中正立而萬變通此二帝三王之聖治孔子顔孟之聖學也後世或以事物之變為不足以攖吾心舉而捐之於空虛者是亂天下者也不然以為不足以遁吾術挈而持之以權譎者是愈亂天下者也然則學者將欲通變於何求通曰道於何求道曰中於何求中曰正於何求正曰易於何求易曰心愚老矣嘗試與二三子講之二三子以為愚之言乎非也愚聞諸先儒先儒聞諸三聖三聖聞諸天淳熙戊申八月二日廬陵楊萬里序誠齋易傳原序
