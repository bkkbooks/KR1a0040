body:
  text: 誠齋易傳卷二宋楊萬里撰震下坎上屯元亨利貞勿用有攸往利建侯物屯求亨時屯亦求亨然時屯求亨其道有三惟至正為能正天下之不正故曰利貞惟不欲速為能成功之速故曰勿用有攸往惟多助為能克寡助故曰利建侯漢高帝平秦項之亂除秦苛法為義帝發喪得屯之利貞不王之關中而王之蜀漢隱忍就國而不敢校得屯之勿用有攸往會固陵而諸侯不至亟捐齊梁以王信越得屯之利建侯二帝三王亨屯之三道高帝未及也而亨屯之功如此而况及之者乎彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧震以初九之陽而下于陰以六二之陰而上于陽皆居一卦之始故曰剛柔始交以震遇坎故曰難生震動坎險故曰動乎險中臨險難而不妄動必正而後動是惟無動動則大亨故曰大亨貞仗至正以動於險難之中如天地之動一動而雷雨盈於天地之間亨孰大焉當屯難之世如造化之初草而未齊昧而未明能動以正而又得建侯之助則屯可亨矣大亨貞即卦辭之元亨利貞動而雷雨滿盈即勿用有攸往建侯而不自寧即利建侯然卦言勿用攸往而彖言雷雨之動者勿用攸往非終不動也審而後動也屯之元亨利貞非如乾之四德故曰大亨貞彖曰雲雷屯君子以經綸天下無事庸人不庸人天下多難豪傑不豪傑當屯難之時君子當之豈可以晏然處之哉非有經綸天下之才則屯未易亨郭子和曰坎在上為雲故雲雷屯坎在下為雨故雷雨作解雲而未雨所以為屯其説最明初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也君子濟屯患無才有才患無位初九以剛明之才而居下位非二非四雖欲有為未可也姑磐桓不進以待時而已然豈真不為哉居正有待而其志未嘗不欲行其正也居而不貞則無德行而不正則無功周公言居貞而孔子言行正然後濟屯之功德備矣然則何以行吾志何以濟夫屯建侯以求助自卑以得民則志可行屯可濟矣初九在下而遠君建侯非我職也而初九能之乎賈林合李抱真王武俊之歡而朱滔遁唐遂以安林遠君而無位者也劉琨失王浚猗盧之援而幽并亡晉遂失中原琨遠君而有位者也初九患無志耳有有為之志而輔以建侯之助何職之拘何位之俟哉故濟屯者志為大初九遠君無位聖人猶許其有志而况有志而近君有位者乎震之初以一陽為二隂之主故曰貴二隂賤而一陽下之故曰下賤六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也屯之六二以隂柔之德居大臣之位非不欲濟時之屯也然下則逼於初之剛而乃為己之寇上欲親於君之應而有近之嫌故邅如而不能行班如而不能進然則何以處之如女子然與其從寇而字不若守正而不字雖未得親於婚久則寇定而自成其婚婚而字焉何遲之有此王導相晉之事也上有元明之二君而下有王敦之強臣導乃以寬大之度柔順之才處強臣之上非乘剛遇寇而何惟導守正不撓而下不比於敦待時觀變而上不危其國久而寇自平焉君自信焉國自安焉此十年乃字復其常之效也謝安之於桓溫初則伐其壁人之謀徐而寢其九錫之命強臣自斃而王室以寧亦屯之六二也雖然六二之邅如班如者其病在於隂柔而無剛明之才耳舜之於四凶周公之於管蔡孔子之於少正卯何澶班之有六三即鹿無虞惟入于林中君子幾不如舍往吝象曰即鹿無虞以從禽也君子舍之往吝窮也三無剛明之才而居震動之極妄意於濟屯之功業所謂即鹿然五應二而不應三三妄動而無上應無應則無功所謂無虞而鹿入林中也君子當此者舍而退則見幾而無悔往而進則遇險而必窮蓋功無幸成業無孤興郭林宗所以不仕於漢管幼安所以不仕於魏非無憂世之心也鹿譬則功也虞人譬則應也六四乘馬班如求婚媾往吉無不利象曰求而往明也六四居上而隂柔非濟屯之才故乘馬而不進初九在下而剛明為六四之應故求助則必往此六四有自知之明無疾賢之私者也魏無知徐庶以之求助之謂九五屯其膏小貞吉大貞凶象曰屯其膏施未光也九五以剛明之君居屯難之世宜其撥亂反正有餘也然其澤猶屯而未光其所正可小而不可大是屯難終不可濟乎有君無臣故也六四近臣則弱六三近臣則又弱六二大臣則又弱然則九五將欲有為誰與有為惟一初九則遠而在下賢而在下則如無賢臣而在遠則如無臣唐之文宗初恥為凡主非不剛也終自以為不及赧獻大貞則凶也何也觀近臣則訓注也觀大臣則涯餗也觀遠臣則度與德裕也用不必才才不必用而欲平閹宦之禍故曰君強臣羸航無楫維無臣有主去虺得虎上六乘馬班如泣血漣如象曰泣血漣如何可長也窮否反泰極屯反亨屯之上難之極也然非剛明之極何以亨屯難之極今乃以六之柔而當之進無必為之才退有無益之泣求夕亡朝得之求朝亡夕得之何可長也唐之僖昭是已坎下艮上蒙亨説者以蒙為蒙昧之蒙非也蒙猶屯也屯者物之初非物之厄蒙者人之初非性之昧勾而未舒曰屯稚而未達曰蒙故蒙有亨之理果昧也奚亨焉匪我求童蒙童蒙求我教者無求於學者然後先王之道尊學者有求於教者然後教者之言入道尊則傳而行言入則信而堅故無求非傲有求非詘初筮告再三瀆瀆則不告利貞未達而求達者一問答而加多不達而求其達者百問答而加少再三愈加少也故初筮而告達其蒙也再三而不告亦達其蒙也一告而達則悅再三而不告則憤安知憤者之達不深於悅者乎然則問而答者愛也問而不答者亦愛也歸於利貞而已矣蒙而達達而堅貞其利益孰大焉筮者問而占之之謂彖曰蒙山下有險險而止蒙蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也蒙之險有險中之亨蒙之止有止中之行險而止者稚而蒙也亨而行者蒙而達也何達也達乎中正而已何為而達乎中正也以其求中正之志就其剛明中正之人斯達矣曰時中曰養正道之中正也曰志應求者有志則教者必應也曰剛中九二剛明中正之人也始乎蒙卒乎聖原乎志而已何謂志童蒙求我是也瀆之為言褻也再三問者褻也再三告者亦褻也問之褻則昧答之褻則棄匪我求童蒙謂九二蒙以養正謂六五象曰山下出泉蒙君子以果行育德山下出泉者泉之性行山之性止此欲行而彼止之故曰蒙蒙者欲行而未達之謂雖然豈終止哉其決也有不可禦其積也有不可測泉不可禦君子得之以果其行泉不可測君子得之以育其德初六發蒙利用刑人用説桎梏以往吝象曰利明刑人以正法也蒙在發發在豫初者發之豫也聖人何以發之教人大立法立法大正己己正於上人觀於下迷者覺蔽者解如械得釋如囚得宥其何快如之故曰利用刑人用説桎梏快之至也刑之為言法也如刑于二女之刑故曰以正法也然則以言語教者末矣而况威乎以往吝者過是以往則吝也如威令是也堯舜率天下以仁而民從之刑人之義也九二包蒙吉納婦吉子克家象曰子克家剛柔接也善教欲寬不欲苛善學欲遜不欲速初六六三六四羣蒙皆隂也故稱婦焉九二以剛明之才當間達之任受羣蒙之歸則宜寬以俟之故稱包納焉包則有容而無擇納則有受而無却皆寬也人皆有聖賢君子之質奈何絶之以苛三后之化頑民所謂無忿疾于頑有容德乃大是也然六五之童蒙有求於二而二匪求於五乃曰子克家何也臣之事君如子之事父責難納誨陳善閉邪正使致君以堯格君於天如伊尹周公亦臣子分內事耳亦如子之幹蠱克家耳非功也剛柔接者以五之柔下際於二也婦羣蒙尊教者也子九二尊受教者也六三勿用取女見金夫不有躬無攸利象曰勿用取女行不順也女德以順為正三仰舍上九之應而俯從九二之強是女見利而動者也非順也動以利則身非其身失其身則利非其利是以君子勿取也何為不取以順為正也陳相下喬而入幽即六三舍上而從下公孫曲學以阿世即六三見利而失身斯女不可取也斯士獨可用之無所不至矣金夫夫之挾厚利者九二剛而乾體乾為金六四困蒙吝象曰困蒙之吝獨遠實也蒙非教不瑩教非賢不親四以昏蒙之資而遠於上下二陽剛健篤實之賢宜其困而吝也窒於通之謂困嗇於復之謂吝吝疾者諱醫吝過者諱師四之困蒙而復吝於親賢所謂困而不學民斯為下者與然則聖人真絶而不教乎是教也非絶也仲尼之於陽貨孺悲皆所不見疑絶也然闞亡取瑟是亦不屑之教誨也使二子而改則困而知之與生而知之學而知之一也如吝何六五童蒙吉象曰童蒙之吉順以巽也有童稚之蒙有小民之蒙有學者之蒙有聖人之蒙六五以人君之尊乘巽順之德自居於童稚之蒙以下學於九二剛明之賢此聖人之蒙也聰明睿智而守之以愚者也高宗自以其德弗類而學於傅説武王自以不知彛倫而訪於箕子所以聖益聖與此謂蒙以養正聖功者也晦其中正而養之以蒙如霧蒙日乃所以養日其明不費故其照不匱非作聖用功之深孰能與於此上九擊蒙不利為寇利禦寇象曰利用禦寇上下順也初六發蒙九二包蒙上九擊蒙蒙至於擊則繼之以怒矣教其未裕乎蓋包者容其發之所不迪擊者攻其包之所已窮發之之蚤而包之之極然猶蒙而不化至於為寇上之人不得已攻伐而扞禦之則上之辭順而天下之心亦順之矣上下俱順則彼寇者何利而此禦寇者何不利哉虞之三苖周之三監蒙而為寇者也禹周公之征擊蒙而禦寇者也上者蒙之終故不化九者陽之窮故必擊乾下坎上需有孚光亨貞吉利涉大川需者有所須而動有所待而發傳曰需事之下又曰需事之賊言猶豫不決之害事也而光且亨且吉且利何也易之需非不決之需見險而未可動能動而能不動者也孚且貞故也孚者以誠待詐詐窮而誠自達貞者以正待邪邪詘而正自伸惟誠惟正無敵於天下是惟無動動則亨吉雖大川亦可涉而利也先主所謂操以詐孤以誠操以暴孤以仁蓋假之者也假之者且然而况性之身之者乎乾之剛健誠且正也坎之險陷邪且詐也大川坎也彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也以乾之尊遇坎之險而能不陷不窮者剛健而已剛則其靜不可動健則其動不可禦靜不可動則能忍以需險之衰動不可禦則能決以濟險之窮我何陷何窮之有彼無剛健之才見險而不能忍者其能免於陷且窮乎雖然亦必德與位並而後可以吉須也位乎天位則有位矣正中則有德矣無位而須者無濟險之勢伯夷避紂是也無德而須者無濟險之資秦未亡而陳涉先亡是也以在天之位秉正中之德利涉大川往則有功文武須暇五年是也天位謂九五乘乾也正中兼二五而言也象曰雲上于天需君子以飲食宴樂升而未降則天下望雲而徯雨藴而未施則君子藏器以待時待時者夫何為哉飲食以自養宴樂以自怡而已此顔子簞瓢陋巷之日謝安遊宴東山之時也雖然飲食宴樂以須其時惟有德之君子而後能也不然含哺之氓皆顔酒荒之士皆謝矣初九需于郊利用恆無咎象曰需于郊不犯難行也利用恆無咎未失常也坎水為險初九去險遠矣故需于郊郊遠於水之地也宅於水而資舟備難者也宅于郊而馮河犯難者也無難而犯難以求利不若守常之為利無難而不安于守常若穆公伐鄭夫差伐齊其咎何如哉九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也渚自水出曰沙需于沙則去水之險漸近矣近水者未溺沙傾則溺近難者未隙言出則隙九二以陽居隂則寬綽而有衍以位居中則正大而不過寬而不過則小有言之隙可以窒而不開矣吳濞以太子之隙常出怨言矣文帝寬而不詰故終其世而亂不作所謂終吉也九三需于泥致寇至象曰需于泥災在外也自我致寇敬愼不敗也初需于郊止而不敢進二需于沙進而不敢逼三進而逼于水矣泥者逼于水者也雖逼于水未溺于水也何也坎之災猶在外也災在外而我逼之是水不溺人而人狎水者也狎水死者勿咎水致寇敗者勿咎寇自我致之故也雖然善備無寇善禦無敗既有寇矣敬愼以禦之猶不敗也不敗於寇不若不致夫寇不致夫寇不若不逼夫寇三居健之極進之勇能不逼乎不然在外之災安能寇我楚非宋寇也襄公與楚爭霸而敗于泓宋致寇而不敬愼也晉非楚寇也莊王與晉爭鄭而勝于邲楚敬愼而晉否臧也六四需于血出自穴象曰需于血順以聽也隂陽相勝亦相伺也乾之三陽所以需而未敢進者伺坎之衰也盜憎主人亦伺主人故六四亦需三陽之逼己也雖然三陽厄于險故同力以濟險四以一隂柔之資而當三剛健之敵傷于陽必矣血者傷也物傷必避避必順以聽命出自穴者傷于陽而避陽且聽命于陽也君子之于小人不可窮也三陽彚進一隂退避需之險于是濟矣為君子者勿窮小人可也王允既誅董卓而不宥傕汜光弼垂定河北而復圖思明皆不開小人順聽之門之禍也坎為血卦九五需于酒食貞吉象曰酒食貞吉以中正也陽彚而進隂引而退九五以陽剛居中得正而位乎天位險者夷難者解天下治平矣於此何為哉涵養休息與天下相安于無事而已不可移濟險之道為履平之道也萬物需雨澤人需飲食天下需涵養雲上于天物之需也需者飲食之道人之需也需于酒食貞吉天下之需也酒食者養天下之謂成康文景得之矣有險樂險則偷周平王晉元帝是也無險行險則擾秦始皇漢武帝是也上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也險至上而終需至上而極險終則變陽極則升乾之三陽欲進而坎為險以阻之至上六則終而變矣三陽雖為客其需我之變久矣我終能遏其來乎敬以納之而已主孤而客衆主雖有危之勢敬客以及主主亦有安之理入于穴者主安也桓溫作難于晉晚而病亟猶幸不殺王謝晉室安而桓氏亦安此其效也不當位隂居上則僭也僭而未大失者小人敬君子抑亦僭之救也與不然壅甚必決藴甚必裂如秦末之法吏漢季之閽寺衆所快也亦所憫也君子之于小人亦然坎下乾上訟有孚窒惕中吉終凶利見大人不利涉大川物有作之而止止之而作者民之遜與爭是也訟者爭之尤也故聖人止之不一而足誠心而無詐者必不訟窒隙而無仇者必不訟惕厲而懼刑戮者必不訟中和而不狠愎者必不訟如是則吉也非訟之吉也不然訟至于終極而不反其凶必矣利見大人見九五以決訟也不利涉大川犯大難而興訟也訟之吉者四凶者一利不利者亦各一曰吉曰利非勸訟也皆止訟也彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也訟常解于相平而合于不相下險者狡而工于爭健者強而力于爭二人相遭其肯相下而不訟乎以坎之險遇乾之健訟之所自起也剛來得中者九二自外而來興訟之主也中正者九五聽訟之主也大川坎也象曰天與水違行訟君子以作事謀始天道上行水性下注天左而西水右而東相違而行此訟之象也止訟在初聽訟亦在初故仲尼聽父子之訟不咎其訟者而咎上教之不行此民之訟也又有大者焉甘陵南北部之禍始於其徒之相非此士之訟也又有大者焉牛李朋黨之禍始於其進之相傾此臣之訟也又有大者焉吳越世讐之禍始於一矢之加遺此國之訟也又有大者焉漢武胸奴之禍始于平城之宿憤此天下之訟也不謀其始訟之禍何如哉曷謂始曰心故君子必自訟自訟者訟心也訟心者祥訟人者殃初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也初六九四訟之敵也然六之才弱而位下才弱者有慙忿而無遂心故雖訟而不永位下者敢於微訴而不敢于大詬故雖有言而小不永則易收小言則易釋所以終吉然六之隂靜非首訟者也九四以強躁而挑之初六不得已而應之兩訟有強弱弱者多勝強兩辭有應感感者多不勝應故初與四辨而初得其明也豈初之能必明哉非聽之者明則強者以後罷勝感者以先入勝矣要之不永所事初六不可不深戒也虞芮之訟一入周境自愧而解不永所事之效也九二不克訟歸而逋其邑人三百户無眚象曰不克訟歸逋竄也自下訟上患至掇也九二興訟之主然初六與九四為敵非與九二訟者也六三從上而不訟亦非與九二訟者也九五君也九二臣也臣無訟君之理亦非九二所敢訟者也所與訟者其唯九四上九乎然九四近君而剛上九居上而亦剛九二乃恃其剛以訟二剛以寡訟衆以下訟上其訟不勝宜也然能憣然而改退然而歸來其邑而逋焉庶幾無刑戮之眚也不然掇禍無敵矣子玉剛而無禮陽處父剛而犯怨所以不免與二柔也故能逋六三食舊德貞厲終吉或從王事無成象曰食舊德從上吉也訟之六爻唯五聽訟唯三不訟餘皆訟者也三介乎二剛之間能正固而不動能危懼而不爭從上而不居其成故能保其祿位而終吉也食舊德保其祿位也從王事從上九也鄭駟良之爭子産兩無所從齊欒陳之難晏嬰兩無所助所以安也九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也九四之訟初六以上訟下挾貴而訟以強訟弱挾力而訟初非四之敵也然舉二者之訟質之九五剛明中正之君何貴之私何力之撓哉故初六之辨遂明而九四之訟不勝訟不勝而吉何也能自反其身而就于義命能自改其過而安於貞固猶可以吉也非吉之大也僅不失於吉而已渝者變而改也不然如竇嬰之助灌夫趙廣漢之脅魏相公孫賀之捕朱安世欲以免人乃不免其身欲以免罪乃所以獲罪九五訟元吉象曰訟元吉以中正也以中正之君聽天下之訟中而不過則上無淵魚之察正而無私則下無梗陽之賂直者伸枉者愧尚何訟之有畫衣冠而不犯虛囹圄而不式可也此天下之大吉也元大也上九或錫之鞶帶終朝三禠之象曰以訟受服亦不足敬也上九訟而終凶者也儻或訟而勝勝而受賞猶不足敬而况衆皆禠而奪之乎而况未必勝且未必賞乎或之者未必之辭也故楊惲告霍氏息夫躬告東平初以此而侯卒以此而誅事也好還天道固然誠齋易傳卷二
