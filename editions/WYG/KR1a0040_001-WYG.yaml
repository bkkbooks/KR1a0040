body:
  text: 誠齋易傳卷一宋楊萬里撰乾下乾上乾雜卦曰乾健説卦曰乾剛又曰乾為天為君故君德體天天德主剛風霆烈日天之剛也剛明果斷君之剛也君惟剛則勇於進德力於行道明於見善决於改過主善必堅去邪必果建天下之大公以破天下之衆私聲色不能惑小人不能移隂柔不能奸矣故亡漢不以成哀而以孝元亡唐不以穆敬而以文宗皆不剛健之過也然强足拒諫强明自任豈剛也哉古之天地字也曷由知之由坎離知之偃之為立之為水火若雷風山澤之字亦然故漢書坤字作巛八字立而聲畫不可勝窮矣豈待鳥跡哉後世草書天字作𤣥即也乾元亨利貞此卦辭説者曰文王之辭至高曰天天之健曰乾天言其象乾言其性元亨利貞言其德象而後有性性而後有德德之名四其實一一者何元而已元出而亨物始而通也時春而夏日旦而晝人㓜而壯物萌而榮皆元亨之迹利入而貞物成則復也時秋而冬日昳而夕人强而耄物實而隕皆利貞之迹故周子曰元亨誠之通利貞誠之復復者何復其元而己元者貞之初貞者元之終元貞異名而同體亨者物之生利者物之成亨利異功而同用渾然而一之謂元熈然而散之謂亨充然而成之謂利肅然而收之謂貞肅然而收則渾然而一矣一斯散散斯成成斯復復斯入入斯出未有已也天地具此為天地聖人具此為聖人四德之名立而天地聖人之藴著矣彼異端者以空言性命為元其究窒於言之用以詭遇事功為利其究賊於貞之體是豈所謂元而利者哉儒者之求道求諸乾之四德初九潛龍勿用此爻辭説者曰周公之辭乾陽也其數曰九坤隂也其數曰六何也天地之生數也積天數之一三五不曰九乎積地數之二四不曰六乎乾以龍為象何也天地者其神不測者也將託至神之物以喻之舍龍何以哉初九乾爻之始而位之最下者也故為龍之濳既曰潛矣雖欲用之於何用之故曰勿用勿云者止之也干寶謂文王在羑里之爻非也羑里聖人之不幸也非潛也程子謂舜之側微是也或曰舜窮而在下未嘗欲自用孔子窮而在下未嘗欲勿用何也曰治則聖體其常亂則聖通其變舜孔子易地皆然九二見龍在田利見大人初九在下君德之隠故曰潛龍九二居中君德之章故曰見龍見龍在田物被其澤也利見大人者天下以見九二之大人為天下之利也程子謂舜之田漁時也九三君子終日乾乾夕惕若句厲无咎乾之六爻皆龍德也故曰六龍九三不言龍而曰君子何也言龍者明而神言君子者神而明皆君德也九三以君人之德處下位之上尊卑未定危莫大焉故曰厲厲危也然聖人戒以厲之未幾而許以无咎之可必何也於此有道終日乾乾然而無息至夕猶惕惕若而自懼勤於德而懼於位則危者安矣何咎之有程子謂此爻舜之𤣥德升聞時也乾乾者猶曰健健云耳雖然九三危而无咎信矣亦有危而有咎者乎曰有蚩尤后羿莽卓在上而驕其下在下而憂其不為上驕則有懈心何德之勤憂則有覦心何位之懼故終亦必亡而已矣或曰不有操懿乎曰漢一變而為魏葢三世希不失矣魏一變而為晉葢再世希不失矣使魏晉不足徴則乾乾夕惕之戒妄矣九四或躍在淵无咎九四之與九三位若同而異情若異而同九三居下之上而方尊九四居上之下而已偪故位若同而異九三之惕則懼於進九四之躍則向於進四之躍其情固異於三之惕也然聖人未敢輕許之也故曰或焉或之者疑之也疑之者未可以必進也可以躍則動未可以躍則静淵静也或躍者試其所養在淵者涵其自養宜動而動宜静而静斯无咎矣三之勤而懼文言以為君子進德脩業雖危无咎四雖无三之懼然亦能躍而疑文言亦以為君子進德脩業故无咎此其情所以若異而同也程子以為舜之歴試時也安定胡氏以此爻為太子之位其説尤切葢懦於躍則為漢之惠元僅為得之躁於躍則為商臣為元凶其咎大矣或曰晉之申生漢之榮彊非以躍而咎也何如曰易之戒義也三子之遭命也命不可逃而義不可越使三子越義以逃命命可逃乎命不可逃則孰若守義以聽命三子守義以聽命雖曰有咎吾必謂之无咎矣至㤗伯仲雍伯夷叔齊則躍與否无咎與否皆所不能囿也所謂賢者過之者與九五飛龍在天利見大人九天德也龍象也五天位也飛而在天之象也德而不位仲尼以之虚天下之望也位而不德癸辛以之失天下之望也德與位並二帝三王以之慰天下之望也故曰利見大人當其在田天下猶利見之而况今在天乎上九亢龍有悔五者位之極上者極之極故為亢居君位而又上焉將何之乎此益戒舜以罔淫于樂禹戒舜以無若丹朱之時也若志與位俱亢則有悔矣梁武帝唐明皇晚年是已用九見羣龍无首吉乾坤二卦獨有用九用六何也六十四卦剛柔之用於此發其凡也剛過則競故欲後而不先柔過則邪故欲正而能久彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧此彖辭所以釋卦辭也説者曰孔子之辭大哉乾元何大乎乾元也乾之大者以元而大也何謂元曰是不可言也其隂陽未形之初乎肇而一謂之元一而二謂之氣運而無息謂之道融而無偏謂之和天非和不立物非和不生莫之令而令其和者曰命莫之禀而禀其和者曰性孰為此者乾之元而已故萬物衆矣資取於此而後始天大矣總攝於此而後立性命妙矣保合於此而後利正其變也新故為無常其化也消息為無迹謂有物耶雲行雨施莫見所自來謂無物耶品物流形何為而有是象莫見其所自來者其物之始乎何為而有是象者其物之終乎始而終終而始始而復始終而復終始終變化而未已此隂陽不測之妙也曷為變曷為化是不可勝窮也嘗試觀之雲行乎炳而黄黯而蒼此雲行之變也倐而有忽而無此雲行之化也變者迹之遷化者神之逝天地造化皆若是而已大明於終始之道者非作易之聖人孰與於此是故體此道以居乾爻之六位則時行時止而聖德成執此道以乘乾之六龍則時飛時潛而天位正此其所以首出庶物而萬國咸寧者聖人之與乾元合而為一故也此乾元所以大彖言元言利貞而不言亨非不言亨也雲行雨施品物流形即亨也象曰天行健君子以自强不息此大象之辭釋卦名乾之一字之義也亦孔子之辭也天行健健即誠也所謂誠者天之道也君子以自强不息其不息亦誠也所謂誠之者人之道也自强非有使之者也曰强又曰不息强之至也天行健乾之德也自强不息君子以己為乾也運行不窮之謂健進修不息之謂强其義一也六十四卦或曰君子或曰先王或曰聖人或曰大人皆體易道而日用者健順者乾坤二字之詁也潛龍勿用陽在下也見龍在田德施普也終日乾乾反復道也或躍在淵進无咎也飛龍在天大人造也亢龍有悔盈不可久也用九天德不可爲首也此小象之辭釋六爻之辭與用九之義也亦孔子辭也德在此位在彼初九以陽德而在下君子以之潛而勿用是故潛德而非為我九二以陽德而出君子以之施而必周是故德普而非兼愛九三知有此而不知有彼是故反復於道而不敢離九四知有此而不知有彼是故旋觀无咎而後敢進至於九五不以得位為樂而志在大有為上九以處高為悔而戒其不可久葢乾之德不可為首故也知乾之德不可為首則惟六位所遭而處之焉往而不綽綽文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也文言者彖象辭之重者也亦孔子辭也惟乾坤二卦有之葢六十二卦舉矣元者萬善之大宗亨者百嘉之都會利者萬宜之和氣貞者庶事之楨幹此乾之四德君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞此君子體乾之四德也法之於天體之於身之謂體元者四德之長仁者五常之長體元無形體仁有體聖人欲其近而易行故變元而謂之仁初九曰潛龍勿用何謂也子曰龍德而隠者也不易乎世不成乎名遯世无悶不見是而无悶樂則行之憂則違之確乎其不可拔潛龍也子曰一章孔子釋爻辭之文也惟乾坤二卦為詳至於餘卦見於繫辭者如鳴鶴在隂之類所釋者諸卦十八爻而已然則謂繫辭非夫子之作其然乎初九惟其以龍德而隠也故以世從道不以道從世以實晦名不以實顯名内樂存故不有行於時必有行於己所謂遯世无悶樂則行之也外憂亡故不見知於人必見知於天所謂不見是而无悶憂則違之也其守不奪其堅不拔豈躁於用哉此潛龍之德也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹閑邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也有君人之德無君人之心此九二大人盛德之事龍雖見矣在田不在天德雖正中矣在下不在上有君德無君位也然則宜若之何庸信庸謹久而无息閑邪存誠實而无妄可謂有君人之德矣然德足以善一世方且有而若无德足以普萬物方且化而不居天下歸之己辭之曷嘗有君人之心乎故曰君德也君德云者有君德而安於臣位者也文王有君民之大德有事君之小心其九二之謂乎九三曰君子終日乾乾夕惕若厲无咎何謂也子曰君子進德脩業忠信所以進德也脩辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危无咎矣終日乾乾必有事焉无事而勤徒勤也勤於進脩德業則非徒勤矣雖然進脩必有地德業必有物忠信辭誠所以指其地實其物也然知德業所至而不至其至非造微之極知德業所終而不終其終非存義之固知至能至知終能終聖智之學就矣以此居上高而不㤗以此在下卑而不戚惟以得位為懼爾雖危何咎二之上故曰居上四之下故曰在下九四曰或躍在淵无咎何謂也子曰上下无常非爲邪也進退无恒非離羣也君子進德脩業欲及時也故无咎恒猶常也九四之位偪矣以上進為常則其志邪以下退為常則其德孤惟及其時以進脩而不干時以行險疑而无必則无咎矣或之者疑之也九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也同則合異則離物之情也故馬鳴而牛不應螽躍而蟻不隨濕為火仇燥為水憂雲虎相避風龍不相比鳶飛親上魚躍親下所謂各從其類也所謂各從者一物親一物而已至於聖人作而萬物咸覩无一物不親者何也聖人者三才之宗主萬物之天地所謂出乎其類者出乎其類故統乎萬類彖辭所謂首出庶物萬國咸寧者與夫子此言因釋此爻飛龍在天之辭而發雲從龍之義遂推而極之也萬物覩聖人即利見大人上九曰亢龍有悔何謂也子曰貴而无位高而无民賢人在下位而无輔是以動而有悔也六龍之首故曰貴高非君非臣故曰无位陽剛无隂故曰无民自四而下皆從九五故曰无輔如是而動其誰我與有悔必矣高貴鄉公以之潛龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也此一章再釋爻辭與用九辭也潛龍勿用曷為勿用以其潛於下也見龍在田曷為在田以其時可居於田也終日乾乾必有事焉非有事則為无益之勤或躍在淵所以自試非自試必有妄動之舉飛龍在天則雲行雨施而天下平聖人在上則德流化洽而天下治故曰上治物窮則災理數之常亢之所以有悔剛而能柔致治之道乾之所以用九也潛龍勿用陽氣潛藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天德亢龍有悔與時偕極乾元用九乃見天則此一章亦再釋爻辭與用九辭也時隠則隠故初九當退而安於潛藏之幽時顯則顯故九二當見而著其文明之治天之健終日而不息九三之進脩亦與之不息故曰與時偕行龍之在淵革潛而為躍九四之上進亦革卑而居尊故曰乾道乃革以龍德宅天位則德不儉於位以天位處龍德則位不儉於德故曰位乎天德天時之極者暑極不生暑而生寒君位之極者治極不生治而生亂故曰與時偕極天不為首天之則也君不為首君順帝之則也故曰乃見天則乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉元言始亨言通元亨者始而後有通利言情貞言性利貞者情必復於性雖然利豈能自利哉皆出於元而已故又曰乾始能以美利利天下然止言利而不言所利其利大而不容指一事也若曰利建侯利女貞利渉大川皆言所利者也大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也此一章亦釋彖辭所以贊乾之德而歸之道也乾不可得而贊極天下萬物而无外姑强名曰大而已故既曰大哉乾元又曰大哉乾乎何大乎乾也大其德與道也元亨利貞乾之德中正純粹精乾之道道析則五會則一正邪為正正正為中乾之道本于中而已純者體之一粹者純之美精者粹之微乾之道會于一而已堯舜禹相傳以惟精惟一乾之一也允執厥中乾之中也然則舉此道而一之于中天傳之羲羲傳之八聖者也曷謂純粹精請以金喻不雜者金之純不雜而良者金之粹良而百鍊者金之精精者不雜之至故夫正者道之純粹也精則未也中者道之精也蓋正猶有偏也楚燕南北之正也非中也洛師天地之中也夷惠吾道之正也非中也孔子吾道之中也正者中在其外中則正在其中道至于一而正正而中止矣雖然乾之道何以臻此其惟剛健无息以致之乎剛健者乾之性以剛出健以健行剛斯一於巾矣非天行健君子自强不息其孰能與此乾陽故剛健陽居二故正陽居五故中六爻純陽故純粹精此章與始而亨為一章君子以成德為行日可見之行也潛之爲言也隠而未見行而未成是以君子弗用也此一章亦再釋爻辭藴於身為德形於事為行龍德聖人之事非賢人事也初九雖潛而龍德具矣潛者位而已所性不存焉者也而横渠張子以顔子行而未成當此一爻恐顔子不敢當也程子謂未成者未著也以舜之側微當之得之矣君子學以聚之問以辨之寛以居之仁以行之易曰見龍在田利見大人君徳也學以取善故萬善集問以明善故一不善不入居以寛故處心大而裕行以仁故及物公而普學問德之府寛仁德之輿九二之大人君子府充而輿熟君德如此天下幸而見之其利何如哉九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危无咎矣三乘二陽而在其上故重剛下卦以二為中三則過之故不中非五故上不在天非二故下不在田九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故无咎四乘三陽而在五之下故重剛上卦之五為中四則不及焉故不中非三故中不在人夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况于人乎况于鬼神乎此贊九五之大人也天地造化之主日月造化之精四時造化之功鬼神造化之靈其體一其用三覆載无私之謂德照臨无私之謂明生息无私之謂序禍福无私之謂吉凶大德之人兼天地造化之體用而皆與之合則其德與天地合其大矣是故先天天合乎聖後天聖合乎天人謀鬼神皆聖之餘也堯舜天命未改而禪先天者也文之事商武之退師後天者也湯之伐不先不後而順天者也體乾之人有君子有大人有聖人君子聖賢之達名大人上下之達名聖人性天之達名名則三道則一亢之爲言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎上九亢矣病也亢而不知焉病之病也自古亂亡皆不知者也知之斯能處之故亢者不知喪亡之幾而不知退者也聖人唯能知之故能不失其正以處之乂何亢之有堯舜是也嗟乎聖人吾不得而見之矣若唐之睿宗其庶矣乎曰其唯聖人乎必申言之者所以深贊聖人之能知亢也猶孔子稱賢哉回也亦先後申言之坤下坤上坤元亨利句牝馬之貞坤之元亨利三德同乎乾貞則獨指一事曰牝馬之貞何也乾貞欲剛故天尊坤貞欲柔故地卑行止惟人之從馬之順也牝馬順之順也故牝馬地類安得同乾之貞哉王弼云利牝馬之貞非也君子有攸往往行也地之柔順君子體而行之先迷後得主利西南得朋東北喪朋安貞吉此以上皆卦辭乾之卦辭止言元亨利貞言其體自坤以下併與用言之坤地道也隂道也母妻臣道也皆欲以隂從陽不欲以隂從隂隂從隂則造化消隂從陽則造化息母妻臣自從則亂且危母從子妻從夫臣從君則治且安故隂盛陽微月壯日虧吕武專而漢唐傾懿裕强而魏晉亡此隂不從陽之災也故坤之隂處先則迷處後則得必以後為利之主也從其類則非吉離其類則吉必以安貞為吉之地也皆欲以隂從陽也西南隂之方東北陽之鄉彖曰至哉坤元萬物資生乃順承天坤厚載物德合无疆乾稱大哉坤稱至哉嚴尊卑之分隂不得僭陽也葢大則无疆至則有極乾之元物資以始坤之元物資以生始者氣之元生者形之元坤之生物豈自為之哉順以承乎天厚之載乎物此其德所以合乎乾之无疆含𢎞光大品物咸亨牝馬地類行地无疆柔順利貞君子攸行英華外發之謂光坤之用也博厚中充之謂大坤之體也坤道之光大如此而能含𢎞而不耀故能生物而不息物之所以亨先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地无疆此章程子盡矣象曰地勢坤君子以厚德載物地之力不厚則載萬物不勝其重君子之德不厚則載萬民不勝其衆勢力也初六履霜堅冰至象曰履霜堅冰隂始凝也馴致其道至堅冰也乾之初九陽始萌坤之初六隂始生陽始萌則曰潛龍勿用言方隠而未可以進也隂始生則曰履霜堅冰至言雖微而必至於盛也觀聖人之言可以知君子之難進而小人之易盛矣有國者其亦思所以求君子於隠而防小人於早也哉六二直方大不習无不利象曰六二之動直以方也不習无不利地道光也文言釋之至矣程子謂二為坤之主不以君道處五真得聖人之意也坤之六爻莫盛於六二而六五次焉六二具直方大之三德得於不習之自然焉往而不利哉柔則曲而六二獨直柔則刓而六二獨方此其所以大也何以柔而能直且方也中正故也不揉而直不矩而方不恢而大六二固不必習也雖然不必習而習不亦進進矣哉六三含章可貞或從王事无成有終象曰含章可貞以時發也或從王事知光大也為臣不任事求任事罪一也不任事則姦求任事則諂六三含其光明而不衒或從王事而母必此所以光大也或云者非不任事也非求任事也程子謂義所當為則以時而發若含而不為非盡忠也其論至矣无成謂不居有終謂必盡六四括囊无咎无譽象曰括囊无咎慎不害也四居危疑之地而慎黙括囊可也若可以言而不言假六四之義以自文則為張禹胡廣學者審之六五黄裳元吉象曰黄裳元吉文在中也五君位也而坤臣道也坤之六爻皆順承乾五之一君者也故坤之五不得為君位雖然六五不幸而居嫌疑之位其道宜何如黄中色也裳下服也守中而居下以安守人臣之分則元吉矣元吉吉之大也聖人許之以能居下則元吉不許其過此也六二六五得中均也然六二則大之六五則戒之何也二中而在下臣位正也五中而在上臣位疑也臣而疑於君疑而不已則僭僭不可啟也故戒之吾於乾坤見君臣之大分矣程子謂隂者婦道婦居尊位非常之變不可言也其發明聖人之意尤深遠矣剛柔雜為文六柔也五剛也文在中謂有文德而居中也上六龍戰于野其血𤣥黄象曰龍戰于野其道窮也隂極傷陽臣盛傷君六而居上隂極而臣盛矣故隂陽争君臣戰兩傷兩窮而後已趙高簒秦秦亡而高亦誅王莽簒漢漢微而莽亦敗為臣者其勿至於此為君者其勿使臣至於此也葢上六之龍戰已兆於初六之履霜小人之可畏如此哉龍戰者以坤馬之僭龍而戰夫乾之真龍也血傷也其血𤣥黄兩龍俱傷也用六利永貞象曰用六永貞以大終也隂之用能永守臣道之貞斯可以為大臣而令終矣或曰用九用六乾坤七爻妄也有位斯有爻位止於六而爻乃有七乎故易曰六爻發揮乂曰六位成章文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行柔者坤之道静者坤之體至於隂陽之回斡造化之運行豈專柔而静哉動則陽而剛静則隂而方先而不後者坤之異後而不先者坤之常物收而包含之量幽物散而造化之功著坤之道其大如此何也承天之施而不自生行天之時而不自用一本乎順而已然則臣道一於順乎曰有臣道有臣節臣道一於順故欲柔欲静不順則為莽卓臣節病於順故欲剛欲方順則為張禹胡廣坤何以動而剛曰發生必達積善之家必有餘慶積不善之家必有餘殃臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅冰至葢言順也福生於一小善禍起於一小不善萬者一之積大者小之積善可積也不善不可積也積斯漸漸斯極極斯作及其作而圖之其有及乎弑逆國家之大禍聖人不忍言臣子不忍聞也探其初亦止於萌一小不善之心而積之也傳曰有无君之心而後動於惡故一小不善之心在下者不可不察之於己在上者不可不察之於人察之早勿使之漸則國之禍不作矣辯察也故易坤之初六曰履霜堅冰至葢言馴也履霜之不戒堅冰之勿悔馴而致之也順當作馴直其正也方其義也君子敬以直内義以方外敬義立而德不孤直方大不習无不利則不疑其所行也六二爻辭止言直方而聖人又以正釋直以敬釋正以義釋方其曉學者至矣敬以直其内則養心主一而不分義以方其外則處物適宜而不隨敬體也義用也體用合而德不偏故敬義立而德不孤也立謂並立不孤謂不偏偏於内則執體而廢用偏於外則徇用而忘體隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道无成而代有終也為臣之道有大美而不能含藴者矜也有大美而不從王事者吝也從王事而自有其成功者驕也聖人於六三葢三致意焉弗敢云者有懼心焉功成而能懼可以為臣矣禹之不矜伐用公之不驕吝得六三之義天地變化草木蕃天地閉賢人隠易曰括囊无咎无譽葢言謹也乾之初九遠而潛宜也坤之六四近而隠非宜也不宜隠而隠者五之位君位也坤之六則臣也六五以臣而居君之位則僭也臣僭君則天下亂是天地閉塞之時也六四不幸而近之惟恐去之不速隠之不深耳此龔勝所以不仕於莽之朝蔡邕所以失節於卓之官也聖人嚴臣子之大分於六五則深戒之以居下之禮於六四則力勸之以潔身之節隠之於六五而發之於六四其防患深遠矣使六四至於潔身則六五何如哉君子黄中通理正位居體美在其中而暢于四支發于事業美之至也六五之君子唯剛柔雜而有文德故通理唯得中故正位唯位高而心愈下不失臣禮故居體體者禮也通理者通於君臣上下之定理也知定理之不可易故正位居體而不敢僭也臣道之美孰大於是具三者之大美藴於中斯形於外故暢於四支而美其身必无驕主之色發於事業而美其政必无專權之紊所以為美之至隂疑于陽必戰爲其嫌于无陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黄者天地之雜也天𤣥而地黄坤之隂至於極盛而疑其為陽坤之馬至於極盛而進稱為龍其僭乾也甚矣聖人别其嫌故發其有无陽之心暴其有僭龍之罪所以誅其意也然不曰馬與龍戰而曰龍戰者不没其僭也不没其僭所以深誅其僭也龍之類有血血之類有色故曰未離其類誠齋易傳卷一
