body:
  text: 誠齋易傳卷十九宋楊萬里撰説卦昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻和順於道徳而理於義窮理盡性以至於命此章言聖人之作易始因蓍以成卦終因卦以盡道也天下莫愚於有知之知而无知之知為至神蓍是也天下莫隠於有易之易而无易之易為至蓍數是也今夫蓍之未分其數五十人皆知之及其既分左手若干右手若干人不得而知也非惟人不得而知也吾亦不得而知也非惟吾不得而知也蓍亦不得而知也非惟蓍不得而知也鬼神亦不得而知也故曰幽贊於神明而生蓍贊之言助也非蓍之神也助神明之神而已今夫一三五天數也三積之而為九二四地數也兩積之而為六故曰參天兩地而倚數倚之言依也天地之道不在數也依於數而已然數寓於蓍而蓍非數故得數者忘蓍卦託於數而數非卦故得卦者忘數數既形矣卦斯設焉聖人因其變之或九或七而為陽因其變之或六或八而為隂變至十有八而卦成焉聖人无與也特觀其變而設之耳故曰觀變於隂陽而設卦卦既設矣文斯生焉聖人因其數之陽而發明其為爻之剛因其數之隂而發明其為爻之柔聖人无與也特發而明之揮而散之耳故曰發揮於剛柔而生爻卦之隂陽既設爻之剛柔既生自八卦而為六十四自六爻而為三百八十四伸之長之天下之是非失得萬事於是乎備天下之吉凶悔吝萬變於是乎出天地人之道皆聚於易之書矣所以和順道徳而理於義者在是所以窮理盡性至於命者亦在是大哉易之道乎其道之淵林乎學者求道而舍易是舍淵而求珠舍林而求玉也葢天之授人者曰命人之受天者曰性在物情之所具者曰理在人事之處物者曰義㑹義理而行之通者曰道體斯道而充乎已者曰徳命非通塞短永之謂也天以道徳義理之性而授之於人之謂也猶父之命子君之命臣也命令而付授之也然則理與義有辨乎曰理者物情各具其所本然之謂也義者人之處物各宜其所當然之謂也今有二器於此其一樽也其一簋也問樽奚事曰其器酒也問簋奚事曰其器飱也此物情之所本然者也斯之謂理今有人焉見其為器而不知其用或寘飱於樽焉或寘酒於簋焉是得為處物而宜其所當然者乎若易置之則宜其所當然矣斯之謂義然則理若何而可窮性若何而可盡命若何而可至理也性也命也為三乎為一乎曰理譬則路也性譬則足也命譬則家也人有自百里之外而歸其家者或十里而止或五十里而止或九十里而止是能至其家乎否也夫百里之近也而家不可至者何也非以其路有所未窮而足力有所未盡乎是故家无不可至路无不可窮而足有不能盡也性有不能盡而理无不可窮命无不可至也是窮理盡性以至於命之説也理於義謂治於義之理非窮理之理昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章此章言文王重易之㫖也伏羲之易畫而未重初為地二為人三為天當是時三才之道竒而未耦孤而无鄰也文王之易畫而既重初與二為地初剛也二柔也剛柔以質言三與四為人三義也四仁也仁義以性言五與上為天五陽也上隂也隂陽以氣言當是時三才之道耦而不竒鄰而不孤矣夫徳不孤必有鄰道亦然故敬義立而徳不孤隂陽立而天之道不孤剛柔立而地之道不孤仁義立而人之道不孤天下之理未有孤而能立者有日必有月有山必有澤有父必有母至於晝夜寒暑也前後左右也耳目手足也靡不然者故曰兼三才而兩之故易六畫而成卦然乾坤二卦畫雖六矣尚分隂分陽未成章也至於六子五十六卦隂陽錯居剛柔迭用然後六位成章焉章者剛柔雜而成文也周官畫繪之事曰赤與白謂之章故曰分隂分陽迭用柔剛故易六位而成章然則易之重卦何為也哉以順性命之理而已曷謂性命之理隂陽也柔剛也仁義也是性命之理也順之則聖則賢則君子則无咎則吉逆之則愚則鄙則小人則悔則凶故仲尼首言曰昔者聖人之作易也將以順性命之理天地定位山澤通氣雷風相薄水火不相射八卦相錯數徃者順知來者逆是故易逆數也此章言八卦剛柔錯綜然後得失吉凶可得而前知也所謂前知者易之道也非特占事知來之謂也占特易之一端而已易之道无它其於已徃之得失吉凶既旋觀而順數故其於方來之得失吉凶亦逆暏而前知見履霜而知堅冰之必至以已往之微知方來之著也見離明而知日昃之必凶以已徃之盛知方來之衰也且以徃知來未有不可逆知者膰肉不至孔子行醴酒不設穆生去晉勝郾陵士燮懼吳㑹黄池子胥憂而况易之道乎故曰易逆數也雷以動之風以散之雨以潤之日以晅之艮以止之兑以説之乾以君之坤以藏之此章言天地六子造化萬物之妙用也天地猶一人之身也雷風水火猶一身之血氣也雷者天地一身之謦欬也風者天地一身之嘘呵也雨者天地一身之膏液也日者天地一身之煖氣也今夫人之一身謦欬喑焉者死嘘呵絶焉者死膏液竭焉者死煖氣冰焉者死天地亦然夫惟謦欬足以鼔動萬物故潛者見隕者敷嘘呵足以揮散萬物故穉者挺鬱者舒膏液足以潤澤萬物故稿者滋瘠者腴煖氣足以晅熯萬物故幽者晰沍者蘓四者大和萬物並育秋而成焉物所以説兑者秋之正也冬而肅焉物所以止艮者冬之窮也造化至此嵗功成矣天何為哉主之而已君者主也地何為哉收之而已藏者收也帝出乎震齊乎㢲相見乎離致役乎坤説言乎兑戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎㢲㢲東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治盖取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兑正秋也萬物之所説也故曰説言乎兑戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮神也者妙萬物而為言者也此章前言帝出乎震之八者所以發八卦妙萬物之神也後言萬物出乎震之八者所以釋前言也夫物芸芸造端乎春故曰萬物出乎震震春卦也風之被物也飄忽汎掃何穢不蠲哉塵遇之而清焉暑遇之而冷焉華實遇之而馨焉潔齊萬物莫潔乎風故曰齊乎㢲天地非日孰與炳曜萬物非日孰與臨照日一出矣然後物與物相覿也不然宇宙之間其不㝠為大幽之室乎故曰相見乎離役物以養已者物也役已以養物者地也人皆知之稱乎母莫知其疲於乳哺故曰致役乎坤嵗云秋矣萬寶既成萬生既盈疇不説乎情故曰説言乎兑乾西北也乾陽而西北隂隂陽相逢不戰則攻其戰不力其生物不殖故曰戰乎乾水之為用也兼足萬物未嘗徳其徳不舍晝夜未嘗不力其力故曰勞乎坎艮東北也北者冬也物所終而止東者春也物復動而始動而復止止而復動物莫窮其用始而復終終而復始物莫知其際艮也者其造化循環无端之樞與然則造化之仁庸有既乎天地大徳曰生吾於艮見之矣孰為此者葢有妙萬物而不知其所以然者也孰妙萬物葢天地造化之至神亦不知其所以然者也神難言也而仲尼屢言之曰神无方又曰隂陽不測之謂神又曰惟神故不疾而速不行而至今又曰神也者妙萬物而為言非仲尼不能窮天下之至神非仲尼不能言天下之至神噫歛天地於八卦不見其有餘散八卦於天地不見其不足其天地之神乎其易之神乎動萬物者莫疾乎雷橈萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也此章言六子變化萬物之功而不言乾坤非不言乾坤也六子之功即乾坤之功也故舜以五人治文王以多士寧乾健也坤順也震動也㢲入也坎陷也離麗也艮止也兑説也此章述八卦之訓詁狀八卦之性情也乾為馬坤為牛震為龍㢲為雞坎為豕離為雉艮為狗兑為羊此章言八卦逺取諸物也乾為首坤為腹震為足㢲為股坎為耳離為目艮為手兑為口此章言八卦近取諸身也首言尊腹言容水内景有耳内聰之象火外景有目外明之象乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男㢲一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兑三索而得女故謂之少女此章言乾坤生六子也一索得男初爻得乾之一陽也一索得女初爻得坤之一隂也其餘次第推之乾為天為圜為君為父為玊為金為寒為氷為大赤為良馬為老馬為瘠馬為駁馬為木果坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黒震為雷為龍為𤣥黄為旉為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮㢲為木為風為長女為繩直為工為白為長為髙為進退為不果為􅆨其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦坎為水為溝瀆為隠伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曳其於輿也為多眚為通為月為盗其於木也為堅多心離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鱉為蟹為蠃為蚌為龜其於木也為科上稿艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節兑為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊此一章又統言八卦之作仰觀天文俯察地理近取諸身逺取諸物其道甚大百物不廢也然引物取類有不可一一强通者强通焉鑿且妄矣誠齋易傳卷十九
