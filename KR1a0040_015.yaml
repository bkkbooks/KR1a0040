body:
  text: 誠齋易傳卷十五宋楊萬里撰離下震上豐亨王假之勿憂宜日中彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而况於人乎况於鬼神乎豐者豐盈盛大之時也聖人於是時其喜乎其憂乎曰此庸君之所喜而聖人之所憂也豐亨王假之豐之亨孰致之吾王致之而至於此也有以致乎此必有以憂此吾王曷為而致乎此也明而畢照動而有為是以致之也致之矣曷為而憂乎此也吾王之明宜如日之方中方中者日之至盛也然吾王之勿憂止於日中之時而已何也豐則尚宜大也中則尚宜照也勿謂方中其中將昃勿謂宜照其照將夕蓋日中者昃所倚月盈者食所伏盈者虛之原息者消之根天地也日月也鬼神也四時也所不能遁况於人乎况於天下之治亂安危存亡乎晉武知憂必無身後之亂明皇知憂必無末年之變知憂者其惟堯舜之警戒禹湯之罪已三宗文王之無逸乎象曰雷電皆至豐君子以折獄致刑有電之明乃可折獄有雷之斷乃可致刑斷至而明不至則獄辭不能折而照明至而斷不至則威刑不能致而果故必雷電皆至而後可豈惟刑獄哉髙帝無離之電則躡足而怒不解無震之雷則刻印而銷不隨折獄致刑姑舉其一以見其萬且人命至重故也初九遇其配主雖旬無咎往有尚象曰雖旬無咎過旬災也禹稷當平世君子之幸也顔子當亂世君子之不幸也其有當豐盈明盛之世而伏中昃盈虛之機者其君子幸不幸之雜也與初九以剛明之賢當明盛之世遇九四同德相應之邇臣為己之所主已往而從之其功業成就必有卓然可尚者豈非初九之幸也哉然幸未久而災至者何也時雖明盛而六五柔暗之君也初九在下之逺臣與九四在上之邇臣安能以已之昭昭啓君之昏昏乎故四老能從子房以安惠帝而不能振惠帝之柔劉更生張猛周堪能從望之以傅元帝而不能開元帝之暗諸君子豈不遇明盛之世哉然明未久而昧生盛未久而衰至大則災于而國小則災于而身故漢再衰而望之死惟子房四老幸免者子房退而四老去也故曰雖旬無咎過旬災也旬者旬時言雖無咎而未久也過是則災及矣初與四皆陽也同德相配故曰配主曰主者四為逺臣之所為主初以邇臣為所主六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也至昏不可瑩至明不可掩故甓不可以為鏡盡不可以為夜可掩者非至明也其資根乎暗也世無不霧之晨而霧不能以晨為昏世無不雲之晝而雲不能以晝為夜蓋青天白日之清明非雲霧所能掩故也今日中至明至盛之時而見斗是能以晝為夜也意者無日而晝晦與意者非無日其有日而食之既與然則日中見斗非其明之可掩也以其日之至昏也豐者日中之時也蔀者有物以掩之也物掩日而見非掩之者之罪也故曰日月暈于外其賊在內六二為離之主而居中宅大臣之位而居正此明盛之至而中正之至也以此事君致之堯舜之上可也然往而事君動而見疑舉而見疾者何也有小人以掩吾君之明而蔽之也小人者誰乎上六是也上六何以掩君之明也六五柔暗之君也無上六猶暗也况加之以上六乎其陸贄事德宗之事德宗根於柔暗之資而力為強明之迹夫君道之所在強不在於折敵衝而莫強於折邪佞明不在於察淵魚而莫明於察姦欺德宗強不足以折盧杞而以刻薄為強明不足以察延齡而以猜忌為明故怒公輔疑蕭復仇陸贄皆日中見斗往得疑疾之類也雖然臣子之道不以君之明暗而二其心也一於至誠孚信以發吾志而已盡吾之誠心而君不疑不疾固吉也疑焉疾焉亦吉也故梁州之行求贄不得而帝泣贄不以為己悅忠州之貶終其身而不還贄不以為已凶九三豐其沛日中見沫折其右肱無咎象曰豐其沛不可大事也折其右肱終不可用也君子之道不用則已用矣而止以小事塞焉猶不用也何以答天下之望乎答天下之望者其必有濟天下之大事乎致君澤民舍此事無大者九三以剛明之德居下卦之上君子有德而得位者也是故下則欲豐其民之澤如陂池沛澤之洋溢上則欲增其君之明如日之方中皆大事也然欲為大事而不可為欲用其道而終不可用何也六五柔暗之君非吾一人所能扶持也所恃者同列之相應也而今也不幸與上六之小人為同列先之而後者誰與左之而右者誰與同列不應其有左臂而無右肱也一手不能舉鴻鼎一臂不能推大車天下大事而以一人為之惟見民益稿而不蘇君益昧而不明九三拱手太息而已又誰咎哉無咎言無所措手亦無所歸咎也沫即昧也三與上應故平無勃不濟玄齡無如晦不決九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也九四居近君之地處動卦之初有陽剛之德此亦君子之剛而有為者也其如上六之小人掩六五之暗主而不可以有為乎六二之大臣且不能發其蔽而啓其明也而况九四乎然猶幸其下有初九之賢來主於我而我為之主吾道其庶幾可行乎故吉曰夷主者同德相應而為等夷也如夷於九縣之夷曰位不當者以陽居隂也九四髙則顔讎由司城貞子次亦不失為魏無知常何六五來章有慶譽吉象曰六五之吉有慶也天下有不可為之事乎天下有不可為之事則賢不足尚矣夫以豐大之時而柔暗之六五為之主宜其傾厦非一木之支決河非捧土之障也而下有六二大臣之賢近有九四邇臣之賢外有九三羣臣之賢逺有初九小臣之賢六五能虛心謙德以招來衆賢之章知初九之剛明可尚身雖在逺而不忘君也我是以用之於先知六二之中正孚信雖疑疾而不改度也我是以用之於佐知九三之志於致君澤民而欲立大事也我是以用之於佐知九四之在左右前後能旁招初九以協恭於君也我是以用之以自近昔也天下以吾君為柔今則慶之譽之以為剛昔也天下以吾君為暗今則慶之譽之以為明何其吉也舍己之剛用人之剛即已之剛舍己之明用人之明即已之明也其小猶為齊威王而况不為威王者乎然則其致豐大明盛之治非幸也夫以羣賢輔一柔暗之君猶足以致豐大之慶譽况得剛明果斷聰明勇智之君而事之其所就豈小哉故曰天下有不可為之事則賢不足尚矣六柔暗五剛明故有慶譽吉六隂柔亦謙虛故能用人又六五隂爻而雷質雖柔而實剛君雷而佐電雖暗而亦明與它卦六五異矣上六豐其屋蔀其家窺其户閴其無人三嵗不覿凶象曰豐其屋天際翔也窺其户閴其無人自藏也自古小人掩其君之明者何也君明則必憂危亡憂危亡則已疏左右矣故必掩之以娛樂君明則必勤總攬勤總攬則已無權勢矣故必掩之以逸遊君明則必親君子親君子則已失恩寵矣故必掩之以姦諛此仇士良之所以傳心術之祕於其徒也故聖人發其心之至隱而曉以禍之必然曰汝之掩君之明不過欲豐乎已之屋而已不知豐其屋者適以掩其家而不光又不過欲髙其位而際天而已不知髙其位者適以空其門而自藏家之掩也門之空也自此三嵗而熠耀行於室麋鹿遊於臺矣豈復覿汝家之有人迹乎凶莫大焉凶又有大者飛廉之誅不足弔而弔成湯之不祀季述之戮不足痛而痛昭宗之罔終為人主者可不戒哉艮下離上旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也山內而火外內為主外為客山止而不動猶舍館也火動而不止猶行人也故艮下離上為旅旅非不亨而曰小亨何也旅者人之失其居而窮於外者也在下謂之喪人在上謂之蒙塵亨猶不亨也又曰旅貞吉者居家而不貞尚非吉之道况窮於外而不正則上交必諂而主人莫之敬下交必瀆而徒御莫之尊取而不正則褻留而不正則濡去而不正則逋故旅貞則吉孰為旅道之貞乎以為客則柔亦不過於柔必順乎剛乃為得其中仲尼不答靈公是也以所主而止則所止亦不妄止必麗乎明仲尼不主彌子是也此皆旅道之貞也曰柔得中謂六五曰得中乎外謂六五在外卦曰柔順乎剛謂六五順九四九三之二剛曰止而麗乎明謂山與火也柔而在外故為旅旅之時義大矣哉旅者人之窮何大乎時義也時在彼其繫在遇義在此其繫在守遇非我所能為也守我所能為也聖賢君子不幸而為旅盡其所能為聽其所不能為而已夷吾重耳俱寓於秦無異寓有異時仲尼陽虎俱去於魯有同去無同義象曰山上有火旅君子以明慎用刑而不留獄刑不明則寃故欲明過明則察故欲謹過謹則滯故欲不留艮止故謹火行故不留而明初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也初六以隂柔之資宅卑下之地此小人之棄逐而在旅者也上之不能如仲尼在陳而絃歌不衰下之不能如鍾儀在晉而樂不忘舊方且經營瑣細之鄙事以自封植此其所以致災也故慶封奔吳而致富君子知其及殃息夫躬寄丘亭而祝盜或者告其祝詛蓋小人無道義以養其志得志則驕溢失志則困窮故瑣瑣以取災也然在旅而為鄙事有志窮而為之者有志大而為之者故劉備種菜於魏志不在於菜蘇武牧羊於胸奴志不在於羊必有能辨之者六二旅即次懷其資得童僕貞象曰得童僕貞終無尤也六二公侯大臣之顯者喪而在旅者也然能柔順以下人中正以立已故所至有次舍安焉即之而不危所挾有資用退然懷之而不露所從有臣僕翕然得其心而不離雖曰為旅而無悔尤矣晉文公之奔也見秦伯則拜見野人亦拜不曰柔順以下人乎文而有禮好學而不二凡十九年守志彌篤不曰中正以立已乎廣而儉懷安而能遷不曰懷其資而不露乎其貞正如此故至楚楚饗之楚送之至齊秦齊秦妻之秦納而歸之可謂旅即次矣腹心則子犯子餘股肱則魏犨賈他紀綱則秦之三千人可謂得童僕矣豈惟在旅而無悔尤哉旅而歸而霸孰禦焉九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也九三亦公侯大臣之顯者喪而在旅者也為客依人而以剛處剛又在下卦之上有多上人之心宜其大則焚其次舍而無所歸小則喪其童僕而莫之助也魯昭公孫于齊齊不禮焉而饗以大夫之禮公遂如晉將如乾侯子家羈曰有求於人而即其安其造于境弗聽是剛而不能下人也使請逆於晉而晉又不答是焚其次也魯之歸馬者公執之魯自是不歸馬季孫將如乾侯見公而與之歸國而公不見自是不歸國是喪其童僕也雖貞猶危厲而况不貞乎近離故焚九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也九四在下卦之上上卦之初亦公侯大臣之在旅者也有剛明之才而能居柔以下人故旅于內地而有處非至如外地之次舍也得其資而猶能富貴人得其斧而猶能威罰人也然雖在內地而猶未得位雖得資斧而猶未快心其鄭厲公在櫟衛獻公在夷儀之時乎非二五未得位然已近乎五故旅于處六五射雉一矢亡終以譽命象曰終以譽命上逮也六五王者之蒙塵而在旅者也王者無外而何旅之有少康逃虞思之圃宣王匿召公之家是亦旅也所謂禍亂之作天所以開聖人其旅之六五乎六五為離一卦之主明之至也有坤六五之文德之盛也有文明之德居至尊之位而牧之以謙柔如射文明之羽而不再發言發無不中也此其所以下得乎人之譽上得乎天之命自旅寓而復歸其天下國家與矢其文德宣之文也明明天子宣之明也側身修行宣之謙柔也小雅美之則鴻鴈庭燎大雅美之則雲漢嵩髙至蒸民韓奕則又美之江漢常武則又美之民譽不盛矣乎天監有周保兹天子詠於詩上天佑之為生賢佐載於傳天命不隆矣乎其中興也孰禦焉故有德則少康宣王自旅人而為天子無德則太康厲王自天子而為旅人有天下者可不懼乎上逮謂德上達天也離為雉為戈兵故曰射雉曰一矢上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也上九亦王者之蒙塵終於旅而不歸其國者也位一卦之上居離體之極恃其髙亢而肆其剛強至於失髙位而為旅人自取之也既毁其家如鳥焚巢又辱其身如先笑後慟又失其大物如喪牛而甚易此晉末帝信景延廣之言挑契丹之敵至於覆宗祀遷虜庭而亡天下與凶孰大焉然則有天下者髙亢可恃剛強可肆乎堯之恭遜舜之溫恭湯之寬仁文王之徽柔武王之容德髙祖之豁達大度光武之柔理天下此帝王之盛德也初二三四皆言旅而不言旅人在旅而非旅人也有歸其居之義焉上九獨言旅人則在髙位之時已有終身旅人之理矣惟六五當旅之時而不言旅非不言也不忍言也故沒其辭於爻而列其爻於卦始乎旅而非旅終乎歸而為王也故六五獨不言旅所以有王者無外之大義也上九髙亢如鳥髙飛故象之以鳥又離之極故象之以焚牛大物也喪牛失天下之象終莫之聞髙亢自信不聞其過也或曰公卿大夫士民有旅固也王者亦有旅聖人慮患不亦甚乎曰王者有旅非甚也求為旅而不可得斯甚矣衛莊公示戎州人以璧而不受胡亥請為黔首而不許旅何可得與巽下巽上巽小亨利有攸往利見大人彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人巽亨而小何也析二卦而言則一隂雖為主以不能獨立而順二陽合一卦而言則初與四皆在下而順在上得位之二五蓋無往而不順是以利見大人而無阻惟其在下而不立是以雖亨而小也然巽之為卦為曲為靡為苟合為詭隨為導諛其於人也為妾婦非全德之卦也然則聖人焉用巽其惟用之於命令乎上順下而出命則罔咈乎民之心下順上而承命則罔違乎君之政故曰重巽以申命申而重之者一再而申之也剛巽乎中正謂二五柔皆順乎剛謂初與四皆以隂而順陽大人謂九五重巽謂二卦皆巽象曰隨風巽君子以申命行事一風先之上卦也君出命之象一風隨之下卦也臣民從命之象二風相重而不息申命行事之象鼓舞萬物萬民而莫之違風與命令之象初六進退利武人之貞象曰進退志疑也利武人之貞志治也天下之理可進則進而不為躁可退則退而不為怯初六隂柔在下而過於卑巽是小人也進退皆疑而莫之適從其不左右反覆而賣人之國者幾希其封倫裴矩之徒乎然則巽之初六無所可用乎其惟利武人之貞乎蓋隂柔一也弱者用之為邪強者用之為正卑巽一也怯者用之為諂勇者用之為謙故李訴之拜裴度正而非邪上下之大分也韓信之師廣武謙而非諂師資之大義也以謙恭柔遜之德而御其剛強武勇之氣此其貞而利與易窮則變變則通顧用之何如耳故巽之初六用之進退而其志疑用之武人將帥而其志治説卦巽為進退故疑又其究為躁卦故武九二巽在牀下用史巫紛若吉無咎象曰紛若之吉得中也巽德之順也善則為謙為恭為遜過則諂矣鞠恭不已將及俯僂俯僂不已將及牀下九二大臣之位也抑其陽剛之德而自處於隂柔此已卑巽矣不惟自處於隂柔而又處於卑下此又過於卑巽矣不曰巽在牀下乎大臣君之股肱國之棟幹民之表極也今若此豈所望於大臣乎其孔光張禹胡廣趙戒之徒乎然則巽之九二又無所可用乎其惟用之以祭祀則吉而無咎乎其大上下神祗其次山川社稷其親祖禰宗祧用祝史用巫覡奉牲以告奉盛以告順其時盡其禮紛然有事穰焉降福百拜而不為諂駿奔而不為卑何也事神不嫌於卑巽也然聖人猶戒之曰得中而不得過况事君而過於諂乎然則過於卑巽者用之為史巫則吉用之為大臣則凶用之於事神則無咎用之於事君則有咎矣學易者當以聖人所言逆其所不言下卦二陽覆上而橫牀之象也一隂承下而對峙牀足之象也九三頻巽吝象曰頻巽之吝志窮也九三以剛處剛非能巽其身以剛乘剛非能巽於人然雖出乎九二陽剛大臣之上亦能詘乎六四柔巽邇臣之下是有時而屢不巽有時而屢巽也其所謂人而無常不可作巫醫者耶故雖巽而吝且窮何也得之於六四而失之於九二也亷以不巽而辱藺藺乃以巽而辱廉九三其廉之徒乎九三頻巽猶復六三之頻復頻屢也六四悔亡田獲三品象曰田獲三品有功也六四以柔處柔以順重順居上卦之下上則順乎一陽之君居下卦之上下則順乎二陽之臣順上者上亦順之順下者下亦順之以一順而獲三順猶搜田而獲君庖賔客乾豆之三品也九五君庖之象也九二九三賓客乾豆之象也是爻也丙吉有焉以厲精之宣帝為之君而賢吉之不伐以嚴毅之魏相為之同列而善吉之寬厚獲三品而有功之驗也豈惟悔亡而已乎九五貞吉悔亡無不利無初有終先庚三日後庚三日吉象曰九五之吉位正中也九五以剛處剛宜其非巽也而為巽之君者以純剛之德宅至尊之位而能回其剛以巽乎中正是之謂貞惟貞故吉故悔亡故無不利一貞立而百順隨然猶無初有終者有始有卒其惟聖人自非聖人與其有初而鮮終寧無初而有終也所以無初者非守常乃應變也事有不得已而變更者民未孚上之意必未從上之令也聖人其敢求民之驟從乎事之未更先喻之以利害之詳事之既更復喻之以利害之久使民曉然知利害之實則欣然順上之令而樂從之矣是以有終故盤庚遷都先之以上篇之書後之以中篇下篇之書成王化商民先之以召誥洛誥後之以多士多方皆先庚後庚之義也甲者事之始庚者事之更甲於四時為春於五行為木蠱之下卦巽也巽為木故言甲庚於四時為秋於五行為金於五色為白巽之上下卦皆巽也巽為白故曰庚上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎句凶也九二在下而卑故為巽在牀下上九在上而髙亦為巽在牀下何也上九巽之極過於順者也在上而過於順何異於在下之卑而順然上九之巽與九二同而九二則吉無咎上九則凶何也九二中正之順上九姦邪之順也何以知上九姦邪之順也上九位極乎人臣身極乎崇髙愛其所有之富貴權勢而患失之心生故必極其巽順阿諛以保其所有不知順愈過而身愈危也故小則喪其資用大則喪其權勢雖正亦凶况不正乎李斯憂蒙恬之代其相則順趙髙廢立之邪謀懼失其爵祿而求容則順二世之欲而勸之以逸樂將以順易位而以位易宗故司馬遷論之曰持爵祿之重阿順苟合可謂洞見其肺肝矣斧謂權勢上窮謂髙極正乎謂不正兊下兊上兊亨利貞彖曰兊説也剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大句民勸矣哉兊奚而亨天人説也天人奚而説説利貞也聖人奚而利貞剛中以正已柔外以説民也惟民説故天説惟利民故民説惟不利己故能利民惟正已故能不利己湯之寬仁兆民自不殖貨利始不殖貨利自不邇聲色始革之彖曰湯武革命順乎天而應乎人今兊之彖亦云革言天人之説乎湯武兊言天人之所以説也天人俱説是惟無事有事而與民趍之則勞而忘勞是惟無難有難而與民犯之則死而忘死好逸惡勞好生惡死人之情也勞而忘勞死而忘死非人之情也非人之情而忘之者説而不自知其勞且死也曷為而説也知聖人勞我以逸我死我以生我也是以説而自勸也勸民與民自勸相去逺矣是以聖人大之曰説之大民勸矣哉勞而忘勞禹之治水是也死而忘死湯之東征西怨是也象曰麗澤兊君子以朋友講習天下之可説者莫小於聲色臭味而莫大於義理天下之求益者莫狹於晝思夜度而莫廣於朋友講習不觀兊之象乎兩澤相麗則水泉相益而不涸二友相講則義理相益而不窮而况九澤與衆友乎是以君子説之初九和兊吉象曰和兊之吉行未疑也當兊説之世天下人説於下君臣相説于上而聖人所甚不説也必有疏逺在下之士負特立不倚之剛獻可替否以相濟而不疑其庶幾不至於容説之朝乎所以吉也初九是也以陽居陽至剛也在下無附至疏也至疏則大利不能怵至剛則大戮不能懼斷而行之何疑之有故成帝燕安之餘非朱雲莫能斬佞臣神堯平定之初非孫伏伽不敢諫戲晏子曰和如和羮同如濟水兊以説為説和兊以不説為説九二孚兊吉悔亡象曰孚兊之吉信志也禮不妄説人君子難説故妄説人者小人也易説者尤小人也九二居大臣之位當兊説之世天下視其所説而赴焉者也惟九二以剛陽之德居中正之地見其誠正可説者説之其佞偽妄説人者絶之則天下誠正者至而佞偽者逺矣惟其孚誠者説之此其所以吉也吉矣又曰悔亡贊之之至也故周伯仁愛刁協之佞而仲智責之張九齡喜蕭誠之軟美而李泌讓之皆愧於兊之九二者也然仲尼猶戒之曰信志也謂彼之誠信亦必察其出於志蓋恐其色仁而行違也佞偽取説之小人其亦難防也哉六三來兊凶象曰來兊之凶位不當也聖人之誅盜輕於詛盜兊之六三不當是也夫兊之六三其隂柔邪佞挾此以來而求説於上鬻而不售已之吉亦國之吉鬻而售已之凶亦國之凶六三之凶于而身不足咎也説六三之柔佞而來之既來之又位之于下卦之上者可咎也位小人于上可謂位之而不當矣位之而不當一佞來萬佞集不凶于而國乎故亷來之得位凶于廉來亦凶于商恭顯之得位凶于恭顯亦凶于漢六三以説而來來而凶豈六三之罪哉九四商兊未寧介疾有喜象曰九四之喜有慶也兊説一也而所以説者二有事君容説者有以安社稷為説者九四近君之臣也故於兊説之時倣徨焉躊躇焉商確而謹擇焉其心安得而自寧也何也惟容説之小人有以妄説而病吾君之心也君心勤政彼病之以逸豫君心憂亂彼病之以燕樂君心裕民彼病之以聚斂君心靜治彼病之以威武六三之來兊即容説之小人也非九四之剛正介而隔之使不得近於九五其不為疾者鮮矣六三者君心之膏肓也九四者君心之針規也故九四者六三之所甚不喜也六三不喜則九四有喜矣非九四之私喜天下國象之大慶也故魏徵用而封倫沮李絳入而承璀去春秋傳曰介在東都介隔也九五孚于剝有厲象曰孚于剝位正當也小人得志疾也不得志亦疾也得志則中其疾以疾其君心不得志則移其疾以疾其君子是疾一移則隂剝陽邪剝正矣雖以九五之剛明中正難説於其上三陽之可否誠正介隔於其下然六三以兊説而來焉上六以兊説而引焉九五萬一輕信二隂而孚焉則剝之胎具矣安得不危厲而祗懼哉九五居此位也則必當此責也可不懼乎堯且憂歡兜畏孔壬况不如堯者乎上六引兊象曰上六引兊未光也賢人在上引其類小人亦然物各從其類也故上六兊説之小人必引六三來兊之小人然舉而無成發而不中者上有九五之剛明以剝為懼下有三陽之衆正以隔其來又以上六在一卦之外無位以昌其黨此小人之道所以不至於光亨而亂天下也歡兜薦共工而堯吁僉言薦鯀而堯咈皆引兊而未光者與六三下卦兊説之極上六上卦兊説之極位皆隂柔故上者引下者來坎下巽上渙亨王假有廟利涉大川利貞彖曰渙亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也濟大難者存乎才散大難者存乎德既濟既散而不居者存乎道渙散也其為卦坎下巽上坎水也險也難也下卦內也坎下者難在內也膏肓內痛非腠理之藥所能逹禍亂中起非都鄙之政所能排當是之時孰能濟此難而散之者其惟巽之君子蓋濟難者才也散難者非才也項羽能亡秦而不能散漢以為楚曹操能平羣雄而不能散吳蜀以為魏項挾勇操挾知皆才也非德也欲天下之難永散而不再合惟德足以服人心而後可巽之才木也其德風也水之淺能溺萬物然乘一木則悠然而濟水之怒能決九山然遇一風則欣然而散才以濟之德以散之天下之大難一朝渙然而不復聚渙之所以亨通也曰利涉大川乘木有功言王者之才足以濟大難也曰利貞又曰王乃在中言王者中正之德足以散大難也然天下之大難濟之易散之難散之易散之而不居難平吳亡晉平陳亡隋居之而驕也武王一戎而天下定難已濟矣散牛而不復用難已散矣武王方且祀於周廟大告武成曰此惟先王后稷之功此惟太王王季之功此惟文考文王之功至於在我則曰豫小子其承厥志而已退然無自功之色至此然後見才不足為武王道德不足為武王言非有道孰能謙巽而不居其功乎不居斯不驕不驕斯不敗故巽之才在木而不在木巽之德在風而不在風兼天地人之謙者其惟巽之有道與故曰既濟既散而不居者存乎道此渙亨所以首之以王假有廟然後及濟難散難利貞之辭與剛來而不窮謂九二柔得位乎外而上同謂六四象曰風行水上渙先王以享于帝立廟卦辭言王假有廟舉其略象曰享于帝舉其詳言不獨歸功於祖考又當歸功於天享於帝昊天有成命是也立廟清廟是也初六用拯馬壯吉象曰初六之吉順也初六逢險難之時屈卑下之位而挾拯難之志是黔婁言善賈叔山無趾言善舞也將焉拯是不然拯不在獨而在從不在從而在擇不在擇而在蚤初六今何從從聖明之君乎在下而莫我達也其次從吾君之大臣乎從之又不可泛也莫若擇其賢而有力者九二者大臣之剛正所謂賢而有力者與其賢如驥之德其壯如驥之力初六從之順乎其吉沛乎其拯也所從而不擇擇而非有力有力而非賢賢且有力而從之不蚤非所以攄拯難之志也擇所從而得九二得九二而從之於初吉何疑焉信從何平從無知諸將從鄧禹秦府之士從玄齡拯難之功何如哉六順也初蚤也九二乾爻乾為馬九二渙奔其機悔亡象曰渙奔其機得願也君子當平世為霧中之豹為淵中之龍如酣寢而不聞非楊也君子當亂世為決川之禹為救火之僑雖焚溺而不避非墨也吉凶與民同患當其可而已九二以剛中之才當險難之世就使無大臣之位逢九五剛明中正謙巽之君猶當奔奏而赴之與之濟難而況大臣之位乎得其志願何悔之有幡然而改尹奔湯以濟納溝之難也舍築而起説奔髙宗以濟大川之難也機者君所慿也不言君而言機不敢斥所尊也雖然有似之而非者石厚之奔州吁荀爽之奔董卓淫奔也非奔機也學者審諸六三渙其躬無悔象曰渙其躬志在外也險難之世非一端也有基難有作難有濟難有遭難有免難褒妲斯髙基難也勝廣元感作難也湯武伊周濟難也河橋白馬遭難也二老四皓免難也六三在坎之外體柔之德居無位之地柔則不競外則無險無位則無施雖不能濟難其散於難而免其身何悔焉志在一世之外萬物之表故也志在一世之外者舉世不能濁其潔志在萬物之表者一物不能傷其生故商山無斯髙白馬無園綺人之或出或處各言其志聖人所不能齊也不然仲尼以景公輕夷齊以曽點重由求乎六四渙其羣元吉渙有丘匪夷所思象曰渙其羣元吉光大也六三之渙其躬散一己之難也六三居險之外者也六四之渙其羣散天下之難也六四近君之大臣也六三而為六四僭矣六四而為六三偷矣何也六四逢險難之世居大臣之位當濟難之責不能散天下羣聚之難非偷而何然散其大者雖如山嶽而其小者尚如丘陵散猶不散也不忽其丘陵之小而懷匪夷之思必盡乎夷之而後已然後元吉而光大也慕容紹宗之不追侯景僕固懷恩不平河北皆有丘而不思夷之者也巽為髙故有丘九五渙汗其大號渙王居無咎象曰王居無咎正位也渙之六爻皆無凶悔吝者惟六三世外之君子無與於濟難其餘諸爻皆奔走而為九五之用九五以剛明中正之德謙抑卑巽之度為一卦之主用羣臣之賢將何以大慰天下之望盡散天下之難乎不有大號令大建立大更革未見其可蓋天下有大險難如一身有大疾病也除大疾病者非一汗則疾不解排大險難者非大號則難不散何謂大號發號施令必大焉先小者碎者雖多無補也商民所大病者其政貪散財發粟之令一出而四海服秦民所大病者其政酷約法三章之今一下而萬民悅大者舉矣何必多乎哉然除疾有二疾而不汗者死汗而復反者亦死散難有二無大號者民弗從有大號而復反者民亦弗從令之以薄斂而行之以重賦是反也令之以輕徭而行之以勞役是反也令之以省刑而行之以峻法是反也出令而民從之令反而民去之天下之難何時而散乎故又曰渙王居無咎居之為言執之以金石之堅行之以四時之信固守而不遷之謂也如是斯可以正位凝命而永無災咎矣故曰王居無咎正位也上九渙其血去逖出無咎象曰渙其血逺害也散大難者必去其源除大疾者必絶其根疽之為疾也能殺人而不善療疽者亦能殺人何也知療疽而不知消其根也血之毒而非氣之正者疽之根也愛其血而不聽其去者存疽根者也去其血而不與之盡者留疽根者也二者之禍其一醫之罪也其一豈醫之罪哉上九居渙之終能為九五之渙其血矣必去之盡而出之逺則天下之難其害日逺日亡矣不留者在上九聽與否不在上九也非九五剛明中正之君孰能一聽上九之所為哉可不懼乎孫武之誅隊長穰苴之斬莊賈上也楚子常之殺無極陳元禮之殺褒妲次矣誠齋易傳卷十五
