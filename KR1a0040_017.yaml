body:
  text: 誠齋易傳卷十七宋楊萬里撰繫辭上天尊地卑乾坤定矣卑髙以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣是故剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女乾知大始坤作成物乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣此章言作易之本始也蓋易有二有未畫之易有既畫之易未畫者易之理既畫者易之書曰天尊地卑曰卑髙以陳曰動靜有常曰方以類聚物以羣分曰在天成象在地成形此未畫之易也易之理也有聖人作仰觀俯察於是制此之畫寫彼之理羅彼之理歸此之畫而易之書生焉是故因彼之天地定吾二卦為乾坤因天地之卑髙列吾六位之貴賤因天地之動靜判吾九六之剛柔因天地之間萬物之聚散生吾八卦之吉凶因天地之示形象見吾六十四卦之變化畫卦之椎輪作易之濫觴於是乎書此既畫之易也易之書也天尊地卑乾坤定矣何謂也曰易之未作乾坤在天地易之既作天地在乾坤卑髙以陳貴賤位矣何謂也曰地之位卑臣道也子道也婦道也地既隤然示人以卑則二者臣位也安得不自卑而位於賤天之位髙君道也父道也夫道也天既隆然示人以髙則五者君位也安得不惟尊而位於貴夫惟上貴下賤既位焉而不可踰如天髙地下一定焉而不可易於是君臣父子之大分始立由上古以迄於今萬世共由其道而莫之能改也故乾坤者禮之祖而易之門也入室始於門入易始於乾坤人本乎祖道本乎禮老子曰失道德仁義而後禮者知之乎曰動靜有常剛柔斷矣何謂也曰天地之道陽動而剛隂靜而柔九陽也動也故斷然知其得天地之剛六隂也靜也故斷然知其得天地之柔天地本靜也靜極生動動極生靜一動一靜至誠無息兹謂有常方以類聚物以羣分吉凶生矣何謂也曰南方之人喜聞楚語北方之人喜聞燕語方以類聚也鵲之巢無烏之子馬之廄無狐之穴物以羣分也善惡之分聚亦然聚散異嚮好惡相攻由是吉凶生焉故泰之道君子聚而吉散而凶否之道小人聚而凶散而吉自八至六十四皆然也在天成象在地成形變化見矣何謂也曰有物可見無物可執之謂象有物可見有物可執之謂形日月在天象也山澤在地形也天垂日月之象故易之坎離可見天之變化地出山澤之形故易之艮兊可見地之變化變化者天地之至神也孰得而見之者形象著而變化不可隱矣大哉易乎大哉作易之聖人乎天地且不得隱而况人物萬事之變乎是故剛柔相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑乾道成男坤道成女何謂也曰此言天地斡流而成萬化之神乾坤錯綜而生六子之妙也以乾之剛而錯摩坤之柔以坤之柔而錯摩乾之剛一剛一柔相推相蕩鼓之以雷霆而為震莫之鼓而鼓也潤之以風雨而為巽坎莫之潤而潤也日月運行夫寒暑而為坎離莫之運而運也然得我之剛者為長男為中男為少男得我之柔者為長女為中女為少女成男成女莫之成而成也三才之天地人易之乾坤其神矣乎其妙矣乎乾知大始坤作成物乾以易知坤以簡能何謂也此贊乾坤之功雖至溥而無際乾坤之德實至要而不繁也始萬物者乾之所知也知其始莫知其成成萬物者坤之所為也為其成莫為其始此其功之漙而無際也然乾道不在多言一言而盡之曰易坤道不在多言一言而盡之曰簡乾因物之自然故易坤因乾之自然故簡易則有不知之知簡則有不能之能此乾坤之德至要而不繁也易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣何謂也曰此贊聖人之德始乎法天地終乎參天地也聖人法乾德之易故天下皆可以易知聖人法坤德之簡故天下皆可以易從易知則有親樂其中之無險也若德宗之猜忌人亦猜之何親之有易從則有功信其成而爭先也若苻堅之妄動人皆危之何功之有有親則天下附之而不可解故可久有功則天下成之而不知倦故可大聖人之德業於是為至而乾坤易簡之理吾自得之矣乾坤易簡之理得而聖人成位乎乾坤之兩間而與天地參矣夫聖人以易簡成而昧者以智巧敗易簡之理無它因天地萬物自然之理而順之耳因尊卑以定乾坤於是天地之理不在天地而在易因乾坤而得易簡於是天地之理不在易而在聖人大哉易乎大哉體易之聖人乎然不曰聖人之德業而曰賢人此之所謂賢如記所謂某賢於某之賢如孟子所謂賢於堯舜之賢如史所謂三王臣主俱賢之賢非賢者過之之賢聖人設卦觀象繫辭焉而明吉凶剛柔相推而生變化是故吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也是故君子所居而安者易之序也所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利此章言君子學易者必先會易之象辭以為用易之功效也象者何象也六爻之象也辭者何辭也爻辭與象辭也昔者聖人之設卦也有卦而後有象有象而後有辭畫有奇耦者象也曰潛龍勿用者爻辭也曰陽在下也者象辭也象泯則卦隱辭廢則象晦卦以象立象以辭明故曰聖人設卦觀象係辭焉而明吉凶謂觀其有是象而吉凶之理已具係之以是辭而吉凶之象始明也何也畫之竒者九也陽也剛也畫之耦者六也隂也柔也純陽無吉凶純隂無吉凶或以陽雜之隂或以隂雜之陽順則合逆則戰逆順相推合戰萬變而吉凶生焉陽非位無吉凶隂非位無吉凶或以陽居陽或以陽居隂或以隂居隂或以隂居陽當位則安不當位則危當否相推安危數化而吉凶生焉故既曰明吉凶又曰剛柔相推而生變化蓋謂某卦之吉凶生於某畫之變化某畫之變化生於隂陽之推移何謂象物有事有理故有象事也理也猶之形也象也猶之影也不知其形視其影不知其事與理視其象是故欲知事之得失也如何卦爻象之以吉凶事之憂虞也又如何卦爻象之以悔吝蓋吉凶者得失之影也悔吝者憂虞之影也欲知理之進退消長也如何卦爻象之以變化理之晝夜往來也又如何卦爻象之以剛柔蓋變化者進退之影也剛柔者晝夜之影也有失得則吉凶隨有憂虞則悔吝隨此事之形影也可得而象者也隂陽之進退至神而無迹曷為象之以變化晝夜之往來循環而無端曷為象之以剛柔乎獨不觀之剝復夬姤乎夬以五陽決一隂陽進極矣進極必退於是一變為姤而陽退焉剝以五隂剝一陽陽退窮矣退窮必進於是一變為復而陽進焉吾之變化一出而彼之進退無迹者有迹矣又不觀之坎離乎月往則日來日昱乎晝則卦為離人見其烜乎外而不知一隂之精已娠於其中蓋至剛之中㴠至柔也日往則月來月昱乎夜其卦為坎人見其清乎外而不知一陽之精已娠乎其中蓋至柔之中涵至剛也吾之剛柔一陳而彼之晝夜無端者有端矣進退無迹而有迹晝夜無端而有端曷為不可得而象乎是故六爻之象一動而天地人之道畢陳於易矣故曰六爻之動三極之道也君子學易者因辭求象象不能外乎辭因象求道道不能外乎象然學易必有序有致知之學有力行之學其先後之序不可紊也故曰是故君子所居而安者易之序也由其序則自得之而居之安矣居則宅乎易而無外安則悅諸心而非強何謂致知居而靜則觀易之象玩爻之辭以自樂玩其辭者愈味之而愈無窮樂而玩其辭愈樂之而愈有得此致知之學也何謂力行出而動則觀象之變玩爻之占而後動如乾之初九居下卦之下其象以潛為主也至九二則變而見矣故其占曰德施普也宜見而潛則為楊如坤之六三居下卦之上其象以發為主也至六四則變而默矣故其占曰謹不害也宜默而發則為墨吾不自動動必以時吾不自為時時必以易此力行之學也其知以易其行以易有所不動動罔不吉矣非吾動也以易動也非易動也以天動也故曰所樂而玩者爻之辭也是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利前言君子所居而安如居仁由義之居後言君子居則觀其象如出入起居之居三極者三才也極中也至也彖者言乎象者也爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭憂悔吝者存乎介震無咎者存乎悔是故卦有小大辭有險易辭也者各指其所之此章言易有卦有爻是故有卦辭有彖辭有爻辭有象辭也若元亨利貞者卦辭也若大哉乾元者彖辭也若天行健者大象之辭也若潛龍勿用者爻辭也若陽在下也者小象之辭也卦辭所以釋一卦之義彖辭所以釋卦辭之義大象之辭所以總釋卦象之義爻辭所以釋一爻之義小象之辭所以釋爻辭之義彖者言乎象何謂也乾之彖辭曰時乘六龍以御天也夫卦辭止言元亨利貞而已未嘗言龍也今彖辭以龍而象君故曰彖者言乎象者也爻者言乎變何謂也巽以一隂而變乾震以一陽而變坤此以一爻而變一卦乾初九之潛至九二則變而為見此以一位而變一爻它可類推也故曰爻者言乎變者也吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也何謂也易之道不逺人也自人而天自身而人不外乎言動之善否而已言動之間盡善之謂得盡不善之謂失小不善之謂疵不明乎善而誤入乎不善之謂過盡善則無禍吉孰禦焉盡不善則自禍凶孰逭焉故曰吉凶者言乎其失得也卦彖爻象之辭言吉凶者皆此類也覺其小不善非不欲改而已無及於是乎有悔不覺其小不善猶及於改而不能改或不肯改於是乎有吝與其吝也寧悔蓋悔者遷善之權輿也吝者長惡之膏肓也然聖人猶許其改也謂之小疵恕之之辭也故曰悔吝者言乎其小疵也卦彖爻象之辭言悔吝者皆此類也吾身之過猶吾衣之破也衣有破補之斯全身有過補之斯還還者何復之於善也補不善以復之於善何咎之有故曰無咎善補過也卦彖爻象之辭言無咎者皆聖人善其補過之辭也言吉凶不若悔吝之輕言悔吝不若無咎之平言無咎不若言吉之福此應之者有輕重之辨也言失不若言疵之淺言疵不若言過之微言補不若言得之善此感之者有淺深之殊也失者疵過之積也凶者悔吝之積也得者補過之積也吉者無咎之積也今也盡善至於得而吉盡不善至於失而凶此豈一念之致一日之積哉此君子所以謹其獨也謹其獨者非它察天理之本善者而存之察人欲之不善者而去之而已列貴賤者存乎位言六爻之位上者貴下者賤也此又申言上文所謂爻者言乎變也齊小大者存乎卦言隂陽之爻陽者大隂者小也此又申言上文所謂彖者言乎象也辨吉凶者存乎辭即卦彖爻象之辭某卦吉凶某爻吉凶也此又申言上文所謂吉凶者言乎失得憂悔吝者存乎介即卦彖爻象之辭某卦悔吝某爻悔吝也言憂之在乎察于纎介之幾微也此又申言上文所謂悔吝者言乎其小疵也震無咎者存乎悔即卦彖爻象之辭某卦無咎某爻無咎也言震懼悔愧則無咎也此又申言上文所謂無咎者善補過也一言之不足必再言之聖人之誨人使之避不善以趨乎善避凶以嚮乎吉也詳矣猶恐其未諭也又終之曰是故卦有小大辭有險易辭也者各指其所之讀謙復之辭者如行夷塗如逢陽春如對堯舜周孔何其氣象之和樂也其辭夷易而指人以所之之得且吉也讀遁剝之辭者如涉風濤如履霜雷如對桀紂盜跖何其氣象之凛栗也其辭艱險而指人以所之之失且凶也嗚呼易其至矣易與天地準故能彌綸天地之道仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之説精氣為物遊魂為變是故知鬼神之情狀與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體一隂一陽之謂道繼之者善也成之者性也仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣此章言聖人作易之道本乎天地而天地之道本乎隂陽聖人用易之道顯乎天地人物之間而藏乎一性之內也易與天地凖故能彌綸天地之道何謂也曰易之未作也法天地之道以為易之道故曰凖凖之言決也如太玄凖易之凖也易之既作也還以易之道而理天地之道故曰綸綸之言經理也如君子以經綸之綸也彌之言滿也經理之而該遍也惟其凖則乎天地故能遍經乎天地非以易而理天地也以天地理天地也仰以觀於天文俯以察於地理是故知幽明之故何謂也曰此聖人觀天地隂陽顯晦之理而得天地幽明之事也原始反終故知死生之説何謂也曰此聖人觀天地隂陽消息之理而得人物生死之解也精氣為物遊魂為變是故知鬼神之情狀何謂也曰此聖人觀天地隂陽聚散之理而得鬼神造化之用也何也天文顯矣所以運是文者則不可知地理顯矣所以具是理者則不可測謂其幽也文可觀理可察也謂其明也孰運乎是孰具乎是也然則聖人何以知幽明之故也以隂陽之顯晦而知之也陽靜而晦則明者幽隂動而顯則幽者明故曰聖人之觀天地隂陽顯晦之理而得天地幽明之事也生好物也孰知其所以生死惡物也孰知其所以死然則聖人何以知死生之説也以隂陽之消息而知之也氣始而息息者生之徒氣終而消消者死之徒物有有始而不反其終者乎原其初知其反不足怪也春必反秋晝必反夜旅必反家生必反死死者物之復也故曰聖人觀天地隂陽消息之理而得人物生死之解也至于鬼神也者無聲無臭何為而有狀狀且無也何為而有情聖人又何以知其情狀也以隂陽之聚散而知之也隂陽至精之氣聚而有形之謂物散而無形之謂魂傳曰心之精爽魂魄記曰魂氣歸於天物者具是形者也魂者使是形者也魂止則物存魂遊則物亡遊者止之變也亡者存之變也觀其聚散則鬼神之情狀可知矣然則鬼神之狀何如也記曰鬼神之為德其盛矣乎視之而不見聽之而不聞體物而不可遺洋洋乎如在其上如在其左右孔子曰祭神如神在此其狀也鬼神之情何如也易曰與鬼神合其吉凶又曰鬼神害盈而福謙此其情也故曰聖人觀天地隂陽聚散之理而得鬼神造化之用也夫惟聖人觀於天文察於地理原始而反其終見物而知其變知其如是而為幽明之故如是而為死生之説如是而為鬼神之情狀舉是道而書之於易則易之道即天地之道也故曰聖人作易之道本乎天地夫惟聖人作易之道即天地之道則易與天地相似而不違乎天地矣由是舉而措之天地之間孰能出乎易之外哉是故萬物衆矣易之知可以周而遍之也天下廣矣易之道可以濟而利之也用易於一身可以樂天知命而不憂用易於衆民可以安土敦仁而能愛用易於天地可以範模運量天地之化用易於萬物可以致曲成就萬物之生用易於幽明可以通達隂陽晝夜之運皆不得遁吾易之道矣然知足以周萬物過之則為鑿道足以濟天下過之則為兼愛惟易之道則不過旁達博及之道流焉則為失其本惟易之道則不流明天理者樂於內知天命者輕其外內樂而外輕此顔子所以樂而不憂者用易於一身之功也民情安土我則因其安而無拂民情欲生我則厚其生而不薄安民而厚生此孔子所以答問仁以愛人者用易於衆民之旨也妙莫妙乎天地之化聖人能範之模之而運其化大莫大乎天地之化聖人能圍之量之而測其化然範圍而過焉必入于玄虛惟聖人則不過何也用易而已至不一者萬物之生至不齊者萬物之情將欲成物必先致曲不能致曲安能不遺惟聖人則不遺何也用易而已至於天地之運日往月來而為夜月往日來而為晝孰能測其所以然哉聖人乃能通而知之者蓋往者屈也來者信也晝夜者一日之屈信也寒暑者一嵗之屈信也死生者一世之屈信也古今者萬世之屈信也聖人何以通而知之用易而已夫衆而萬物廣而天下近而一身逺而衆民大而天地運而晝夜惟易之為用隨用而為應此易之神所以無方而易之用所以無體也無方則不可指無體則不可執故曰聖人用易之道顯乎天地人物之間然易之道何道也天地而已矣天地之道何道也一隂一陽而已矣隂陽未分謂之太極太極既分謂之隂陽其為天地之道一也舍隂陽以求太極者無太極舍太極以求天地者無天地天地可一息而無隂陽乎隂陽可一息而不動靜乎故曰天地之道本乎隂陽夫隂陽之為道安在哉在乎生物而已生物者善也所以生物者道也故繼道謂之善然善在天下有其善者在人之性故道者善之父性者道之宅然有之而能成之者聖人也自非聖人有有之而得其一二者仁者見之謂之仁知者見之謂之知是也有有之而不自覺者百姓日用而不知是也此君子之道所以知之者鮮也故曰用易之道藏乎一性之內然則孟子言性善有自來矣荀之惡楊之混奚白哉噫大哉易乎至哉易乎顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉富有之謂大業日新之謂盛德生生之謂易成象之謂乾效法之謂坤極數知來之謂占通變之謂事隂陽不測之謂神此章重贊天地隂陽德業之妙聖人作易德業之由也發育萬物之謂仁造化無迹之謂用仁可見也故顯用不可見也故藏此天地隂陽之德業也民可使由之之謂仁不可使知之之謂用由之故顯不知故藏此聖人作易之德業也然聖人之與天地有可同者有不可同者可同者顯仁藏用之德業也不可同者天地無心聖人有心也有心故憂一物之不蒙其仁無心故聽萬物之自生自遂聖人仁萬物而獨任其憂天地鼓動萬物而不與聖人同其憂聖人有憂而天地無憂矣何天地之無憂也有聖人以當其憂也至於德業之盛大則天地聖人一而已矣其業之富有則溥博而無外何其大也其德之日新則悠久而方增何其盛也萬物盈天地不曰天地之富有乎萬物備於我不曰聖人之富有乎已往者故方來者新不曰天地之日新乎今進乎昨後進乎前不曰聖人之日新乎天地也聖人也何以能然也易而已矣易者何物也生生無息之理也是理也具於天地散於萬物聚於聖人形於八卦合而言之命之曰易别而言之自無象而之有象則謂之乾法乎乾而效學之則謂之坤合天地之數五十有五窮其極以知方來則謂之占通乎易之理以應乎物之變則謂之事乾也坤也占也事也此易之隂陽可得而知也至於隂陽之妙不可測而知者其易之神乎非易書之神也易道之神也非易道之神也天地之神也夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉廣大配天地變通配四時隂陽之義配日月易簡之善配至德此章聖人所以贊易之道其極至于廣大之二言其原生於乾坤之二卦也以易道為近乎其逺無外莫之限而禦也以易道為逺乎其近無內止於靜而正也逺則莫之禦易道廣大之用也近則正而靜易道廣大之體也靜者正之舍也正者靜之主也以止處靜以靜出動是惟無動動罔不正矣自邇而逺天地之間人物之理天下國家之事要皆備乎此矣孰能限而禦之此易之道所以廣大也大則盛大而無倫廣則廣博而無量則其為無窮無極一也然易道之所以如是之廣大者其原安出哉出於乾坤二卦而已乾何物也陽之異名也坤何物也隂之異名也一隂一陽之謂道一乾一坤之謂易一生兩兩生四四生八八生六十四非奇則偶皆乾坤也一奇一耦一貴一賤一分一合一順一逆而天地人物君臣父子仁義禮樂由是生焉故曰夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉此易道之廣大所以生於乾坤也乾坤之廣大其原又安出哉生於靜而正而已其靜也專乾靜而正也其靜也翕坤靜而正也惟其靜而正是以動而罔不正其動也直乾動而正也其動也闢坤動而正也然則乾何為靜專而動直也專言一直言達也曷為一而達也不見夫炊乎水火之氣一而蒸焉則氣達而物熟分則否乾之為陽也亦然故曰行衢路者不至家坤曷為靜翕而動闢也翕言斂闢言散也曷為斂而散也不見夫橐籥乎閉之彌盈則縱之彌怒不閉則弛然耳坤之為隂也亦然故曰冬閉之不固則春生之不茂然則乾言大坤言廣何也孔子曰唯天為大孟子曰廣土衆民乾天道也故以大言坤地道也故以廣言夫惟易道之廣大生於乾坤故乾坤之廣大配乎天地然則四時之變通日月之隂陽天地至德之易簡皆天地廣大之用者耳易與之配合皆乾坤之餘也故易之道一言蔽之曰靜而正子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門此章聖人所以贊易書之極其至也非贊易書之極其至也贊易道之極其至也前章言廣言大此章言至皆無以加之謂也易之道何道也天理而已本然之謂理當然之謂義因其本然而行其當然之謂道天地人物均具此道之謂性聖人得此道者也體之以成身之謂德用之以成事之謂業盡天地人物之性得天地人物之道以此成其德業德安得不崇業安得不廣乎何也聖人之德業非聖人之德業也天地之德業也非天地之德業也易之道也天地非其易之道不得為天地聖人非得易之道不得為聖人故道也者天地聖人席上之珍也天地聖人不能為夫珍而能有夫珍焉耳雖然藏珍在室入室在門聖人之得此珍也獨能不由夫門而求之哉然則孰為此道之門一曰知二曰禮由知則崇由禮則卑崇則效乎天矣惟天為崇故也卑則法乎地矣惟地為卑故也且天固崇矣知何足以擬其崇地固卑矣禮何足以擬其卑蓋明此道之謂知履此道之謂禮知之至者極髙明不曰崇效天乎履之至者極卑遜不曰卑法地乎崇也卑也非聖人也自天地設位卑髙以陳而易之此道已行乎兩間矣聖人之知與禮因之而已何也吾之性與天地之性均具此道而固存者也固存者性之生存其固存者性之成生者天也成者人也惟能盡乎人以成乎天斯能由知與禮以入乎道義惟能由知與禮以入乎道義斯能得乎道義以成其德業故知也禮也入道義之門而成性而成德業之物也觀天地之崇卑而易之道在天地觀聖人之德業而易之道在聖人易之道在天地則易之書不可無易之道在聖人則易之書無之可也有之亦可也然則易之道何道也天理而已是理也在天地為隂陽在日月為晝夜在四時為生育長養在鬼神為吉凶在人為君臣父子仁義禮樂此易之道也異端之所謂道非易之所謂道聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻言天下之至賾而不可惡也言天下之至動而不可亂也擬之而後言議之而後動擬議以成其變化此章所以贊作易之聖人立卦象繫爻辭之妙也象者何也所以形天下無形之理也爻者何也所以窮天下無窮之事也何謂形天下無形之理今夫天之髙地之厚日月之明雨露之潤人皆可得而見也未離夫物之有形故也至於其所以髙所以厚所以明所以潤人不可得而見也其理無形故也人不可得而見則誰見之見之者聖人也聖人見天下有至幽至賾之理將與天下形其所無形使天下見吾之所見獨何説也是必取衆人之所同識以喻吾之所獨識不識仲尼使見有若不識伯喈使見虎賁蓋擬彼之形容以象此之物宜也是故乾道無形聖人獨見乾之賾於是取龍以象乎乾言健而神也坤道無形聖人獨見坤之賾於是取馬以象乎坤言順而載也故曰象者所以形天下無形之理何謂窮天下無窮之事今夫卦有六爻爻有一事六十四卦其事至無窮也爻之動故也至於如是而吉如是而凶其變亦無窮也爻之動故也爻之動無窮則誰得而見之見之者聖人也聖人見天下萬事之變有無窮之動將有以處其事之得失而逆斷其報之吉凶獨何説也是必得一卦會通之至要行典法禮制之當然事之得者繫之以吉辭事之失者繫之以凶辭如表取影如聲召響蓋典禮之得失即事變之吉凶也是故乾君道也其會要在上不得其法制則為亢龍之窮坤臣道也其會要在初不得其法制則為堅氷之漸故曰爻者所以窮天下無窮之事夫理無形而有形者吾易有象也事無窮而有窮者吾爻有辭也然固有言天下之至賾而可惡者矣異端之虛玄寂滅是也易則不然龍血玄黃雨於何地日中見斗災於何世載鬼一車證於何人然衆不以為誣君子不以為怪何也其象也非實也固有言天下之至動而可亂者矣諸子之堅白同異是也易則不然一卦五隂隂不少矣一陽令之而必從一卦五陽陽至雜矣一隂主之而必聽何也有要也非蕩也聖人何以能言天下之至賾而不可惡言天下之至動而不可亂也蓋未言至賾先翦可惡之賊未言至動先彌可亂之訟擬至賾而後言至賾議至動而後言至動也皆在一比擬反覆論議而後發也唯其謹審而不輕如此豈惟不可惡不可亂哉用之而成變化變汙而隆化慝而淑猶運之掌鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見諸逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎自此以下皆仲尼舉七卦之爻辭以明聖人立卦象彖爻辭之旨以見六十四卦爻象之凡也鶴鳴子和此中孚九二之爻辭也仲尼釋之以謂在隂者鳴鶴隱微之地也居室者君子隱微之地也在上之君子以吾居室之至隱而忽之乎胡不觀鶴之在深林隂翳之間乎不鳴則隂鳴則無隂不鳴則不應鳴則無不應是故一身之榮辱生於天下之從違天下之從違生於一言之淑慝一言之淑慝生於一念之敬否一念之敬否生於一室之隱微以一室之隱微而忽心生焉至于一言之不善明則千里之逺違之幽則天地之大動焉災危生而憂辱集是榮辱不在天地之間而在千里之外不在千里之外而在一室之內也大哉在隂之戒乎昭哉居室之釋乎仲尼釋之其昭如此然猶恐其不切也又合之以言行行尤大於言者也又喻之以樞機機尤速於樞者也又斷之曰樞機之發榮辱之主也發之者誰與主之者又誰與在上之君子試思焉同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭此同人九五之爻辭也仲尼釋之以謂君子之道於其心不於其迹心同迹異君子不以迹間心心異迹同君子不以心混迹故同人之先悲後喜與君子之甲出乙處此默彼語皆所不計也出處同道則禹顯顔晦同一情語默同道則史直蘧卷同一意心同故也金石至堅也然不堅於人心故二人一心則石可裂金可折所謂同舟而濟胡越何患乎異心也故曰二人同心其利斷金薰蕕同器一童子能辨之臭味不同故也取南山之蘭雜之北山之蘭十黃帝不能分臭味同故也所謂魯君之聲似宋君之聲也故曰同心之言其臭如蘭初六藉用白茅無咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣此大過初六之爻辭也仲尼釋之以謂不慎謂之苟不苟謂之慎天下之事將由夫苟者為之乎舉是物錯諸地斯以為可矣然坐身於地非席則寒履足於地非履則傷無以藉之故也錯物於地無以藉之可乎將由夫慎者為之乎薄莫薄乎茅也然重莫重於藉也有茅以藉是物則茅雖薄而用則重矣故非幣不姻非贄不見非百拜不行酒皆有以藉之也慎之至而無失無咎也秦欲盡去先王之白茅而行一切之政苟則可矣如咎何勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也此謙九三之爻辭也仲尼釋之以謂人之謙與矜繫其德之厚與薄德厚者無盈色德薄者無卑詞如鐘磬焉愈厚者聲愈緩薄者反是故有勞有功而不伐不德惟至厚者能之其德愈盛則其禮愈恭矣亢龍有悔子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也解已見乾之上九不出戶庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也此節初九之爻辭也仲尼釋之以謂處世事者戒漏言唐髙宗告武后以上官儀教我以廢汝此君不密而失臣也陳蕃乞宣臣章以示宦者此臣不密而失身也失臣失身可悼也幾事不密唐幾為周漢幾為魏尤可悼也然則謹密而不出遂忘世乎曰仲尼不云乎邦有道危言危行邦無道危行言孫子曰作易者其知盜乎易曰負且乘致冦至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致冦至盜之招也此解六三之爻辭也仲尼釋之以謂人皆知小人之致盜莫知小人之為盜蓋小人之致盜有三其為盜亦有三一曰盜位二曰盜勢三曰盜貨小人身為負販之役而僭乘君子之車此盜位也既得君子之位而公行暴慢之惡此盜勢也以負販之屢而驟得千金之富矜其有忽於藏此盜貨也已盜其三盜亦將盜其三已以盜而得盜亦將盜其得是故得車而盜奪之得勢而盜伐之得貨而盜取之非盜能盜小人之有也小人實教盜以盜已之有也司馬氏安能盜魏曹操教之也蕭衍安能盜齊蕭道成教之也故仲尼曰作易者其知盜乎所謂知盜非知奪伐之盜也知教奪伐者之盜也故又終之曰誨盜曰之招非幸小人之遇盜也所以深懲小人之為盜以教盜也大衍之數五十其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸竒於扐以象閏五嵗再閏故再扐而後挂天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十當期之日二篇之䇿萬有一千五百二十當萬物之數也是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神德行是故可與酬酢可與祐神矣此章言易道尚占揲蓍之法也其法有所謂數之用有所謂數之本有所謂數之終何謂數之用大衍之數五十是也五十者天地之成數也程子曰數始於一備於五小衍之為十大衍之為五十吕氏曰參天雨地而為五故十者兩其五也五十者十其五也二説得之矣故天地之數不過於五然其數五十而其用四十有九者虛其一也虛其一者復歸於一也所謂易有太極也分而為二者取四十九枚之蓍以左右手無意而中分之為二也象兩者兩儀也挂一者初揲必挂其一也象三者三才也揲之以四者四四揲之也張子曰竒者即所挂之一也扐者一揲之餘也歸竒於扐者以所挂合所餘也猶閏者嵗之餘也此數之用也何謂數之本天地之數五十有五是也五十有五者天地之積數也天數二十有五者一三五七九之積也地數三十者二四六八十之積也自一至九天數五也自二至十地數五也以地六合天一五位各有合也此數之本也何謂數之終乾坤二卦之䇿萬有一千五百二十是也揲之而得四者九是為老陽之數三十有六從而六之不曰乾之䇿二百一十有六乎揲而得四者六是為老隂之數二十有四從而六之不曰坤之䇿百四十有四乎二篇之䇿凡陽爻百九十有二皆乾之九也隂爻百九十有二皆坤之六也不曰萬有一千五百二十乎此數之終也分二挂一揲四歸竒於扐營之有四而後有爻有爻而後有卦故曰四營而成易揲之三變而成一爻遇九為老陽遇七為少陽遇六為老隂遇八為少隂三變者六而成六爻小而成八卦伸之長之大而成六十四卦易之能事於是畢矣成變化者十有八變是也行鬼神者卦成而知吉凶也其道甚顯者象兩儀象三才當萬物而天地人物之道著也其德行甚神者分而為二莫知其數之多寡揲之以四莫知其爻之竒耦也筮則告占則應故可與酬酢行吉凶在神知吉凶在蓍故可與祐神祐助也子曰知變化之道者其知神之所為乎易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占是以君子將有為也將有行也問焉而以言其受命也如嚮無有逺近幽深遂知來物非天下之至精其孰能與於此參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也此仲尼贊聖人作易之妙先之以總言聖人易道之神復别言君子用易之神申之以别言君子用易之神復總言聖人易道之所以神也夫神者何物也隂陽不測之謂神此天之神也聖而不可知之謂神此聖之神也既曰不可測知矣何自而知神之所為乎求之變化其庶矣乎何謂變何謂化變者有之改化者無之復物壯而老世盛而衰變也物生而死世存而亡化也孰為此者神也故知變化之道者其知神之所為乎曰其知神之所為乎者疑辭也雖仲尼亦難於指而定之也此所謂總言聖人易道之神也易道之神如此君子將欲推而用之何從而用之其道有四內焉用之於一身吾之一言一動非尊夫易之辭與變不可也外焉用之於萬事吾之一器一疑非尊夫易之象與占不可也尚者尊之之謂也此所謂别言君子用易之神也君子於此惟能於一言一動一器一疑之間將有為有行之時用易之四道而不敢須臾離之則有吉而無凶悔吝矣吾將一言乎不敢以私意言也必問在易之辭可言與否易之道可以言與吾受易之命而後言也易之道不可以言與吾受易之命而不言也吾受易之命如響應聲之速故物之方來其吉凶吾能逆知之亦如響應聲之速無逺無近無幽無深吾有不知者乎何也非有竒譎也言善則物必應言不善則物必違此易之辭也吾能精於其辭此其所以前知其應與否也精於射者知百中於未發精於醫者料十全於垂死而况精於易之辭者乎非精於辭也精於理也故曰非天下之至精孰能與於此此以言者尚其辭也吾將一動乎不敢以私意動也必觀易之卦與卦之爻或以三而變或以五而變或吉變而凶或凶變而吉吾從其吉者而動焉則日星亦為之光明山川亦為之寧謐天地之文罔不用成而况於人乎故曰參伍以變通其變遂成天地之文又曰非天下之至變孰能與於此此以動者尚其變也吾將制一器乎不敢以私意制也必觀易之數或其數錯而雜或其數綜而統如乾之䇿二百一十有六如坤之䇿百四十有四極易之數定易之象如制鼎之器者象鼎卦之形一器猶然况天下之事有大於一器者乎故曰錯綜其數極其數遂定天下之象此以制器者尚其象也吾將決一疑乎不敢以私意決也必卜筮於易之占蓋吾有思也有思則惑吾有為也有為則妄至於易之道隱於天地之間而著於聖人之書無思無為而寂然不動然如是而吉如是而凶其理固存也吾將以吾之疑質易之占有質則感有感則應天下萬事吉凶之故響然而應渙然而通如撞鐘如啓鑰無毫釐之差無頃刻之緩孰為此者易之神也故曰易無思也無為也寂然不動感而遂通天下之故非天下之至神孰能與於此此以卜筮者尚其占也凡此四者所謂申之以别言君子用易之神也然易何為而神也聖人窮極天下萬物之理而得其深研究天下萬事之微而得其幾聚於一心之精而謂之神也惟其深故以吾先知達彼後知以吾先覺達彼後覺自一心而通天下之志惟其幾故未亂知亂易亂為治未亡知亡轉亡為存自一心而成天下之務合深與幾而至於聖而不可知之神此其所以能不疾而速不行而至也夫天下之理惟疾故速惟行故至未有不疾而速不行而至者也蓋不如是不足以為神也然則聖人之神果何物也心之精也豈惟心之能神哉物理亦有之銅山東傾而洛鍾西應東西異地傾應同時此一物之理相感有不疾而速者也豈惟物理哉人氣亦有之其母齧指而其子心動母未嘗往子未嘗來此一人之氣相同有不行而至者也而况聖心之神乎是故範圍天地而一念不踰時豈假疾而後速經緯萬方而半武不出戶豈假行而後至何為其然也心之神也聖人聚天地之神於一心推一心之神於大易此易道之所以神而君子之用易所以神也故曰夫易聖人所以極深而研幾也惟深也故能通天下之志惟幾也故能成天下之務惟神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也此所謂復總言聖人易道之所以神也天一地二天三地四天五地六天七地八天九地十子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明睿知神武而不殺者夫是以明於天之道而察於民之故是興神物以前民用聖人以此齋戒以神明其德夫是故闔戶謂之坤闢戶謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神程子曰自天一至地十當在天數五地數五之上簡編失其次也天一生數地六成數此説得之自子曰夫易何為者也以下一章竊意亦有脫簡紊編者如曰其孰能與於此哉古之聰明睿知神武而不殺者夫此二語上下皆與前後之文不相聮屬别釋於後姑試銓次之曰子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故闔戶謂之坤闢戶謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神是故蓍之德圓而神卦之德方以知六爻之義易以貢神以知來知以藏往聖人以此洗心退藏於密吉凶與民同患是以明於天之道而察於民之故是興神物以前民用聖人以此齋戒以神明其德夫是故聖人以通天下之志以定天下之業以斷天下之疑易曰髙宗伐鬼方三年克之小人勿用子曰非天下之至仁其孰能與此哉古之聰明睿知神武而不殺者夫此一章仲尼贊聖人之作易所以周天下之用又言聖人之用易所以致天下之用也昔者聖人之作易果何為而作乎有以作之必有以用之作而無用則如勿作開達物理成就世務以覆冒天下此其道之用也如斯而已言不外乎此也然易道之用有四尚其辭尚其變尚其象尚其占是也四者之要有二尚其變尚其占是也何謂尚其變乾坤闔闢易之變也乾陽也陽主乎開坤隂也隂主乎閉先言坤後言乾靜而後動也坤閉也閉極必開乾開也開極必閉閉者開開者閉變而未已也惟其靜而復動動而復靜變而未已是故已往者故方來者新此易道之所以通而不窮也於是物生而有象物成而有器制作百度以適於用而百世守之其正名曰法出入萬化以利其用而百姓不知其強名曰神易道之尚其變者如此何謂尚其占蓍卦圓方易之占也蓍運於四營之初其七八九六之數不可以逆知故圓而神卦成於十有八變之後其初上二五之位一定而不易故方以知神言天知言人也以蓍之神得卦之知故六爻之義可推吉凶之告可獻矣貢者獻也伻來獻卜是也蓍聽乎方來之運故曰知來卦畫乎已往之書故曰藏往易道之尚其占者如此故仲尼贊聖人之作易所以周天下之用夫惟易道尚其變是故聖人以之洗心則洞照天人之理夫惟易道尚其占是故聖人以之齋戒則益尊蓍卦之德且夫衣垢則洗器塵則洗聖人之心如止水如明鏡已同乎天也何俟乎易之洗哉蓋聖人之心同乎天而聖人之憂患同乎人何聖人之憂患同乎人也民之吉凶聖人之吉凶也民無吉凶聖人何患雖然聖人亦豈弊弊然以民之吉凶憂患自攖其方寸之地乎有時而同乎人有時而同乎天也曷為有時而同乎天也出而與民同患退而以易洗心也方其退而潛乎靜密穆清之中樂而玩乎卦繫爻象之辭默而觀乎乾坤闔闢之變如是而為變為通如是而為象為器如是而為法為神當是之時金石奏乎側而耳不聞黼繡張乎前而目不見天人之至理隱然睹乎羮牆而參然倚於輿衡也明於天之道察於民之故信乎其明且察也若夫祭必齋戒卜必齋戒將以動天地感鬼神也三日戒焉以逺夫外物之干七日齋焉以專夫一念之敬故祭則受福卜則襲吉何也蓍者神物也卜者鬼謀也吾之一心能神明夫蓍之德則蓍亦神明而應之吾之一心將草芥夫蓍之德則蓍亦草芥而應之曰神明其德者尊之之謂也故記曰其曰明器神明之也蓍無情者也而有應之與否者皆吾心之所召也何也心之所在理之所在也聖人興神物以前民用可不敬乎興神物者有舉而無廢前民用者先占而後事天文之理明所以能通天下之志定天下之業蓍卦之德尊所以能斷天下之疑故曰仲尼言聖人之用易所以致天下之用大扺繫辭之文皆有凡例如曰非天下之至變孰能與於此又曰非天下之至神孰能與於此言變言神則有所本也今此章於知以藏往之下言其孰能與此哉則前無所本如曰古者王天下必指犧黃又曰易興於中古必指殷周言古則必有其人也今此章於孰能與此哉之下言古之聰明神武不殺則獨無其人竊意其為仲尼釋易之辭而有脫文又求易中神武不殺之君惟既濟九三之爻辭稱髙宗伐鬼方三年克之小人勿用惟不殺故三年而後克惟小人好殺故勿用或可以當仲尼神武不殺之稱姑試補之曰易曰髙宗伐鬼方三年克之小人勿用子曰非天下之至仁其孰能與此哉古之聰明睿知神武而不殺者夫是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人探賾索隱鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利也此章極言易之所以大者天地出於易而易非出於天地聖人作夫易而易不作於聖人也易有太極何謂也曰元氣渾淪隂陽未分是謂太極當是之時易之道已具矣故曰易有太極然則非太極之能有夫易而易能有夫太極也是生兩儀何謂也曰元氣既分一隂一陽於是生焉兩儀生四象何謂也曰兩儀之陽一生二是陽之二象也兩儀之隂一生二是隂之二象也合而言之是為四象四象生八卦何謂也曰四象之二陽重兩儀之一陽其卦乾生焉四象之二隂重兩儀之一隂其卦坤生焉兩儀之一陽降於四象二隂之下其卦生震兩儀之一隂降於四象二陽之下其卦生巽兩儀之一陽交於四象二隂之中是生坎之卦兩儀之一隂交於四象二陽之中是生離之卦兩儀之一陽升於四象二隂之上於是艮之卦生矣兩儀之一隂升於四象二陽之上於是兑之卦生矣是謂生八卦蓋太極者一氣之太初也極之為言至也兩儀者二氣之有儀也四象者重兩儀而有象也何也隂陽不測至幽至神無儀無象太極是也有儀則幽者著而有儀則矣隂陽是也有象則隂陽之著者形而有物象矣五行是也儀者極之著象者儀之形故一氣者二氣之祖也二氣者五行之母也二氣分而純者為乾為坤二氣散而雜者為震為巽為坎為離為艮為兑乾天也坤地也震巽木也坎水也離火也艮土也兑金也故周子曰五行一隂陽也隂陽一太極也太極本無極也周子所謂無極者非無極也無聲無臭之至也然則易出於天地乎天地出於易乎雖然易之未作易在太極之先易之既作易在八卦之內八卦畫而吉凶定吉凶定而大業生大哉作易之聖人乎大哉易書之事業乎何大乎易書之事業也以言乎法象之大則有易中之天地乾坤是也以言乎變通之大則有易中之四時震巽六子是也以言乎著明之大則有易中之日月坎離是也以言乎崇髙之大則有易中之富貴日新之盛德富有之大業是也以言乎利用之大則有易中之聖人或神道而設教或順動而民服是也以言乎深逺之大則有易中之蓍龜某爻吉亨某爻征凶是也是皆易中之大業也非聖人立卦而作易孰能備天下之物致天下之用成天下之器若是其廣大悉備乎謂易不作於聖人不可也然易中之蓍龜神物孰生之也天生之也聖人不過則之而已易中之變化孰為之也天地為之也聖人不過效之而已易中之吉凶孰見而示之也天垂象以見之也聖人不過象之而已易中之圖書孰出之也天於河洛而出之也聖人不過則之而已故四象八卦也聖人不過因天地之隂陽畫之以示天下而已繫之以辭也聖人不過因某卦與某爻言之以告天下而已如是而吉如是而凶也聖人不過因隂陽之逆順從而斷定之而已聖人何與焉使聖人之作易有秋毫與於其間則是易之書乃聖人之私書易之道乃聖人之私術何以先太極而有初後天地而無終乎謂易不作於聖人亦可也然則聖人可無乎曰聖人何可無也韓愈曰如古之無聖人人之類滅久矣王通曰通於夫子受罔極之恩矣其與太極合德乎故此章先之以易有太極之辭又申之以法象莫大乎天地之辭又申之以備物致用立成器以為天下利莫大乎聖人之辭然則易也太極也天地也聖人也為四乎為一乎為大乎為小乎故曰聖人何可無也子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神乾坤其易之緼耶乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行此章言聖人作易之意其散在六十四卦之爻象其聚在乾坤之二卦聖人用易之道其散在天下之事業其聚在一身之德行也子曰書不盡言言不盡意然則聖人之意其不可見乎何謂也曰此仲尼將欲言聖人作易之意既歎其言之之難又歎其見之之難故自言之自問之以發下文之自答也夫言無窮而書有止以有止之書載無窮之言故書不盡言意無形而言有聲以有聲之言述無形之意故言不盡意聖人之作易其書且不盡其言其言且不盡其意而吾欲以吾之言盡彼之意可乎此仲尼所以歎聖人作易之意吾欲言之之難也非言之之難也見之之難也見之也真則言之也親矣故又自問曰然則聖人之意其不可見乎此仲尼所以屢歎聖人作易之意見之之難也然則孰見之仲尼見之者也惟其見之故又自答曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神神者無方而不測者也易一作而神且盡而况聖人自言其易之意自書其易之言乎立象以盡意何謂也曰以一卦言之天地交者泰之象也不交者否之象也通塞之象立而治亂之意盡矣以一爻言之初而潛者勿用之象也上而亢者不知退之象也上下之象立而潛退之意盡矣孰謂言不盡意乎繫辭焉以盡其言何謂也曰元亨利貞者卦辭也大哉乾元者彖辭也潛龍勿用者爻辭也天行健者大象辭也陽在下也者小象辭也繫之以卦辭不足又繫之以彖象之辭繫之以爻辭不足又繫之以小象之辭孰謂書不盡言乎爻象之辭具而卦成卦成而天地萬物之情可得而見鬼神之情狀可得而知而况於人之情偽乎故曰設卦以盡情偽易窮則變泰否是也變則通剝復是也通則久既濟未濟是也故曰變而通之以盡利古之聖人用易之道以利天下者變通而已故棟宇生於巢居之窮舟楫生於車馬之窮變而通之所以鼓之舞之也冗居病而得棟宇孰不鼓舞於棟宇車馬阻而逢舟楫孰不鼓舞於舟楫何則困於所窮必快於所變也變而通之則天下之利皆可得而盡鼓之舞之則聖人之道皆精入於神非聖人之神也易道之神也故曰鼓之舞之以盡神此所謂聖人作易之意其散在六十四卦之爻象也曰乾坤其易之緼耶乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣何謂也蓋六十四卦其陽爻皆乾之自出其隂爻皆坤之自出故乾坤二卦乃六十四卦之奧府三百八十四爻之寶藏也乾坤立則易立乾坤隱則易隱非乾坤有毁息之理也言易與乾坤不可以相無也雖然乾坤者何物也謂天地則非天地也謂非天地則天地具此者也其隂陽之異名而健順之異詁與故曰乾陽物也坤隂物也又曰乾健也坤順也易之道一隂一陽而已矣此所謂聖人作易之意其聚在乾坤之二卦也是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業何謂也曰此仲尼所以别言易道之體極言易道之用也何謂體曰道曰器是也何謂用曰變曰通曰事業是也今夫籩豆器譬也所以秩籩豆者道譬也吾身之手足器譬也所以使手足者道譬也一隂一陽之謂道隂陽亦未離於器者也所以隂陽者道也道不自立以器而立器不自行以道而行故孔子曰何莫由斯道也孟子曰夫道若大路然董子曰道者所由適於治之路仁義禮樂皆其具也韓子曰博愛之謂仁行而宜之之謂義由是而之焉之謂道董子之所謂具即仲尼之所謂器也仲尼之所謂由斯孟子之所謂若路董子之所謂由適韓子之所謂由是之焉者即今仲尼之所謂形而上者也形而上云者以無形而使有形也形而下云者以有形而使於無形也所謂變通所謂事業皆自此道化而裁之推而行之舉而措之耳易之道豈不大而聖人之用易其用豈不大哉此所謂聖人用易之道其散在天下之事業是故夫象聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻極天下之賾者存乎卦鼓天下之動者存乎辭化而裁之存乎變推而行之存乎通何謂也曰賾動已見於前化推再見於後疑其衍也神而明之存乎其人默而成之不言而信存乎德行何謂也曰易有三一曰天易二曰竹易三曰人易天尊地卑乾坤定矣天易也書不盡言言不盡意竹易也存乎其人存乎德行人易也有聖人焉能得易之道神而明之則易不在天而在人能體易之德默而成之則易不在竹而在聖神明在我德行在我則言之可也不言亦可也體易成德至於不言而信則書不盡言也繫辭盡言也言不盡意也立象盡意也仲尼皆道之矣此所謂聖人用易之道其聚在一身之德行也誠齋易傳卷十七
