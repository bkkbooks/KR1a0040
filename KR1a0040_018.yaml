body:
  text: 誠齋易傳卷十八宋楊萬里撰繫辭下八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝生乎動者也剛柔者立本者也變通者趣時者也吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也夫乾確然示人易矣夫坤隤然示人簡矣爻也者效此者也象也者像此者也爻象動乎内吉凶見乎外功業見乎變聖人之情見乎辭天地之大徳曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義此章言聖人繫易之辭本乎爻象之剛柔以明天地之道徳又言聖人用易之意體乎天地之道徳以為聖人之仁義也八卦未畫萬象在天下八卦既畫萬象在易故曰八卦成列象在其中矣卦之未重象備而爻未備卦之既重爻始備矣故曰因而重之爻在其中矣乾者剛之粹坤者柔之粹剛柔未相推移也何變之有及乾之初爻一推移焉則變而為㢲坤之初爻一推移焉則變而為震故曰剛柔相推變在其中矣乾之初九未可以動者也故聖人繫之爻辭則曰潛龍勿用象辭則曰陽在下也命之以勿動也乾之九二可以動者也故聖人繫之爻辭則曰見龍在田象辭則曰徳施普也命之以動也故曰繫辭焉而命之動在其中矣可以動而動焉吉之所從生也未可以動而動焉凶悔吝之所從生也故曰吉凶悔吝生乎動者也然衆人所以召吉凶者三而聖人之所以處吉凶者一曰本曰時曰變此三者所以召吉凶者也吉凶何從而來哉本乎爻之剛柔而已此之謂吉凶之本故曰剛柔者立本者也在彼者有可否在我者有静作此之謂吉凶之時時未可見故初九之剛變通而趣乎潛不潛則凶時可以見故九二之柔變通而趣乎見惟見則吉此之謂吉凶之變故曰變通者趣時者也聖人有一道以處吉凶者何道也曰貞而已貞者何也一於正而已惟天下之一正為能勝天下之萬變非吾求勝於彼也彼自不能入也故貴為天子不能樂堯舜之憂以正勝吉也在陳畏匡不能憂仲尼之樂以正勝凶也夫天地之道唯貞為能觀日月之道唯貞為能明而况區區天下之羣動乎故曰吉凶者貞勝者也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也葢正者天地之道也非聖人之私器也此所謂言聖人繫易之辭本乎爻象之剛柔以明天地之道也然則孰為天地之徳乎一言以蔽之曰生而已大哉乾元萬物資始乾道變化各正性命雲行雨施品物流行此乾之所以示人以易者生也其易確然也至哉坤元萬物資生乃順承天此坤之所以示人以簡者生也其簡隤然也確然者確乎不可拔也隤然者隤乎其至也三百八十四爻其一百九十二之陽皆乾爻也其一百九十二之隂皆坤爻也隂陽之爻非它皆效法天地生物之徳而已故曰爻也者效此者也至於六十四卦之象非它也皆形像天地生物之徳而已爻象一動則其外者見而為吉凶其變者見而為功業聖人之情欲天下之人避凶而趨吉以各成其功業而已故繫之以辭以命之焉故曰聖人之情見乎辭聖人所以愛天下之生亦如天地愛萬物之生也故又曰天地之大徳曰生此所謂言聖人係易之辭本乎爻象之剛柔以明天地之徳也雖然明天地之道徳者在爻象得天地之道徳者不在爻象而在聖人得天地之道徳者在聖人施天地之道徳者不在聖人而在至尊之位有斯道也有斯徳也而位斯位也天下之人所以喜之貴之而目之曰大寶也然得位之難又未若守位之難何以守之曰仁而已何以為仁曰財而已雖有仁心仁聞而天下不被其仁恩之澤者奪民之財為己之財而已故鹿臺聚而商亡鹿臺散而周王財散則民聚此仁之實也然仁不孤立必有義焉何謂義教民理財義也謹以出入亦義也禁民為非亦義也此所謂言聖人用易之意體乎天地之道徳以為聖人之仁義也然則易之為道爻象云乎哉繫辭云乎哉古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之徳以類萬物之情作結繩而為網罟以佃以漁葢取諸離此一章至盖取諸夬言易之未作聖人取諸天地人物以作易易之既作聖人復取諸易以制器也昔者易之未作非无易也有易而散在天地人物之間也然則其有也孰得之其散也孰聚之得之於心而聚之於易者其惟包羲氏與是故犧者易中之髙曽也文者易中之祖也孔者易中之父也易在天地其理具其名隠至包犧畫之而名始立易在包犧其名立其道微至文王重之仲尼繫焉而道始章然則包犧氏之畫孰示之也天示之也天以何而示之在天有象在地有法在人有一身之靈在物有鳥獸之文有萬物之宜若為雷為風觀象於天而得之也若為山為澤觀法於地而得之也若左股右肱取諸身也若鶴鳴鴻漸取諸物也八卦既畫幽而神明之徳顯而萬物之情皆具見於易而不得遁矣故曰易之未作聖人取諸天地人物以作易昔者厥初生民何以相生相養以至於千萬世而不息不滅也人非物不生物非器不獲聖人將欲制器以獲物假某範於何人也措某器於何施也取諸易而足矣自網罟至於書契皆其大略也聖人制器何以取諸易也仲尼曰易有聖人之道四焉以制器者尚其象是也是故網罟之象生於離六爻縱横錯綜而網罟之象備矣故曰易之既作聖人復取易以制器包犧氏沒神農氏作斵木為耜揉木為耒耒耨之利以教天下葢取諸益教民肉食自包犧始教民粒食自神農始耒耜取諸益者震下㢲上郭子儀曰震㢲二木之象而其彖曰木道乃行日中為市致天下之民聚天下之貨交易而退各得其所葢取諸噬嗑韓氏曰嗑合也設法以合物也神農氏沒黄帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉无不利黄帝堯舜垂衣裳而天下治葢取諸乾坤所謂衣裳即所謂古人之象五色作服者是也盖始於黄帝備於堯舜韓氏曰衣裳以辨貴賤乾尊坤卑刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下葢取諸渙郭氏曰渙木上而水下故其彖曰利涉大川乗木有功也服牛乗馬引重致逺以利天下盖取諸隨震下兑上隨之上卦牛二角之象下卦反觀之馬四足之象又上六云拘係之乃從維之絡首穿鼻之象重門擊柝以待暴客葢取諸豫韓氏曰取其備豫㫁木為杵掘地為臼臼杵之利萬民以濟盖取諸小過小過艮下震上上動而下止此杵動而臼止之象也耒耜耕稼之始杵臼脱粟之始弦木為弧剡木為矢弧矢之利以威天下葢取諸睽兑下離上睽之上九曰先張之弧謂下卦初為弧二為弦而相附也又曰後説之弧謂上卦之弦不附於四之弧也三與五皆二矢象也上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨葢取諸大壯乾下震上大壯上二隂其上六覆者之象也其六五椽桷之象也其下四陽柱之象也古之葬者厚衣之以薪葬之中野不封不樹喪期无數後世聖人易之以棺槨葢取諸大過㢲下兑上大過中四爻實而長者棺上下左右價也其兩爻缺而短者棺之前後價也㢲入也兑説也夫見狐狸食之以為戚則見棺槨入藏以為説矣非生者説其死者也以死者入藏為慰也上古結繩而治後世聖人易之以書契百官以治萬民以察盖取諸夬夬乾下而兑上乾為天為首兑為口舌昔吳人問蜀使曰天有口乎曰有帝謂文王是也此雖一時應敵之言未可為无理也書契者其代天之口舌乎故曰取諸夬揚雄曰天常為帝王之筆舌史曰斗為天之喉舌吾亦曰書契為天之口舌嗚乎鴻荒之世民之初生非若今日之備器用便起居具服食也自斯人之饑而未知佃漁也聖人於是乎作網罟自斯人之肉食而未知粒食也聖人於是乎作耒耜自斯人之食貨或有餘或不足之偏匱也聖人於是乎作市易自斯人之寒而衣皮未知織紝之製也聖人於是乎作衣裳自斯人之出入厄於川隔而道㫁也聖人於是乎作舟楫自斯人之疲於負擔而憚於逺塗也聖人於是乎作輪轡自斯人之虞於冦攘而懈於守禦也聖人於是乎作門柝自斯人之知有耕耨而未知舂揄也聖人於是乎作杵臼自斯人之无瓜牙以自衛而憂於搏噬也聖人於是乎作弧矢自斯人之穴處而病於混蟄也聖人於是乎作宫室自斯人之死而戚於虆梩之掩也聖人於是乎作棺槨自斯人之窮於結繩而相欺无籍也聖人於是乎作書契然非聖人之私智也取諸十二卦之象而後成亦非一聖人之能為也歴乎五聖人而後備盖斯人生生之道若此其難而聖人所以生生斯人者若此其勞也故韓愈曰如古之无聖人人之類滅久矣又曰今吾與汝安居而暇食優㳺以生死與禽獸異者寧可不知其所自耶是故易者象也象也者像也彖者材也爻也者效天下之動者也是故吉凶生而悔吝著也韓氏曰彖言成卦之才徳以統卦義也陽卦多隂隂卦多陽其故何也陽卦竒隂卦偶其徳行何也陽一君而二民君子之道也隂二君而一民小人之道也陽卦宜其多陽而反多隂隂卦宜其多隂而反多陽故仲尼自問曰其故何也於是自答曰陽卦竒隂卦偶故也盖衆者以寡者為之君寡者以衆者為之民一卦二隂而一陽則二隂相率而君一陽故陽卦竒謂二耦以一竒為君也一卦二陽而一隂則二陽相率而君一隂故隂卦耦謂二竒以一耦為君也王弼曰隂爻雖賤而為一卦之主者處至少之地是也仲尼又自問曰如此則隂陽二卦其徳行何也於是又自答曰陽一君而二民君子之道也隂二君而一民小人之道也葢一者竒之異名二者耦之異名陽一君而二民謂以竒為君以耦為民也如此則隂陽之理順而君民之分正故曰君子之道隂二君而一民謂以耦為君以竒為民也如此則隂陽之理悖而君民之分亂故曰小人之道易曰憧憧徃來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日徃則月來月徃則日來日月相推而明生焉寒徃則暑來暑徃則寒來寒暑相推而嵗成焉徃者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇徳也過此以徃未之或知也窮神知化徳之盛也上繫仲尼既舉七卦之爻辭以發明六十四卦之微矣此復舉十卦焉憧憧徃來此咸九四之爻辭也咸感也感應當以虛受而九四以陽剛之資居上下二卦出入徃來之㑹方憧憧然勞思以應之不知一思動百思從不勝其應矣故仲尼曉之曰天下何思何慮惟觀其歸執其一以應之爾吾觀其歸彼塗雖殊而不能違吾執其一彼慮雖百而不能出又申之曰天下何思何慮丁寧之也夫天下之事徃來无窮然不外乎屈信相感而已吾觀諸日今夕之徃所以為來朝之來吾觀諸月今夕之來所以為來朝之徃葢前之屈乃後之信也吾觀諸寒暑折膠之寒不生於寒而生於烈日流金之暑不生於暑而生於堅氷葢今之信乃昔之屈也吾觀諸物尺蠖之屈以屈為信龍蛇之蟄以蟄為存知屈信之一致則知徃來之一致矣死生之説幽明之故治亂之幾皆若是而已然則聖人之應感既曰何思何慮則何修而臻此與曰精於義理而已精於庖者其刀入神精於射者其矢入神苟入神矣其致用於庖與射也何有精於枝者猶若是而况精於義理而入神者乎是故以之致用則用必利以之安身則身必安以之崇徳則徳必崇過此以徃推而上之皆如破竹如解氷聖人亦不自知其然而然也至於此則窮極隂陽之神周知造化之妙所以為徳之至盛者與而又何思何慮之有然則思曰睿非與曰睿者潛心而神憧憧者勞思而擾易曰困於石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪此困六三之爻辭也仲尼釋之以謂困窮者人之所不能免者也有君子之困有小人之困顧所以致之者何如爾君子有不幸之困无以致之適遭之也在陳畏匡是已故名不辱而身不危小人无幸免之困為不善以致困也以其非所據而據是以非所困而困為不善而求幸免是據于蒺藜而求不刺也其困彌堅如石之不移矣尚可得而保其名保其身保其家保其妻子乎臧紇陽虎之事是也易曰公用射隼于髙墉之上獲之无不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也此解上六之爻辭也仲尼釋之以謂君子之於天下不患无獲患无時不患无時患无器不患无器患无韞子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾无咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為无益而弗為也以小惡為无傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶此噬嗑初九上九之爻辭也仲尼釋之以為懲惡在初改過在小子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑此否九五之爻辭也仲尼釋之謂前三人者以驕敗後三人者以憂昌能一再憂其亡則其固如繫于桑本矣桑本物之至固而不可拔者况又係之於木本乎由乎前者明皇晚年是也由乎後者堯舜之儆戒三宗之寅畏宣王之懼是也子曰徳薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也此鼎九四之爻辭也徳之薄者尚可積而厚知之小者不可强而大力之少者不可勉而多聖人亦豈責天下之人皆徳厚而不薄皆知大而不小皆力多而不少哉責其貪位而不量已過分而不勝任爾量力而負其人不跌量鼎而受其足不折今也鼎足之弱而鼎實之豐有不折已之足覆人之餗敗已之身者乎足之折身之敗自取之也餗之覆彼何辜焉此仲尼釋之之意也子曰知幾其神乎君子上交不謟下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日㫁可識矣君子知微知彰知柔知剛萬夫之望此豫六二之爻辭也夫微莫微於天下之幾妙莫妙於天下之神是故難知者幾也難至者神也今仲尼曰知幾其神乎非天下之至聖其孰能與於此乃止曰君子上交不諂下交不凟其知幾乎一何小也葢天下有大患有大欲富貴天下之大欲也動心天下之大患也吾心一動諂瀆生焉諂瀆者其富貴之捷徑而禍敗之胚胎也與李斯之誅不在于具五刑之日而萌於諂二世之書張湯之敗不在于對八使之時而兆於摩謁者之足斯之諂自以為取容之深計湯之瀆自以為託私之至謀然取容乃所以不容自託乃所以自敗然則上交於吾君而不諂下交於吾與而不瀆謂之小也可乎謂非知幾之神也可乎故曰幾者動之微吉之先見者也所謂動者何物而所謂吉者何事也天下之動莫小於雷風而欲心一動為至大天下之吉莫重於不失其身而崇髙富貴為至輕然其心之動也其初至微也能於其至微而察之求其所謂瀆者而絶之天下之元吉人莫之見而吾獨先見之矣不曰至神而何哉雖然君子所以能見幾而作不俟終日者亦必有道矣易之豫曰介于石不俟終日貞吉是也夫石者至静而无欲至重而不動者也今也君子介然如石天下之可欲者何物能動之乎其見幾也寧用終日而後識之乎推是心以徃舉天下之萬事見微則知其彰見柔則知其剛此天下所以尊之仰之為萬夫之望也與子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復无祗悔元吉學有以知為貴有以行為貴大學曰欲正其心先誠其意欲誠其意先致其知此以知為貴也傅説曰非知之艱行之惟艱此以行為貴也然則知而不行可乎曰是離婁而跛也行而不知可乎曰是飛㢘而眇也若顔子可謂兼之矣有不善未嘗不知此大學之致知也知之未嘗復行此傅説之行其所知也故仲尼稱其近於知幾又許之以當復之初爻殆庶之為言近也知幾則聖近幾則賢天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也此損六三之爻辭也天下之事一則精二則粗天地人物皆然而况於萬事乎故舜曰惟精惟一而仲尼亦曰言致一也致者力至之之謂也羿致力而一於射故精於射王良致力而一於御故精於御使羿而欲為良良而欲為羿則兩喪其所能矣堯舜禹湯文武周孔之治仁義黄老之治清静孫吳之治兵其道不同其致一則同也子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也无交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恒凶此益上九之爻辭也安其身而動則其名正易其心而語則其辭真定其交而求則其助多此立心有恒之人也周公東征作鴟鴞以悟成王作大誥以曉庶邦是也危以動則无名懼以語則无辭无交而求則无助此立心勿恒之人也楚公子比乗亂以自立然去晉而不送歸楚而不逆卒死於棄疾之手是也此仲尼所謂傷之者至而易所謂或擊之者與子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合徳而剛柔有體以體天地之撰以通神明之徳其稱名也雜而不越於稽其類其衰世之意耶夫易彰徃而察來而微顯闡幽開而當名辨物正言㫁辭則備矣其稱名也小其取類也大其㫖逺其辭文其言曲而中其事肆而隠因貳以濟民行以明失得之報上繫言乾坤其易之緼此章言乾坤其易之門皆所以深贊易之道其本在乾坤之二卦使學易者知其闗鍵之㑹要也孔子曰誰能出不由户然則學易者何莫由乾坤二卦乎盖乾坤者六十四卦之祖也六十四卦者乾坤之别也不明乎乾之陽坤之隂則无以知隂陽如之何而合徳剛柔如之何而有體如之何而體天地之撰如之何而通神明之徳明乎乾之陽則知舉六十四卦之物本乎陽者皆乾也明乎坤之隂則知舉六十四卦之物本乎隂者皆坤也乾坤交錯而為六十四卦然後隂陽之徳合隂陽之徳合然後剛柔之體立知易之隂陽合徳剛柔有體則知易之道所以體天地之所為而與天地為一體通神明之徳而使神明无遁情矣然則乾坤二卦豈非易之緼易之門乎然乾之所名或為龍或為馬或為金玉其所稱雖雜而不越乎陽物也坤之所名或為牛或為牝馬或為輿釡其所稱雖雜而不越乎隂物也即其名考其類豈止於衰世之意而已哉造化之徃者屈也其屈无跡唯易能彰之使无跡者有跡造化之來者伸也其伸无形唯易能察之使无形者有形世之所謂百姓日用之顯者唯易能微之使幽若曰神徳行若曰藏諸用是也世之所謂幽明之故死生之説鬼神之情狀之幽者唯易能闡之使顯若曰顯道若曰顯諸仁是也至於開明隂陽剛柔之道其名當其物辨其言正而无偏其辭㫁而无疑其稱名雖若甚小其取類不勝其大其㫖逺使人思而得之也其辭文使人玩而得之也其言曲而中故不欺其事肆而隠故不窮皆非易之私言也因斯民之行有失得之貳者而告之以天理吉凶之報所以濟斯民人欲之陷溺而措之安吉之地也豈止衰世之意而已乎天地之撰如三子之撰撰之言為也易之興也其於中古乎作易者其有憂患乎曰中古曰有憂患仲尼指文王而言之者與所以哀文王所以徳文王所以慶天下後世也自易之既作有憂患者可以處可以忘无憂患者可以備可以消學者受文王罔極之恩矣是故履徳之基也謙徳之柄也復徳之本也恒徳之固也損徳之修也益徳之裕也困徳之辨也井徳之地也㢲徳之制也此章言聖人取諸易之道以成乎已之徳也學易而不以易成已則易自易我自我也易何補於我我何資於易哉墉无基則圮故以踐履之充實為吾徳之基木无本則槁故以歸復其初性為吾徳之本基既立矣驕或齧其基則又圮不持守以謙可乎本既植矣怠或寒其本則又槁不固守以恒可乎徳既持矣亦既固矣遂足矣乎曰未也吾豈无一不善懲忿窒慾又取諸損所以修吾徳也修者修而進之也吾豈盡善見善則遷又取諸益所以裕吾徳也裕者裕而豐之也雖然是皆所以居常也未臨乎變也居常而修且裕或一旦臨變而失之可无懼乎遇困而不失其亨然後吾之徳益辨而明遇井而不食愈冽然後吾之徳清而不改聖人之徳至此大成矣然聖人之心猶曰未也卑㢲以自制退然若无能焉此大禹之不矜周公之不驕仲尼之仁聖豈敢也始則持之以謙終則制之以㢲嗚呼聖徳其至矣乎六十四卦備於身矣九卦其要也履和而至謙尊而光復小而辨於物恒雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷㢲稱而隠此章聖人既取諸九卦以成徳復贊九卦之徳以示人也履以和行謙以制禮復以自知恒以一徳損以逺害益以興利困以寡怨井以辨義㢲以行權此章聖人既贊九卦之徳以示人復發九卦之用以示人也易之為書也不可逺為道也屢遷變動不居周流六虚上下无常剛柔相易不可為典要唯變所適其出入以度外内使知懼又明於憂患與故无有師保如臨父母初率其辭而揆其方既有典常苟非其人道不虛行此章言易道之用存乎變易道之體存乎常易道之行存乎人又曰道不虛行者人也夫易之於人如水之於魚也魚不可離於水人不可逺於易君臣父子无非易也視聽言動无非易也治亂安危无非易也取舍進退无非易也魚離水則死人逺易則凶仲尼曰易之為書也不可逺此之謂也非易書之不可逺也易書之道不可逺也易之道安在哉曰變而已是故屢遷而不居周流而无間乾之初九忽上而居於坤之上六於是坤變而為剥坤之上六忽下而居於乾之初九於是乾變而為姤此易之變上下无常者也乾之一陽與坤之一隂相易而震生焉坤之一隂與乾之一陽相易而㢲生焉此易之變剛柔相易者也是皆不可拘之以典常繩之以要約也惟變之所適誰得而禦之者故曰易道之用存乎變然易之道有體有用其變而无常者用也其常而不變者體也君子之學易能通其變而得其常極其用而執其體是可謂善學易之書而深明易之辭力行易之道者矣易道之體安在哉曰敬而已矣乾曰夕惕若敬也坤曰敬以直内敬也易之道千變萬化而歸於一敬大哉敬乎其入徳之捷徑作聖之奇勲與故曰易道之體存乎常今也學易而得乎敬之一字則出入起居非度不由外内屋漏惟懼是知曰度曰慎罔不夙夜以此應世則遇憂患而自明遇世故而自達以此謹獨則无師保而自律逺父母而自嚴君子何修何飾而臻此哉其初率循乎易之辭而不敢違揆度乎道之方而不敢離玩味於變動不居之中探索其典常不變之要在此而不在彼於是執而有之躬而行之故易之道為實用不為虛言矣仲尼稱之曰苟非其人道不虛行深贊之深嘉之之辭也故曰易道之行存乎人易之為書也原始要終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰徳辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣此章指示學者學易之法有三一曰初爻二曰二五三曰彖辭初爻者易書一卦之性質也至於六爻或各因其時或各指其事而已非若初爻為一卦之要也原其始自可以約其終知其初之難自可以知其上之易初者本也上者末也初辭擬議以定一卦上爻成其終而已故首告之以學初爻之法若夫雜陳一卦之物論撰一卦之徳如是而為是非如是而為存亡如是而為吉凶如是而為居位之當否又非止初爻所能盡也其為中爻二五乎觀二五則是非備矣存亡吉凶與居位之當否可得而知矣故又告之以學二五之法至於統論一卦之體非彖辭何以盡之如乾之彖曰大哉乾元坤之彖曰至哉坤元包兩儀於二字之中括六爻於數語之間知者觀之乾坤之道盡在是矣曰過半盡之之謂也故終告之以學彖辭之法聖人之教人葢如此其詳也二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要无咎其用柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪此章言二四三五居位逺近貴賤安危之分也臣欲柔而中柔過則諂為張禹為胡廣君欲剛而中剛過則苛為漢宣為顯宗九二以剛居柔此柔中也六二以柔居柔此柔過也曰二多譽亦未必盡多君子也譽之者多耳六五以柔居剛此剛中也九五以剛居剛此剛過也曰五多功亦未必盡成功也有功者多耳故二則曰其用柔中許其柔而不過也五則曰其剛勝許其剛而過也與其為元成寧為孝宣與其為安順寧為明帝至於四逼大君之下三乗大臣之上宜其懼而凶也居此位者謹諸易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉此章言重卦之㫖及六爻之文所以極言易書廣大之備也易之未重三材各處其一初為地二為人三為天時則大而未廣孤故也易之既重三材皆合而兩初與二為地三與四為人五與上為天於是大且廣矣盛故也大則有量廣則无際三才大矣兼而兩之是一三才為兩三才也不亦廣乎故曰廣大悉備信乎其備而罔缺也三材之道備矣然分上分中分下則有三才之别合為一卦則隂或居上安知地之不為天陽或居下安知天之不為地五為君則天道為人道矣二為臣則地道為人道矣道有變則為六爻矣爻有尊卑則有等差矣爻有等差則有物象矣剛柔相錯則有成文矣文物不當其處於是吉凶生矣易之興也其當殷之末世周之盛徳邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要无咎此之謂易之道也前章言易興於中古作於憂患仲尼之意已屬文王矣以為未足也此章又明言易興於殷之末世周之盛徳猶以為未足也又指而明之曰當文王與紂之事則无復秋毫隠情矣嗟乎千載之屈有幸逢一朝之伸一家之私有不沒天下之公文王无遇於紂而有遇於仲尼其千載之屈一朝之伸與紂殷王也仲尼殷後也而仲尼貶殷為末世褒周為盛徳指紂之名而不諱稱文王之王而不抑其不以一家之私沒天下之公與大哉文王之聖與大哉仲尼之公與大抵无冦言備冦者不若遭冦言備冦者之為周无虎言防虎者不若遇虎言防虎者之為工何者意之者不若履之者也文王遭紂羑里之禍而演易不以已之憂患忘天下後世之憂患乃推已之憂患慮天下後世之憂患其於憂患可謂親履而備嘗之矣其心危故其辭亦危此无它以吾身之危欲使後世之危者平以吾心之不慢易恐後世之易者傾其慮患之道甚大故其取喻以物也甚詳日昃月望盖取諸天山泉水風葢取諸地右肱左股葢取諸身金矢玉鉉葢取諸器莧陸瓜隕葢取諸草棟隆牀下葢取諸木鶴鳴鴻漸葢取諸禽牿牛獲狐葢取諸獸天下之物苟可為得失吉凶之象者有一物之廢者乎後之觀吾易者以百物求大道以危辭求安平懼之於始懼之於終則其要歸於吉而无咎矣然則文王以易之道免一己之憂患未聖也以易之道免天下後世之憂患斯聖矣故仲尼贊之曰此之謂易之道也夫乾天下之至健也徳行恒易以知險夫坤天下之至順也徳行恒簡以知阻能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能此章申言乾坤健順之性易簡之徳也天下之理健而不息則易息而不健則難故乾之至健其徳行恒易順而不拂則簡拂而不順則繁故坤之至順其徳恒簡徳之易者生物不息故无難也徳之簡者成物不拂故不繁也然易簡則无作為險阻則有情偽今也易而能知險簡而能知阻何也葢兩險相疑兩阻相持是故險不能知險知天下之至險者至易者也阻不能知阻知天下之至阻者至簡者也夾谷之詐不能敵仲尼之禮顓臾之對不能欺仲尼之聽葢聖人得乾坤易簡之理而齊侯之險冉求之阻遇之而敗也惟其得乾坤易簡之理而執之以照天下之險阻情偽則如日之達蔀屋如燭之炳幽潜孰得而遁之者是故其心和説而不憂天下之至險其慮研精而不惑天下之至阻以定天下之吉凶以成天下之亹亹皆易簡之緒餘耳見祥斯知吉見象斯知器見占斯知來又何疑焉葢祥者吉之萌也象者器之影也占者來之訊也故天地以易簡而設位於上下聖人以易簡而成能於兩間謀之卿士庶人而畢從謀之鬼神卜筮而皆協俾萬姓咸曰聖人之能者无它易簡而已能研諸侯之慮侯之二字衍八卦以象告爻彖以情言剛柔雜居而吉凶可見矣變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝既言乾坤之性與徳又申言八卦之象與爻彖也以象告者有畫而未有辭也以情言者有爻辭而又有彖辭也剛柔雜居者六子之卦也其餘皆八卦諸爻所有者未易槩舉將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈此言學易而有得者可以知言矣孟子曰我知言葢得乎此大抵歉於中者必愧於外秦武陽色變而荆軻為之辭謝是也故曰將叛者其辭慙將有言於人而逆疑其不售也必左右其説以嘗之此不有售焉則彼必售矣商鞅之説孝公是也故曰中心疑者其辭枝直情无所煩言至正无所揣摩申公之對武帝是也故曰吉人之辭寡躁競也人而躁競則危言以眩世而无所忌强聒以撼人而不能已能令人厭亦能令人喜厭者其空空而喜者意其有挾也淳于髠之見梁惠王連語三日三夜是也故曰躁人之辭多小人之疾君子也而欲毁君子也必深匿其毁之之迹疾之愈甚則毁之愈緩或顯譽其人而隂寓其忮或泛為之説以旁見其意故毁行而人不悟公孫𢎞之譖仲舒汲黯是也故曰誣善之人其辭游人之心未有无所主者所主者義乎攻之者愈衆而主之者愈堅所主者不義乎外必周為之防而内必深窒其隙幸而遇庸人雖欲攻之莫知其所以攻之者不幸而遇智者先得其隙而入之逆奪其防而據之則一語而折夷之之見孟子是也故曰失其守者其辭屈誠齋易傳卷十八
