body:
  text: 誠齋易傳卷三宋楊萬里撰坎下坤上師貞丈人吉無咎師也者授民以器之凶而納民於事之危奚其吉且無咎乎為民禦寇為中國攘狄為天下除殘去兵不可也興師以其道帥師以其人斯吉且無咎矣正者興師之道賢者帥師之人丈人賢者之尊稱也年德俱尊之謂如荷蓧漢隂皆曰丈人師之丈人指九二也若黃髮之尚父元老之方叔足以當易之丈人矣廉頗趙充國李靖抑其次也王翦馬援王元謨則年焉而已矣然則用將必年則周瑜謝玄可廢與曰何可廢也然必曰丈人何也將者國之司命必曰丈人謹之之至也彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣彼不正而此正正也非衆正也彼之與皆不正而此之與皆正衆正也八百諸侯三千臣心皆欲伐紂則伐紂非武王諸侯王皆欲擊楚之弒義帝者則擊楚非髙帝武王高帝特因衆心之正而用之以正彼之不正而已曰能以衆正以之言用也以此王天下孰能禦之雖然有九二剛中之將而不逢六五之君則其上無應有軍師行險之役而不因天下之順則其舉無名任將有應興師有名雖曰毒天下乃所以拯天下民皆悅而從之吉又何咎坎險也坤順也象曰地中有水師君子以容民畜衆君子之容民如地之容水能容受之斯能蓄聚之矣故孟子曰天下莫不與也天下莫不我與則寇狄誰與哉初六師出以律否臧凶象曰師出以律失律凶也徒法不可以興師徒善不可以出師出師以律而興師不以正徒法也興師以正而出師不以律徒善也正至焉律次焉師出不以律雖臧亦凶况不臧乎楚之亂次晉之爭舟齊之轍亂吳之爭舍皆失律之師也初六師之初出也故深戒其出之之初九二在師中吉無咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也九二以陽剛之才專將帥之任不患其不及也患其過耳惟中則吉而無咎過勇則輕李陵是也過智則姦侯君集是也過威則離張飛是也過強則驕李光弼是也過專則僭王敦蘇峻是也惟中則勇而怯智而愚威而惠強而謙專而順皇甫嵩郭子儀是也承天寵者稟君命而不專懷萬邦者慰民心而不忮為將如是非特才將也賢將也功彌高心彌下身彌退爵彌進宜其王三錫命而未已也六三師或輿尸凶象曰師或輿尸大無功也令出於一其師堅令出於二其師瑕六三以柔懦之資而居九二賢將之上才腐而士不服令褻而下不承則是衆為將也不惟令出于二而已主之者衆斯師焉往而不敗尚何功之有河曲之師趙盾為將而令出於趙穿邲之師荀林父為將而令出于先縠皆六三之輿尸者也六四師左次無咎象曰左次無咎未失常也程子謂左次乃退舍之謂也此説得之蓋善師者不必戰以守為戰亦戰也善戰者不必進以退為進亦進也禹之班師晉文之退舍必于進也乎使高帝不至白登太宗不渡鴨緑悔于何有六五田有禽利執言無咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也禽害田而弋禽則禽服寇害民而禦寇則寇曲有伐罪之辭則有名之師此六五之君興師至正之道也長子帥師九二也弟子輿尸雖貞亦凶衆隂也此六五之君用將至要之法也非童子饋餉黍肉之讐則征葛之師不興非時日曷喪之辭則升陑之師不舉興師不以其道可乎用淮隂為大將而三秦定用魚朝恩為監軍而九節度之師潰用將不得其法可乎興師有道用將有法此所謂師貞丈人吉無咎者與執言奉辭伐罪也上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也初六出師而嚴其律九二帥師而得其人戒六三之輿尸而一其令審六四之左次而重其進去天下之害而不自為害奉天人之辭而不自為辭此皆六五之君得興師之道操任將之法至上六而功成治定師之道終焉聖人於此夫何為哉行慶報功大者命之有國小者命之有家而已雖然聖人猶有憂焉聖人何憂也憂其意之所嚮而世之所趨也故寵命有功非至正不為功登用人才非君子不為才故曰大君有命以正功也又曰小人勿用必亂邦也致其憂於甚喜之後吝其用于博用之初然後功成而無後患武王勝商之日報功不先于崇德位能不先于建賢此所以為武成不然拔劒擊柱方知帝尊變理隂陽焉用此物亦何所不至哉坤下坎上比吉原筮元永貞無咎不寧方來後夫凶君子同小人比而曰比吉者此上下之親比非小人之朋比也上親下則下有歸下親上則上有與有歸則不離有與則不孤自生民以來至於今未之能易故曰比吉然求比不可速亦不可舒不可速故占度必謹其初謹初必致其詳原筮者占度在初也元永貞者詳觀上之人三德具而後比之也元則可親永則可久貞則可象忽於初必悔于永略于擇必厚於怨不可舒故以比之不寧速來以求彼之寧則吉也少後焉凶之道也商以離德亡周以同心昌故曰比吉太公避紂以待文王曰吾聞其善養老馬援舍隴而歸漢曰當今非特君擇臣臣亦擇君故曰原筮元永貞無咎酈生説田橫以天下後服者先亡故曰後夫凶彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也下順從謂五隂從一陽元永貞以剛中謂九五後夫凶謂上六夫亦謂九五九夫道也君道也六妻道也臣道也上六居一卦之未故曰後郭子和曰一陽之卦得位者師比而已得天位為比得臣位為師天下之吉莫吉于此象曰地上有水比先王以建萬國親諸侯水在澤之中則聚而相忘水在地之上則散而相求所謂水流濕也上者不約而就下隆者不期而集窪孰使之者故為比不曰萬國建后諸侯親王而曰王建萬國親諸侯蓋上之親下甚于下之親上初六有孚比之無咎有孚盈缶終來有他吉象曰比之初六有他吉也親在始始在誠誠在實實在質初六親比之始也孚言誠盈言實缶言質與物相親之始必在我者有至誠之心充實而不虛淳質而不飾則在彼之吉我皆終能來而有之矣故餘耳之交初隙末則如勿交周鄭之信不由衷則如勿信惟謹始故克終惟盡此之誠故來彼之吉他彼也六二比之自內貞吉象曰比之自內不自失也以六二中正之臣應九五中正之君上下相比之道兩得正矣雖然君臣相求者也寧君求臣母寧臣求君非不求也秉德以充乎內而不躁乎其外守正以俟乎彼而不自失乎此如是而已枉道以求行道失身以求達身不可為也故程子謂伊尹武侯必待禮而後出六三比之匪人象曰比之匪人不亦傷乎物以相親而益亦以相親而賊故與離婁同楫罔不涉與師冕同轍罔不蹶仲尼蘭鮑荀卿蓬麻皆戒于親非其人也上六以無首而凶矣六三與之相應而相比非其人也能無傷已乎六四外比之貞吉象曰外比於賢以從上也六二六三皆非己之應也初六己之應也而遠也故六四皆不與之相比既不下從而內比則將誰親外比于上而已九五賢而在上故六四比之若六四者特立獨行曠一世而無鄰事一人而無二者與可謂貞吉矣崔陳之黨立而晏子獨從乎公牛李之朋分而韓愈獨在其外可謂貞吉矣九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也王者之比天下去妙巧捐䇿謀昭示之以至正大中之道而已可以比天下而不可以示天下王者不由也故曰顯比然有比天下之道而無比天下之心可以比天下矣猶之王畋焉既圍而不合以逸之又開三面以驅之禽之在前者既驅而失之矣又且背而去者在所舍嚮而來者在所取則去者衆來者寡矣夫畋者主於取也而驅之使去取之益寡何也無取之之心也無取之之心則曷為取其嚮而來者也驅之不去而後不得已取之取我何心哉自去自來聽彼而已夫惟不取禽而禽自致故為天子之畋不誡人而人自親故為王者之比上使中者上以中正比其下下亦以中正比其上非使之使也太王去邠而從之者如歸市則驅禽而禽不去成湯征葛而聞之者怨後豫則不令而捷於令聖人何心哉上六比之無首凶象曰比之無首無所終也上六無首所謂後夫凶也四隂皆從五而已獨後焉見之不蚤從之不先下則棄于四隂之類上則絶于一陽之君凶而無終必矣萬國朝禹而防風獨後諸侯朝齊而談子不至其凶何如哉雖然君子之於時其從違豈一而足哉光武興而馮衍不至棄而不為愚高祖興而堯君素不從死而不為凶豈可盡以比之上六咎之哉學者謹之乾下巽上小畜亨乾下巽上為小畜乾下艮上為大畜畜止也乾進而上物止之於前二卦均也何别乎小大力有小大也天下之有力者莫徑乎風莫重乎山二者之力亦均也而風行天上為小畜天在山中為大畜何也制動以靜不以動制行以止不以行乾欲進而山遏之真能以止止動矣風自動自行安能止乾之進能止之者僅能巽順以柔之爾曰小畜亨者小有所止而有所亨也亨謂乾公孫𢎞能止武帝西南夷之役而不能止其胸奴之師李績能守黎陽之節而不能守立武后之問此小畜之臣也法孝直若在必能止伐吳之舉魏徴若在必能止征遼之行此大畜之臣也人臣非有大畜如山之力其能回人主如天之威乎密雲不雨自我西郊乾為天雲者天之氣雲之為物散則霽密則雨今密而不雨何也自西故也雲自西則曷為不雨乾西北巽東南故也雲興乎西而風起乎東霍然散矣何雨之望大抵風從雲則隂陽和而雨雲避風則隂陽戾而暵韓愈訟風伯曰雲屏屏兮吹使漓之此其驗也畜止也亦聚也故為密雲彖曰小畜柔得位而上下應之曰小畜六四以一隂居上位而五陽皆應故能以柔止剛然以一弱當衆強故所止者小健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也以巽之順止乾之健故乾不爭而暫止以二五之德皆剛而居中以五剛之志皆欲進而上行故乾得進而終亨此人臣止其君之不善而不能止者也若公孫𢎞李績是也雲欲雨風散之雲可以止矣而雲意尚往而未已此人臣止其君之善而不能止者也何謂止其君之善壅上之澤蠧上之心是謂止善雨傷稼而楊國忠取善稼以獻欺其君以不傷天大旱而李實督賦斂愈急告其君以不旱此能止其君之善者也李吉甫請峻威刑而憲宗以為欲朕失人心劉藻言苖不損而代宗謂不損猶應言損此止其君之善而不能者也止其君之不善而不能君子憾其臣學力之淺止其君之善而不能君子嘉其君聖質之堅象曰風行天上小畜君子以懿文德以風止天是以動濟動也君子欲止其君之不善而反顧在我之德未能無不善是以不善止不善也大人正己而物正推而格君心之非焉往而不止故君子於此不尤其君而尤其身曰是我之文德有未懿也我德之進十之則君德之進千之故文帝曰吾久不見賈生自以為過之今不及也不及之語一出而帝自此遠矣賈生自崖而反矣見賈生且然而況小畜懿文德之君子乎彼曰五帝其臣不及其聖此不惟不知臯夔亦不知堯舜初九復自道何其咎吉象曰復自道其義吉也啓君之善在初止君之不善亦在初故伊尹告太甲以謹厥初召公告成王以若生子縱於初禁於末晚矣故小畜必畜于初九初與四為應四止初而初受之有不善未嘗不止止而復復而歸於道是雖曰彼之所止而吾實自復於道也成王與周召居故成王化而為周召魯侯與哀駘它居故魯侯化而為哀駘它其德義之吉又何過咎之有雖然自道可也自聖不可也自道日益自聖日損九二牽復吉象曰牽復在中亦不自失也復於初善之善也不復於初而復於二善也非善之善也何也初安於復故為自復二勉於復故為牽復牽者勉強之謂曷為其能勉於復也二雖剛而猶居中故能勉于復雖不及初之自復豈不愈於過剛而不受止者乎故亦許其不自失然視何其咎之吉則不侔矣若過剛而不受止則為商紂拒諫之強晉惠公愎諫之狠矣九三輿説輻夫妻反目象曰夫妻反目不能正室也九三過中則不正過剛則不和不正而昵于六四愈不正也昵於彼必制於彼愈不和也不正則不可行故有輿説輻之象身之不正則不可行于妻子故有夫妻反目之象九三夫道也六四妻道也喪其夫之剛而昵于妻之愛其始相昵其終必受制蓋身之不正則不能正其家也非家罪也漢成帝嬖趙后而制於趙后始于腐柱之僭唐高宗嬖武后而制于武后始于聚麀之汙豈惟夫婦君臣亦然二世之於趙高明皇之于祿山是已六四有孚血去惕出無咎象曰有孚惕出上合志也以一柔而止五剛之進以小臣而止大君之欲禍之道也故為血而傷為惕而懼為咎而害六四以柔止剛以臣止君而能使其傷之去而不至惕之免而不遭咎之除而不作此獨何道也以至誠愛君之志合乎九五至誠納諫之志上下同志故也六四九五皆有孚故也此六四之賢與抑九五之賢與九五之賢而已蓋茅焦非賢於比干而秦皇賢於紂惕出如知罃如實出已之出是也九五有孚攣如富以其鄰象曰有孚攣如不獨富也九五巽體而乾德故九五之止衆剛乃健於六四之力九五之有孚乃廣于六四之孚以六四柔順之臣而上欲止其君下欲止其羣陽僅不傷而已九五以剛明中正之君而行巽順柔克之政故至誠一孚于上羣陽皆聽于下以巽止健實以健止健故衆陽皆聚而聽其所止靡然為善而憣然不為不善攣聚也富善也鄰衆陽也堯舜行德而民不犯周民遜畔而訟自釋皆富以其鄰不獨富之義也四五隂陽皆不失位故孚上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也乾之一陽欲進而六四止之故密雲不雨然六四之力既衰則羣隂之類復進所謂尚往而未已終亦必雨而後已至于上九隂陽和而既雨則可以止矣故曰既雨既處至于既處則陽亦窮而隂終勝彼五陽者不期止而止矣以一隂而止五陽非止之以力也止之以德也何謂德巽順有孚之謂德穆宗欲幸東都以張權輿之諫則不止以裴度之諫則止度之言巽順有孚故曰尚德載又曰德積載載者積之充也言巽順孚誠之德非一朝一夕之積也誠之積積之充猶感之難况誠之不積積之不充乃欲以語之末而止其君之大欲乎雖然以柔止剛以人止天以臣止君止之可也過於止不可也婦盛亢夫月盛敵日隂盛則疑於陽臣盛則侵于君故曰婦貞厲言雖正亦危也曰月幾望言月勿令至於望也曰君子征凶言可止而征不已君子亦凶也曰有所疑言隂疑于陽臣疑于君也臣疑于君君子猶凶况小人乎故鬻拳之諫至於兵趙盾之諫至於逆豈人臣之願哉豈人臣之願哉兑下乾上履虎尾不嘻人亨物畜而後有禮履者禮也又履不處也不處者行之謂也行天下而不禦者莫若禮凡有血氣者皆有爭心故天下之剛暴莫慘乎爭心而虎為下禮一行焉慢斯恭悖斯順爭斯遜矣若蹈虎尾而亦不噬人矣豈惟不噬又且亨焉大哉禮乎故曰以禮制心虎豈在外哉然其象自六三九四出彖曰履柔履剛也説而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也六三以一柔而行五剛九五以純剛而宅中正此下以禮而正上上以禮而自正也下以禮而正上故柔順以格其非心和悅以平其威怒君一正而臣不傷上以禮而自正故身履乎至尊而不疚於利德進乎光明而增益其聖臣不勞而君自正陳敬仲以禮而斂齊侯魏徴以禮而約太宗豈俟其玷而後磨疚而後藥哉九二六三九四合而為離故光明象曰上天下澤履君子以辨上下定民志天高地下天尊地卑澤又下之下卑之卑者此天地之間粲然有象之禮也君子則之而已天下之禍莫大于人欲人欲肆則下皆有為上之心故君子徐行後長者而民猶有紾其兄之臂君子不敢齒路馬而民猶有犯屬車之塵禮作而後上下分上下分而後民心息民心息而後天下定故辨上下者非私其上也安其上也非安其上也安其下也上下相安于綱常之中而不至於犯上作亂大哉禮乎而或曰起偽又曰忠信之薄彼未見禮亡之禍爾初九素履往無咎象曰素履之往獨行願也彖象言禮之可行爻辭言行而不處其復於禮一也君子之在天下非出則處幼而學壯而行初九履之初也必有平生雅素之學然後可以有行故往而無咎何也非利其身也行其志也無其素而欲行欺也不于其志而于其身汙也故古者學而後行後世行而後學顔子陋巷之禹稷仲舒下帷之伊吕孔明草廬之管樂不如是不為素履願志願也九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也九二以陽剛之才居下卦之中可以進為而行其道蓋坦然而無難矣然猶守之以山林幽獨之操可謂能正固而不以外物自亂其中者也居宗廟朝廷之上而不改簞瓢捽茹之氣在冠冕佩玉之列而不忘黃冠野服之心世之富貴得而亂之哉張良近之矣六三眇能視跛能履履虎尾嘻人凶武人為於大君象曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也聖人之於六三憐其志而恨其才曷憐乎其志也以隂居陽其志非不剛也曷恨乎其才也隂柔而不足與有為也若眇而自任以能視若跛而自任以能履以跛眇之質柔懦之才介乎五剛之間而欲履天下之至危以求立天下之大功其禍敗也必矣所謂履虎尾而逢嘻也凶孰大焉聖人所以恨其才而惜其居位之不當也若夫其志則可憐矣甚武而欲有為於吾君甚剛而欲有立于當世夫何罪哉故前言其凶而後止言志剛而已亦不深咎之也殷浩不出房琯不相晉唐君臣之訾庸有既乎世之君子欲出而有為其亦量己之才而勿冒其位也哉彖與六三以一卦言也爻不與六三以一爻言也上三陽者虎也九四虎尾六三履之易以在下為尾故遁之初六既濟之初九未濟之初六皆為尾而履以九四為尾九四履虎尾訴訴終吉象曰訴訴終吉志行也九四近剛決之君履危之道也然能終吉者九雖體剛而四則志柔訴訴而祗懼所以吉也然柔順以承剛暴之君免禍而終吉可也而能行其志者何也志乎忠愛而純乎天理自有以潛感而默悟也故三老之悟武帝不如田千秋之一言五王之復唐嗣不如王方慶之一對柔順之服剛暴速于剛暴服剛暴矣九五夬履貞厲象曰夬履貞厲位正當也五以乾剛之德既有能行之資宅天位之尊又有得行之勢德與位相當者也可以必行矣而聖人戒其剛決之太過則雖正而亦危故去四凶非舜之剛而莫剛於班有苖之師伐胸奴非武帝之勇而莫決于棄輪臺之地得此爻之戒矣上九視履考祥其旋元吉象曰元吉在上大有慶也上九居履之極當履之成行而不止其行必跌成而不去其成必缺盍視其行而不明成其福而不毁功成身退而復反其素履幽貞之初慶孰大焉故伊尹相湯之功不高於告歸之節子房興漢之策不警於棄事之智皆反其初之義也旋反考成也履主于行者也然初尚素履二尚幽貞勇於行而三凶懼於行而四吉五決于行則厲上反其初則慶然則履不處也而未嘗忘於處也誠齋易傳卷三
