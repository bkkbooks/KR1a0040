body:
  text: 誠齊易傳卷八宋楊萬里撰震下艮上頤貞吉觀頤自求口實彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉上覆下承衆口森然卦之形也上止下動卦之用也皆頰齒飲食之象故頥養也頥之時聖人養賢君子可仕之時也然聖人之所養君子之自養貞則吉邪則凶故上不可輕施其養下不可輕就其養上之所施必觀其所養之邪正所養者賢而正則萬民均得其所養下之所就必反觀自養之邪正自養者實而正則聖人不失其所養是養一人而福天下不曰養正則吉乎堯憂不得舜舜憂不得禹臯是也天地養萬物萬物以天地為天地堯舜養賢以及萬民萬民以堯舜為天地吉孰大焉斯時豈易逢哉故聖人喜之曰頥之時大矣哉自求口實實而非僞也象曰山下有雷頤君子以慎言語節飲食雷生之山成之此天地之養萬物也言出於口鳴其身亦冦其身故欲慎其出食入於口腴其體亦鴆其體故欲節其入此君子之自養也然慎言非默當其可則諌死不羡括囊節食非矯當其不可則采薇不羡林肉初九舍爾靈龜觀我朵頤凶象曰觀我朵頤亦不足貴也下卦三爻皆下之自養初九未粹之君子也有賢智之資而淺於自養者也故以陽明之智如龜之靈非無其資也然見六四之貴臣則動頥而求養其智安在聖人惜之未絶之也故既責其舍己而徇欲又戒之以必凶又恥之以不足貴庶其有改乎子夏之悅紛華子路之願裘馬幾是與朵動也震動初應四六二顛頤拂經于丘頤征凶象曰六二征凶行失類也六二君子小人之雜也居下卦之中有中人之資而可善可惡者也惡從善賤從貴猶隂從陽也六二下近於初之賢既欲下比從之以養其德而初非其應上觀於上九之貴又欲上比從之以養其祿而上亦非其應於是猖狂妄行陷於非僻而不自反征凶者妄行而凶也所以妄行者善與貴兩從而不擇下與上兩比而不應故失其類也吳起始師曽子卒棄其母以求仕李斯始師荀卿卒棄其學以滅宗皆失其守而不能自養兩從而妄行之禍也自上下下曰顛言從初九而倒置也自下上上曰拂言從上九而違常也邱上九也艮為山六三拂頤貞凶十年勿用無攸利象曰十年勿用道大悖也六三小人之粹也上無初九之靈龜次無六二之兩從蓋明然拂違自養之正道而公然敢肆大悖以干利者也資本隂柔一也居不中正二也躁欲之極三也挾三不正不知自養而躁於求養其伾文八司馬之徒與故溫死於衡宗元死於栁十年勿用未為久廢也六三之所以至此者干利而已聖人斷然曉之曰凶又曰無攸利拔其本也六四顛頤吉虎視耽耽其欲逐逐無咎象曰顛頤之吉上施光也上卦三爻皆上之所養六二顛頥而凶初九不應也六四顛頥而吉初九應之也六四以近君之大臣而下求於初九無位之賢者是倒置也而初九陽剛嚴正之德如虎視焉六四下而親之亦望而畏之非心邪意不待初九之切磋而自消其欲進德何如哉逐逐言消去也以此養德而佐六五之君以養天下又何咎矣上施光也言六四在上而所施者光大也周公下白屋上也衛青有揖客薛宣不敢吏朱雲次也初九之於六四有朵頥之戒六四之於初九有虎視之畏下不輕其就上不輕其禮也六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也六五養天下之君也隂柔之才不足以養天下而反求上九之養已拂其經常者也上九位臣而德師六五安居於貞固而無為順從於上九而不違而天下自得其養矣此真聖人養賢以及萬民之事也何必涉險有為而後為聖哉程子以成王賴周公當之盡矣艮止故不可涉大川六二拂經而凶以利動也六五拂經而吉以道來也上九由頤厲吉利涉大川象曰由頤厲吉大有慶也一卦二陽而初九在下在上而居師臣之位者上九而已六五之君所倚信而衆隂臣民所畢聽者故頥養天下皆由已出故曰由頥然位髙德重必惕厲而後吉果能惕厲而不自盈以上九之才犯險猶必濟况平世乎故大有慶也程子以伊周當之艮止而利涉大川何也止極必動巽下兑上大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉大過之時何時也大厦將傾之時也下橈將蹶其本弱矣上橈將折其末弱矣此不可為之時也而曰利有攸往亨何也非天下不可為之事無以施天下大過人之才孰為天下大過人之才九五之剛陽君有斯才矣九二大臣又斯才矣九四近臣又斯才也九三羣臣又斯才也斯厦也有九五之梁以主之有九二九三九四松柏杞梓之柱森然以支吾之棟雖橈也厦其可顛乎不惟不可顛也又將扶其顛而起之也而况四剛雖過於剛而二五乃得其中為下者順而從為上者說而行往安所不利而不亨乎本謂初六末謂上六上六居上棟也初六礎也亦曰棟者卦之反為上六四陽剛過故為大者過陽大隂小小往大來是也象曰澤滅木大過君子以獨立不懼遁世無悶木在澤下木可沒而不可仆君子以之舉大過人之事則獨立而不懼故東征之師周人之艱乃周公之易水在木上水可濡而不可入君子以之堅大過人之行則遁世而無悶故陋巷之窮乃顔子之達初六藉用白茅無咎象曰藉用白茅柔在下也六柔也初下也君子當大過之世而在下柔以順承潔以自淑而已林宗曰大厦將顛非一木之支不忤羣小獨免黨禍故無咎藉承也茅柔也白潔也柔故不忤羣小潔故亦不汙羣小巽為白九二枯楊生稊老夫得其女妻無不利象曰老夫女妻過以相與也九二以剛陽之才居謙柔之地以下比於初六此大臣之能下士而得助者也持是道以當大厦將顛之世則廢可興衰可扶矣木枯而根生廢可興也身老而妻壯衰可扶也然則大厦之顛何患於不起哉故曰無不利蕭何必薦韓信鄧禹必薦冦恂所謂大厦非一木之支太平非一士之略也巽木也九二剛過故為枯楊為老夫又長女也故初六為女妻初六耦而敷散根象也故為生稊稊根也九三棟橈凶象曰棟橈之凶不可以有輔也棟橈者上六初六也而於九三言棟橈凶何也九三志過鋭力過勇將欲輔上六之棟而適以壞之者也扶傾者傾必速支厦者厦必覆非扶持之罪也過於扶持之罪也九三以陽居陽故不可以輔上六之橈陳蕃竇武以之九四棟隆吉有它吝象曰棟隆之吉不橈乎下也大過不厭於過亦不過於過以四剛振二弱不厭於過也以剛處剛不為九三之凶則為九五之不可久扶傾拯橈之盛者其惟四與二乎皆以剛處柔之力也上棟下宇九四非棟也而曰棟隆者何也窮上者必反下棟折者必易材九四非棟位也而棟材也上六折矣兌反而巽則上六自外下而為六四九四自六上而為上九矣大過之棟其不巍巍乎其隆哉退韋賢千秋而相丙魏退張說藏用而相姚宋退珣瑜執誼而相黃裳漢唐之興也勃焉此棟隆吉之效也然四與初應有他志而橈於下之一隂則吝也戒之也九五枯楊生華老婦得其士夫無咎無譽象曰枯楊生華何可久也老婦士夫亦可醜也振大過之世患無剛陽之臣有剛陽之臣患無剛陽之君九五剛陽之君也今乃僅能無咎而已既無譽又不可久又可醜何也九二不應而比於初九三有志而過於勇九四有材而不居棟之位九五以剛居剛過於剛而輕於舉三陽不為之用而獨倚上六隂邪之小人以為助魯昭公欲去季氏而倚公衍公為邵陵厲公欲抑司馬氏而倚曹爽唐文宗欲除宦寺而倚訓注何可久之驗也木枯而華是速其枯也故何可久男未室曰士女已嫁曰婦士夫九五無助也老婦上六居一卦老隂之極也以已嫁之婦而失節娶失節之婦而復老邪無恥之甚故可醜也上六過涉滅頂凶無咎象曰過涉之凶不可咎也程子謂上六以隂柔處過極不恤危亡履險蹈禍是也孔氏楊氏以為龍逢比干非也二子豈隂柔者哉水溢而過於涉者不足以濟川而徒沒其頂任重而過其才者不足以濟難而徒沒其身為衍曹矣訓注以之其凶大矣而曰無咎非無咎也不可咎也當自咎而已坎下坎上習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉坎本坤也乾一陽交其中而生水水內陽而外隂故其明內景離本乾也坤一隂交其中而生火火內隂而外陽故其明外景一陽交於二隂之中亦陷於二隂之中故水為坎坎陷也險也鑿險而陷物曰坎坎用牲是也習重也習吉是也上下重坎故曰習坎陽動故曰水流陷於中而未出故曰不盈水惟險則行故曰行險中實故曰孚信剛在中心象故曰心亨險惟行則濟故曰往有尚又曰有功天險上卦地險下卦王九五公九二法天之不可升故設卑髙貴賤之嚴法地之不可踰故設城郭溝池之固有險之時不可不濟無險之用不可不設故曰大矣哉習坎之上疑脫一坎字蓋八卦無復名象曰水洊至習坎君子以常德行習教事水一至則易竭再至則方增君子法再至之水以此進德以此教民皆方增無倦之意洊再也初六習坎入于坎窞凶象曰習坎入坎失道凶也初六隂柔之小人設險以陷君子猶以為未又設險中之險坎險也窞險中之險也虞翻曰坎中小穴曰窞以坎為未險而復穴其中其陷君子不遺餘巧矣然穽人者必自穽險人者必自險紿道而陷善類未有不自陷而凶者也故宦者盛而黨錮興黨人死而宦者滅初居坎之最下故為窞初一爻穴之象九二坎有險求小得象曰求小得未出中也九二其羑里之事耶以剛毅之德行中正之道九二何罪焉逢二隂之有險而陷其中此君子之不幸也惟以剛居柔勿以剛競而以順求庶乎小濟可大濟不可小得未出二隂之中故也六三來之坎坎險且枕入於坎窞勿用象曰來之坎坎終無功也六三以隂柔之資處剛强之位此小人欲為猖狂之舉妄意於見用而邀功者也聖人則曰斯人宜勿用用之終無功何也欲有所來而退乎下則入于險中欲有所之而進乎上則犯夫重險進退皆險故曰坎坎遇險固欲濟也然倚奸險之人以求濟險者祗益其險也阻且枕枕倚也入於坎窞益其險也訓注是已六四樽酒簋二用缶納約自牖終無咎象曰樽酒簋二剛柔際也濟險者衆則易孤則難九二求出險而未能出蓋內水所陷者深而不盈也必外水洊至則二水合而寢盈矣六四外水之再至者也恃再至之勢而不交於內水則內無主九二內水之先至者也恃先至之源而不納夫外水則外無援六四之與九二必也相交以禮相示以質相通以信則庶乎險難之可濟而終無咎矣平交歡於勃而漢始安嶠自結於導而晉復振樽酒簋二禮也用缶質也納約信也自牖內外之通也剛九二柔六四際交際六四九二非應也而交際者九二內水之主也六四外水始至之客也古語曰同舟而遇風則胡越相應如左右手其九二六四之謂與約如約信盟誓之約九五坎不盈祗既平無咎象曰坎不盈中未大也險難之濟否視君子小人之衆寡小人衆而君子寡則一君子不勝衆小人羣臣皆小人而人主孤則一賢君亦不勝羣小九五以剛中之德而履尊位又有九二剛陽之大臣以佐下風可以濟險有餘矣然而僅能無咎者如水之不盈而未平也曷為其不盈而未平也陷於上六六四之中而未出也唐之代宗文宗是也代宗陷於藩鎮之險而未能出惟郭子儀可以出之然子儀自陷於朝恩輔國讒波之中文宗陷於宦寺之險而未能出惟裴度可以出之然度自陷於元稹程异浸潤之內然則二君其如羣小何二臣其如二君何中未大也君雖有剛中之德亦終不能成大功而已矣九五九二君臣皆陷於二隂上六係用徽纆置于叢棘三嵗不得凶象曰上六失道凶三嵗也君臣相正國之肥主聖臣賢天下之盛福上六安足以知此哉挾隂邪之資竊權勢之重而乘九五之上立九五之前此小人蔽君之明而制之者也文宗曰周赧漢獻受制於强諸侯今朕受制於家奴殆不如赧獻此坎之九五逢四隂之衆而又制於上六之强者與然上六豈終免乎宦寺誅而唐亦以亡此徽纆叢棘之禍也三嵗執之而不得者强也亦三嵗而凶者窮也其暫雖强其窮必凶離下離上離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也離者明卦也曰利貞亨畜牝牛吉何也明蔽必察明而養之以正乃亨故曰利貞亨明過必剛明而養之以柔乃吉故曰畜牝牛吉牛柔畜也牝牛柔之柔者也離之義麗也火出於至無生於至虛麗於薪則無者有虛者實薪盡則復初五在上君也天也二在下臣也土也君臣以明相重各矜其明而明無所麗是猶日月不麗乎天百榖草木不麗于土也可乎君之明麗乎正即日月麗乎天其明彌髙而不流於顯宗德宗之察臣之明麗乎正即百榖草木麗乎土其明彌厚而不墮於韓非朝錯之薄此唐虞三代君臣之明也其化成天下宜哉柔中謂六五柔正謂六二牝牛謂二隂皆坤坤為母牛畜養也象曰明兩作離大人以繼明照於四方明之奇者其明孤而匱明之兩者其明續而久曷謂明兩六五不矜其明而續以六二之明是日所不及而續以月君所不及而續以賢也故日月之明終古不忒大人之明四方畢照辨忠邪知疾苦燭幽側慮長久皆照四方之謂初九履錯然敬之無咎象曰履錯之敬以辟咎也初九以文明之德剛陽之資居離明之初如火之始然日之始旦雖在下而未升無位而未進而其踐履之實錯然璀璨於天下已不可掩矣非晦其明則衆之所忌咎之所集敬者畏謹而晦其明也故無咎非無咎也敬畏以避之也夫子之少也孟僖子已知其聖矣然聖德彰而衆忌興晏子子西之賢然且疑其害於國於陳蔡大夫乎何誅曰聖則吾不能聖則吾豈敢事君盡禮為禮必敬恂恂誾誾似不能言故匡人不能殺桓魋不能害不然何以避咎哉六二黃離元吉象曰黃離元吉得中道也六二當文明之世居大臣之位而能以謙柔之德體中正之道此其所以獲甚大之吉為一卦之盛也周公公孫碩膚以之黃者中之色九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也君子哀樂必類曹大子聞樂而嘆君子曰非嘆所也故子於是日哭則不歌九三歌未畢也而嗟又繼之哀樂不類何也年過而耋位過而昏如日之昃也其能久乎免此者其惟衛武公乎九三下卦之極故為日昃為大耋離為日九老陽三不中故昃九四突如其來如焚如死如棄如象曰突如其來如無所容也九四乘羣下之上逼近君之位而席內外重火之氣焰故其興暴然其來突然如有縱焚之勢而不可撲滅者然下則九三剛强而不可入上則六五中正而不可犯此其火必至若燼而死若灰而棄焉耳何也進退皆無所容也管蔡楚子圍晉智伯以之六五出涕沱若戚嗟若吉象曰六五之吉離王公也六五以文明之德履至尊之位而逼於九四之强臣亦危矣然能以柔居剛晦之以柔故明之以剛始之以憂故終之以吉涕而嗟憂之至也然孰知沱若之涕足以下焚如之威嗟若之聲足以震突如之勢哉此成王閔豫小子管蔡難大之時也宜卒平三監而吉與曰離王公者謂王公惟居離明之時逢憂危之事乃可吉爾居昏世遇危事殆哉上九王用出征有嘉折首獲匪其醜無咎象曰王用出征以正邦也上九以剛明之極而居上此王者除元惡以大正其國之事也其成王顯顯令德四征不庭之時乎程子謂去其首惡而非及其醜類得之矣誠齊易傳卷八
